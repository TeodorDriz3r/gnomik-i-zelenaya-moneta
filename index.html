<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гномик и зеленая монетка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: #1a1f2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .game-wrapper {
      background: #10131f;
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      text-align: center;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 16px;
      background: #8bb8d4;
      border: 3px solid #3a415a;
    }
    .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 10px 8px;
      color: #b5c7e8;
      font-size: 18px;
      font-weight: bold;
    }
    .info span {
      background: #181e2e;
      padding: 4px 16px;
      border-radius: 40px;
      border: 1px solid #2f3850;
    }
    .controls {
      margin-top: 10px;
      color: #8a9bbf;
      background: #181e2e;
      padding: 8px 18px;
      border-radius: 60px;
      display: inline-block;
      border: 1px solid #2f3850;
      font-size: 16px;
    }
    .controls kbd {
      background: #2f3850;
      color: #fff;
      padding: 2px 12px;
      border-radius: 30px;
      font-weight: bold;
      margin: 0 4px;
    }
    button {
      background: #3f5a8c;
      border: none;
      color: #fff;
      font-size: 16px;
      padding: 6px 24px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      margin-left: 15px;
    }
    button:hover { background: #5a79b5; transform: scale(1.03); }
    #message {
      margin-top: 8px;
      font-size: 18px;
      font-weight: bold;
      color: #f7d44a;
      height: 26px;
    }
    .canvas-wrap {
      position: relative;
      display: inline-block;
    }
    #gameOverOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.55);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 5;
    }
    #gameOverOverlay.visible {
      display: flex;
    }
    #gameOverOverlay .over-title {
      font-size: 42px;
      font-weight: bold;
      color: #ff6b6b;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #gameOverOverlay .over-title.win {
      color: #f7d44a;
    }
    #restartOverlayBtn {
      margin-left: 0;
      font-size: 22px;
      padding: 14px 40px;
      background: #c0392b;
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    }
    #restartOverlayBtn:hover { background: #e74c3c; }
    #pauseOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(10, 14, 28, 0.72);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 6;
    }
    #pauseOverlay.visible { display: flex; }
    #pauseOverlay .pause-title {
      font-size: 48px;
      font-weight: bold;
      color: #f7d44a;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    #pauseOverlay .pause-hint {
      color: #b5c7e8;
      font-size: 18px;
    }
    #menuOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(16, 28, 48, 0.55) 0%, rgba(10, 16, 28, 0.82) 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 7;
    }
    #menuOverlay.visible { display: flex; }
    #menuLogo {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.45));
    }
    #menuTitle {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 42px;
      font-weight: bold;
      color: #f7d44a;
      text-shadow: 0 3px 0 #8b6914, 0 8px 24px rgba(0,0,0,0.5);
      letter-spacing: 0.5px;
      max-width: 90%;
      line-height: 1.2;
    }
    #menuSubtitle {
      color: #b5c7e8;
      font-size: 16px;
      margin-top: -6px;
    }
    #playBtn {
      margin-left: 0;
      margin-top: 10px;
      font-size: 26px;
      padding: 14px 56px;
      border-radius: 60px;
      background: linear-gradient(180deg, #5a9e3e, #3d7a28);
      border: 3px solid #c8e6a0;
      box-shadow: 0 8px 0 #2a5518, 0 12px 24px rgba(0,0,0,0.4);
    }
    #playBtn:hover {
      background: linear-gradient(180deg, #6bb84a, #4a8f32);
      transform: translateY(-2px) scale(1.03);
    }
    #playBtn:active {
      transform: translateY(4px) scale(0.99);
      box-shadow: 0 3px 0 #2a5518, 0 6px 12px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="menuOverlay" class="visible">
      <canvas id="menuLogo" width="140" height="140"></canvas>
      <div id="menuTitle">Гномик и зеленая монетка</div>
      <div id="menuSubtitle">Платформер • Бомбермен • Босс</div>
      <button id="playBtn">▶ Играть</button>
    </div>
    <div id="gameOverOverlay">
      <div class="over-title" id="overTitle">💀 КОНЕЦ</div>
      <button id="restartOverlayBtn">🔄 Заново</button>
    </div>
    <div id="pauseOverlay">
      <div class="pause-title">⏸ ПАУЗА</div>
      <div class="pause-hint">Нажми <kbd style="background:#2f3850;color:#fff;padding:2px 10px;border-radius:8px;">Esc</kbd> чтобы продолжить</div>
    </div>
  </div>
  <div class="info">
    <span>🪙 <span id="coinDisplay">0</span></span>
    <span>❤️ <span id="livesDisplay">5</span></span>
    <span>🏆 <span id="levelDisplay">Марио</span></span>
    <button id="restartBtn">🔄 Заново</button>
  </div>
  <div class="controls" id="controlsHint">
    <kbd>←</kbd> <kbd>→</kbd> – движение &nbsp;|&nbsp; <kbd>↑</kbd> или <kbd>Пробел</kbd> – прыжок
  </div>
  <div id="message"></div>
</div>

<script>
  // ============================================================
  //  ИГРА «ГНОМИК И ЗЕЛЁНАЯ МОНЕТА»
  //  Платформер + бомбермен + босс-дракон
  // ============================================================

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 450;

  const coinSpan = document.getElementById('coinDisplay');
  const livesSpan = document.getElementById('livesDisplay');
  const levelSpan = document.getElementById('levelDisplay');
  const messageDiv = document.getElementById('message');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const overTitle = document.getElementById('overTitle');

  function showRestartOverlay(title, isWin) {
    overTitle.textContent = title;
    overTitle.classList.toggle('win', !!isWin);
    gameOverOverlay.classList.add('visible');
  }

  function hideRestartOverlay() {
    gameOverOverlay.classList.remove('visible');
  }

  const keys = {
    ArrowLeft: false,
    ArrowRight: false,
    ArrowUp: false,
    ArrowDown: false,
    Space: false
  };

  function rand(min, max) { return Math.random() * (max - min) + min; }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
  function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  const STATE = {
    MENU: 0,
    MAIN: 1,
    BOMBER: 2,
    BOSS: 3,
    WIN: 4,
    GAMEOVER: 5,
    INTRO: 6,
    OUTRO: 7
  };

  let gameState = STATE.MENU;
  let lives = 5;
  let coins = 0;
  let totalCoins = 0;
  let greenCoinCollected = false;

  let cutscene = null;
  const menuOverlay = document.getElementById('menuOverlay');
  const menuLogo = document.getElementById('menuLogo');
  const menuLogoCtx = menuLogo.getContext('2d');

  let player = null;
  let platforms = [];
  let enemies = [];
  let coinObjects = [];
  let fireballs = [];
  let dragon = null;
  let playerBullets = [];
  let gunPickup = null;
  let hasGun = false;
  let gunFireCooldown = 0;

  let bomberWalls = [];
  let bomberEnemies = [];
  let bomberExit = null;
  let bomberBombs = [];
  let bomberExplosions = [];
  let bomberPickups = [];
  let bomberPlayer = null;
  let bomberComplete = false;
  let bomberBombKeyWasDown = false;
  const BOMBER_CELL = 40;
  const BOMBER_GRID_W = 20;
  const BOMBER_GRID_H = 11;

  let frame = 0;
  let paused = false;
  const pauseOverlay = document.getElementById('pauseOverlay');

  function setPaused(v) {
    paused = v;
    pauseOverlay.classList.toggle('visible', paused);
    if (paused) {
      for (let k in keys) keys[k] = false;
    }
  }

  class Player {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.w = 28;
      this.h = 36;
      this.vx = 0;
      this.vy = 0;
      this.onGround = false;
      this.speed = 4;
      this.jumpPower = -12;
      this.gravity = 0.45;
      this.facing = 1;
      this.alive = true;
      this.hasGun = false;
    }

    update() {
      if (!this.alive) return;

      if (keys.ArrowLeft) { this.vx = -this.speed; this.facing = -1; }
      else if (keys.ArrowRight) { this.vx = this.speed; this.facing = 1; }
      else { this.vx *= 0.8; if (Math.abs(this.vx) < 0.1) this.vx = 0; }

      if ((keys.ArrowUp || keys.Space) && this.onGround) {
        this.vy = this.jumpPower;
        this.onGround = false;
      }

      this.vy += this.gravity;
      if (this.vy > 12) this.vy = 12;

      this.x += this.vx;
      for (let p of platforms) {
        if (rectCollide(this, p)) {
          if (this.vx > 0) this.x = p.x - this.w;
          else if (this.vx < 0) this.x = p.x + p.w;
          this.vx = 0;
        }
      }

      this.y += this.vy;
      this.onGround = false;
      for (let p of platforms) {
        if (rectCollide(this, p)) {
          if (this.vy > 0) {
            this.y = p.y - this.h;
            this.vy = 0;
            this.onGround = true;
          } else if (this.vy < 0) {
            this.y = p.y + p.h;
            this.vy = 0;
          }
        }
      }

      if (this.x < 0) this.x = 0;
      if (this.x + this.w > W) this.x = W - this.w;
      if (this.y > H + 50) this.alive = false;
    }

    draw(ctx) {
      if (!this.alive) return;
      ctx.save();
      ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
      ctx.scale(this.facing, 1);
      ctx.fillStyle = '#d44c4c';
      ctx.beginPath();
      ctx.arc(0, -4, 16, 0, Math.PI, true);
      ctx.fill();
      ctx.fillStyle = '#f7d8b0';
      ctx.fillRect(-10, -4, 20, 16);
      ctx.fillStyle = '#e0c8a0';
      ctx.fillRect(-8, 6, 16, 10);
      ctx.fillStyle = '#222';
      ctx.fillRect(-6, -2, 4, 4);
      ctx.fillRect(2, -2, 4, 4);
      ctx.fillStyle = '#d49a6a';
      ctx.beginPath();
      ctx.arc(4, 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6b4f3c';
      ctx.fillRect(-8, 14, 6, 8);
      ctx.fillRect(2, 14, 6, 8);
      if (this.hasGun) {
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(8, 2, 22, 6);
        ctx.fillStyle = '#1a252f';
        ctx.fillRect(26, 3, 8, 4);
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(10, 8, 6, 8);
      }
      ctx.restore();
    }
  }

  class Platform {
    constructor(x, y, w, h, color = '#6b8c42') {
      this.x = x; this.y = y; this.w = w; this.h = h;
      this.color = color;
    }
    draw(ctx) {
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.w, this.h);
      ctx.strokeStyle = '#4a6b2a';
      ctx.lineWidth = 2;
      ctx.strokeRect(this.x, this.y, this.w, this.h);
    }
  }

  class Enemy {
    constructor(x, y, w = 30, h = 30) {
      this.x = x; this.y = y; this.w = w; this.h = h;
      this.vx = 1.2;
      this.speed = 1.2;
      this.alive = true;
      this.type = 'walker';
      this.chaser = false;
    }

    findPlatform() {
      for (let p of platforms) {
        if (this.y + this.h >= p.y - 2 && this.y + this.h <= p.y + p.h + 8 &&
            this.x + this.w > p.x + 2 && this.x < p.x + p.w - 2) {
          return p;
        }
      }
      return null;
    }

    update() {
      if (!this.alive) return;
      const plat = this.findPlatform();

      if (this.chaser && plat && player && player.alive) {
        const mid = this.x + this.w / 2;
        const target = player.x + player.w / 2;
        if (target < mid - 6) this.vx = -this.speed;
        else if (target > mid + 6) this.vx = this.speed;
        else this.vx = 0;
      }

      this.x += this.vx;

      if (plat) {
        // Не сходить с платформы
        if (this.x < plat.x + 2) {
          this.x = plat.x + 2;
          this.vx = this.chaser ? 0 : Math.abs(this.speed);
        } else if (this.x + this.w > plat.x + plat.w - 2) {
          this.x = plat.x + plat.w - this.w - 2;
          this.vx = this.chaser ? 0 : -Math.abs(this.speed);
        }
      } else {
        // упал с края — разворот
        this.vx *= -1;
        this.x += this.vx;
      }
    }

    draw(ctx) {
      if (!this.alive) return;
      const cap = this.chaser ? '#8e24aa' : '#d44c4c';
      const body = this.chaser ? '#ce93d8' : '#f7d8b0';
      ctx.fillStyle = cap;
      ctx.beginPath();
      ctx.arc(this.x + this.w / 2, this.y + 10, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = body;
      ctx.fillRect(this.x + 4, this.y + 12, 22, 14);
      ctx.fillStyle = '#222';
      ctx.fillRect(this.x + 6, this.y + 6, 5, 5);
      ctx.fillRect(this.x + this.w - 11, this.y + 6, 5, 5);
      if (this.chaser) {
        // злые брови
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x + 5, this.y + 4);
        ctx.lineTo(this.x + 12, this.y + 7);
        ctx.moveTo(this.x + this.w - 5, this.y + 4);
        ctx.lineTo(this.x + this.w - 12, this.y + 7);
        ctx.stroke();
      }
      ctx.fillStyle = this.chaser ? '#ab47bc' : '#d9b382';
      ctx.fillRect(this.x + 6, this.y + 20, 18, 10);
    }
  }

  class Coin {
    constructor(x, y, isGreen = false) {
      this.x = x; this.y = y;
      this.r = 12;
      this.isGreen = isGreen;
      this.collected = false;
      this.anim = 0;
    }
    update() { this.anim += 0.08; }
    draw(ctx) {
      if (this.collected) return;
      const bob = Math.sin(this.anim) * 2;
      // вращение монетки (сжатие по X)
      const spin = Math.abs(Math.cos(this.anim * 1.2));
      const rx = Math.max(3, this.r * (0.25 + spin * 0.75));
      const ry = this.r;
      const gold = this.isGreen;
      const c1 = gold ? '#1faa59' : '#f4d03f';
      const c2 = gold ? '#145a32' : '#b7950b';
      const c3 = gold ? '#58d68d' : '#f9e79f';
      const rim = gold ? '#0e6655' : '#9a7d0a';

      ctx.save();
      ctx.translate(this.x, this.y + bob);
      ctx.shadowColor = gold ? '#2ecc71' : '#f1c40f';
      ctx.shadowBlur = 12;

      // внешний диск
      const grad = ctx.createLinearGradient(-rx, -ry, rx, ry);
      grad.addColorStop(0, c3);
      grad.addColorStop(0.45, c1);
      grad.addColorStop(1, c2);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // ободок
      ctx.strokeStyle = rim;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, rx - 1, ry - 1, 0, 0, Math.PI * 2);
      ctx.stroke();

      // внутреннее кольцо и символ — только когда монета «лицом»
      if (spin > 0.45) {
        ctx.strokeStyle = rim;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(0, 0, rx * 0.62, ry * 0.62, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = rim;
        ctx.font = 'bold ' + Math.floor(ry * 1.05) + 'px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(gold ? 'G' : '★', 0, 1);
      } else {
        // ребро монеты при боковом виде
        ctx.fillStyle = c2;
        ctx.fillRect(-rx, -ry + 2, rx * 2, ry * 2 - 4);
      }

      // блик
      if (spin > 0.5) {
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.beginPath();
        ctx.ellipse(-rx * 0.35, -ry * 0.35, rx * 0.22, ry * 0.18, -0.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class Fireball {
    constructor(x, y, vx, vy, r = 10) {
      this.x = x; this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.r = r;
      this.alive = true;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.15;
      if (this.x < -30 || this.x > W + 30 || this.y > H + 30 || this.y < -40) this.alive = false;
    }
    draw(ctx) {
      if (!this.alive) return;
      ctx.save();
      ctx.shadowColor = '#ff6b35';
      ctx.shadowBlur = 20;
      const grad = ctx.createRadialGradient(this.x, this.y, 2, this.x, this.y, this.r);
      grad.addColorStop(0, '#ffd93d');
      grad.addColorStop(0.7, '#ff6b35');
      grad.addColorStop(1, '#c0392b');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class PlayerBullet {
    constructor(x, y, vx, vy) {
      this.x = x; this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.r = 4;
      this.alive = true;
      this.life = 90;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life--;
      if (this.life <= 0 || this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) {
        this.alive = false;
      }
    }
    draw(ctx) {
      if (!this.alive) return;
      ctx.save();
      ctx.shadowColor = '#f1c40f';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffe566';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class GunPickup {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.w = 36;
      this.h = 20;
      this.anim = 0;
      this.collected = false;
    }
    update() { this.anim += 0.08; }
    draw(ctx) {
      if (this.collected) return;
      const bob = Math.sin(this.anim) * 5;
      ctx.save();
      ctx.translate(this.x, this.y + bob);
      ctx.shadowColor = '#f39c12';
      ctx.shadowBlur = 18;
      ctx.fillStyle = 'rgba(243,156,18,0.25)';
      ctx.beginPath();
      ctx.arc(18, 10, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(2, 6, 28, 8);
      ctx.fillStyle = '#1a252f';
      ctx.fillRect(26, 7, 10, 6);
      ctx.fillStyle = '#7f8c8d';
      ctx.fillRect(6, 14, 8, 10);
      ctx.fillStyle = '#e67e22';
      ctx.fillRect(10, 4, 6, 4);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('АВТОМАТ', 18, -8);
      ctx.restore();
    }
  }

  class Dragon {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.w = 70;
      this.h = 60;
      this.hp = 30;
      this.maxHp = 30;
      this.alive = true;
      this.mode = 'chase';
      this.modeTimer = 0;
      this.jumpTimer = 0;
      this.shootTimer = 0;
      this.dashTimer = 0;
      this.speedX = 2.3;
      this.dir = -1;
      this.vy = 0;
      this.vx = 0;
      this.onGround = false;
      this.hurtTimer = 0;
      this.flash = 0;
    }

    setMode(mode, duration) {
      this.mode = mode;
      this.modeTimer = duration;
    }

    update(playerX, playerY) {
      if (!this.alive) return;
      if (this.hurtTimer > 0) this.hurtTimer--;
      if (this.flash > 0) this.flash--;
      this.modeTimer--;

      const cx = this.x + this.w / 2;
      const cy = this.y + this.h / 2;
      const dx = playerX + 14 - cx;
      const dy = playerY + 18 - cy;
      const dist = Math.hypot(dx, dy) || 1;

      // Смена режимов для динамики
      if (this.modeTimer <= 0 && this.mode !== 'dash') {
        const roll = Math.random();
        if (roll < 0.28) this.setMode('dash', 40);
        else if (roll < 0.5) this.setMode('jump', 55);
        else if (roll < 0.72) this.setMode('spray', 60);
        else this.setMode('chase', 80 + Math.random() * 40);
      }

      if (this.mode === 'dash') {
        this.dir = dx > 0 ? 1 : -1;
        this.vx = this.dir * 6.2;
        this.x += this.vx;
        if (this.onGround && this.modeTimer % 14 === 0) {
          this.vy = -5.5;
          this.onGround = false;
        }
        if (this.modeTimer <= 0) {
          this.vx = 0;
          this.setMode('chase', 50);
        }
      } else if (this.mode === 'jump') {
        this.dir = dx > 0 ? 1 : -1;
        this.x += this.dir * 1.8;
        if (this.onGround) {
          this.vy = -12 - Math.random() * 2.5;
          this.onGround = false;
        }
        if (this.modeTimer <= 0) this.setMode('chase', 45);
      } else if (this.mode === 'spray') {
        this.dir = dx > 0 ? 1 : -1;
        this.x += Math.sin(frame * 0.12) * 1.3;
        this.shootTimer++;
        if (this.shootTimer > 11) {
          this.shootTimer = 0;
          for (let a = -0.6; a <= 0.6; a += 0.3) {
            const ang = Math.atan2(dy, dx) + a;
            fireballs.push(new Fireball(cx, cy, Math.cos(ang) * 4.5, Math.sin(ang) * 4.5, 9));
          }
        }
        if (this.modeTimer <= 0) this.setMode('chase', 55);
      } else {
        // chase
        this.dir = dx > 0 ? 1 : -1;
        if (Math.abs(dx) > 20) this.x += this.dir * this.speedX;
        this.jumpTimer++;
        if (this.onGround && this.jumpTimer > 45) {
          if (playerY < this.y - 20) this.vy = -11;
          else if (playerY > this.y + 40) this.vy = -4.5;
          else this.vy = -8 - Math.random() * 3;
          this.onGround = false;
          this.jumpTimer = 0;
        }
        this.shootTimer++;
        if (this.shootTimer > 28) {
          this.shootTimer = 0;
          const ang = Math.atan2(dy, dx);
          const spd = 4.2 + Math.random() * 0.6;
          fireballs.push(new Fireball(cx, this.y + 12, Math.cos(ang) * spd, Math.sin(ang) * spd + 0.2));
          if (Math.random() < 0.4) {
            fireballs.push(new Fireball(cx, this.y + 12, Math.cos(ang + 0.35) * spd, Math.sin(ang + 0.35) * spd));
            fireballs.push(new Fireball(cx, this.y + 12, Math.cos(ang - 0.35) * spd, Math.sin(ang - 0.35) * spd));
          }
        }
      }

      this.vy += 0.55;
      if (this.vy > 15) this.vy = 15;
      const prevBottom = this.y + this.h;
      this.y += this.vy;

      this.onGround = false;
      for (let p of platforms) {
        const feetNow = this.y + this.h;
        const overlapX = this.x + this.w > p.x + 4 && this.x < p.x + p.w - 4;
        const landedFromAbove = prevBottom <= p.y + 6 && feetNow >= p.y && this.vy >= 0;
        if (overlapX && landedFromAbove) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.onGround = true;
          break;
        }
      }

      if (this.x < 0) { this.x = 0; if (this.mode === 'dash') this.setMode('chase', 40); }
      if (this.x + this.w > W) { this.x = W - this.w; if (this.mode === 'dash') this.setMode('chase', 40); }
      if (this.y > H + 50) { this.alive = false; return; }
    }

    takeHit(dmg) {
      this.hp -= dmg;
      this.hurtTimer = 10;
      this.flash = 8;
      if (this.hp <= 0) {
        this.hp = 0;
        this.alive = false;
      }
      return true;
    }

    draw(ctx) {
      if (!this.alive) return;
      ctx.save();
      ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
      if (this.flash > 0) ctx.globalAlpha = 0.55 + Math.sin(frame) * 0.2;
      const body = this.mode === 'dash' ? '#c62828' : '#2e7d32';
      ctx.fillStyle = body;
      ctx.shadowColor = '#1b5e20';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#388e3c';
      ctx.beginPath();
      ctx.arc(this.dir * 20, -10, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath();
      ctx.arc(this.dir * 24, -14, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c62828';
      ctx.beginPath();
      ctx.arc(this.dir * 26, -14, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1b5e20';
      ctx.beginPath();
      ctx.moveTo(-10, -20);
      ctx.lineTo(-30, -40);
      ctx.lineTo(-20, -20);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(10, -20);
      ctx.lineTo(30, -40);
      ctx.lineTo(20, -20);
      ctx.fill();
      ctx.fillStyle = '#2e7d32';
      ctx.beginPath();
      ctx.moveTo(-this.dir * 30, 10);
      ctx.lineTo(-this.dir * 50, 20);
      ctx.lineTo(-this.dir * 30, 0);
      ctx.fill();
      ctx.fillStyle = '#c62828';
      for (let i = -4; i <= 4; i += 2) {
        ctx.beginPath();
        ctx.moveTo(i * 6, -20);
        ctx.lineTo(i * 6 + 6, -30);
        ctx.lineTo(i * 6 + 6, -20);
        ctx.fill();
      }
      ctx.restore();

      ctx.fillStyle = '#333';
      ctx.fillRect(this.x, this.y - 20, this.w, 8);
      ctx.fillStyle = '#c62828';
      ctx.fillRect(this.x + 2, this.y - 18, (this.w - 4) * (this.hp / this.maxHp), 4);
      ctx.fillStyle = '#fff';
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('❤️ ' + this.hp, this.x + this.w / 2, this.y - 26);
    }
  }

  // Спавн на земле слева, без пересечения с блоками
  function spawnMarioPlayer(opts) {
    opts = opts || {};
    const x = opts.x != null ? opts.x : 36;
    const p = new Player(x, 0);
    p.alive = true;
    if (opts.hasGun) p.hasGun = true;

    // Встать на верхнюю поверхность под ногами (земля / платформа)
    let standY = H - 40;
    for (let plat of platforms) {
      if (x + p.w > plat.x + 2 && x < plat.x + plat.w - 2) {
        if (plat.y < standY) standY = plat.y;
      }
    }
    // Берём только землю у старта: не телепортировать на высокие полки
    standY = H - 40;
    p.y = standY - p.h;

    // Если всё же внутри блока — вытолкнуть наверх
    for (let guard = 0; guard < 30; guard++) {
      let hit = null;
      for (let plat of platforms) {
        if (rectCollide(p, plat)) { hit = plat; break; }
      }
      if (!hit) break;
      p.y = hit.y - p.h;
      p.vy = 0;
      p.onGround = true;
    }

    p.vx = 0;
    p.vy = 0;
    p.onGround = true;
    return p;
  }

  function generateBomberLevel() {
    bomberWalls = [];
    bomberEnemies = [];
    bomberBombs = [];
    bomberExplosions = [];
    bomberPickups = [];
    bomberExit = null;
    bomberComplete = false;
    bomberBombKeyWasDown = false;

    const cell = BOMBER_CELL;
    const gridW = BOMBER_GRID_W, gridH = BOMBER_GRID_H;
    const hard = {};

    for (let i = 0; i < gridW; i++) {
      for (let j = 0; j < gridH; j++) {
        if (i === 0 || i === gridW - 1 || j === 0 || j === gridH - 1) {
          hard[i + ',' + j] = true;
          bomberWalls.push({ x: i * cell, y: j * cell, w: cell, h: cell, solid: true, breakable: false });
        } else if (i % 2 === 0 && j % 2 === 0) {
          hard[i + ',' + j] = true;
          bomberWalls.push({ x: i * cell, y: j * cell, w: cell, h: cell, solid: true, breakable: false });
        }
      }
    }

    // Небольшая свободная зона (буква Г): хватает заложить бомбу и укрыться
    const clearStart = {
      '1,1': 1,
      '2,1': 1,
      '1,2': 1
    };
    bomberExit = { x: (gridW - 2) * cell, y: (gridH - 2) * cell, w: cell, h: cell };
    const exitKey = (gridW - 2) + ',' + (gridH - 2);

    const softBlocks = [];
    for (let i = 1; i < gridW - 1; i++) {
      for (let j = 1; j < gridH - 1; j++) {
        const key = i + ',' + j;
        if (hard[key] || clearStart[key]) continue;
        if (key === exitKey || Math.random() < 0.62) {
          const block = {
            x: i * cell, y: j * cell, w: cell, h: cell,
            solid: true, breakable: true, hasLife: false
          };
          bomberWalls.push(block);
          if (key !== exitKey) softBlocks.push(block);
        }
      }
    }

    // В одном случайном мягком блоке — бонус +1 жизнь
    if (softBlocks.length) {
      softBlocks[randInt(0, softBlocks.length - 1)].hasLife = true;
    }

    const enemyPos = [
      [3, 3], [5, 5], [7, 3], [9, 7], [12, 4], [15, 8], [17, 5], [4, 8], [14, 2]
    ];
    for (let [gi, gj] of enemyPos) {
      if (hard[gi + ',' + gj]) continue;
      // Не ставить врагов прямо у спавна
      if (clearStart[gi + ',' + gj] || (gi === 2 && gj === 2)) continue;
      bomberWalls = bomberWalls.filter(w => !(w.breakable && w.x === gi * cell && w.y === gj * cell));
      const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
      const d = dirs[randInt(0, 3)];
      const spd = 1.15;
      bomberEnemies.push({
        x: gi * cell + 5,
        y: gj * cell + 5,
        w: 30, h: 30,
        vx: d[0] * spd,
        vy: d[1] * spd,
        speed: spd,
        chaseSpeed: 1.55,
        alive: true,
        aggro: false,
        aggroTimer: 0,
        turnTimer: randInt(40, 100)
      });
    }

    // Спавн в левом верхнем углу
    bomberPlayer = {
      x: cell + 6,
      y: cell + 6,
      w: 28, h: 28,
      vx: 0, vy: 0,
      alive: true,
      speed: 3,
      moving: false
    };
  }

  function bomberSolidAt(gx, gy, ignoreBreakable) {
    if (gx < 0 || gy < 0 || gx >= BOMBER_GRID_W || gy >= BOMBER_GRID_H) return true;
    for (let wall of bomberWalls) {
      if (!wall.solid) continue;
      if (ignoreBreakable && wall.breakable) continue;
      if (wall.x === gx * BOMBER_CELL && wall.y === gy * BOMBER_CELL) return true;
    }
    return false;
  }

  // Видит игрока только по прямой (горизонталь/вертикаль), не сквозь блоки, до 3 клеток
  function bomberEnemySeesPlayer(egx, egy, pgx, pgy) {
    if (egx !== pgx && egy !== pgy) return false;
    const dist = Math.abs(egx - pgx) + Math.abs(egy - pgy);
    if (dist === 0 || dist > 3) return false;

    if (egy === pgy) {
      const step = pgx > egx ? 1 : -1;
      for (let x = egx + step; x !== pgx; x += step) {
        if (bomberSolidAt(x, egy)) return false;
      }
    } else {
      const step = pgy > egy ? 1 : -1;
      for (let y = egy + step; y !== pgy; y += step) {
        if (bomberSolidAt(egx, y)) return false;
      }
    }
    return true;
  }

  function pickBomberEnemyDir(e, towardPlayer) {
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    const gx = Math.floor((e.x + e.w / 2) / BOMBER_CELL);
    const gy = Math.floor((e.y + e.h / 2) / BOMBER_CELL);
    const spd = e.aggro ? e.chaseSpeed : e.speed;

    if (towardPlayer && bomberPlayer && bomberPlayer.alive) {
      const pgx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / BOMBER_CELL);
      const pgy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / BOMBER_CELL);
      dirs.sort((a, b) => {
        const da = Math.abs(gx + a[0] - pgx) + Math.abs(gy + a[1] - pgy);
        const db = Math.abs(gx + b[0] - pgx) + Math.abs(gy + b[1] - pgy);
        return da - db;
      });
    } else {
      for (let i = dirs.length - 1; i > 0; i--) {
        const j = randInt(0, i);
        [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
      }
    }

    for (let [dx, dy] of dirs) {
      if (!bomberSolidAt(gx + dx, gy + dy)) {
        e.vx = dx * spd;
        e.vy = dy * spd;
        return;
      }
    }
    e.vx = 0;
    e.vy = 0;
  }

  // Кратчайший шаг к игроку в обход блоков (BFS)
  function bomberPathNextStep(egx, egy, pgx, pgy) {
    if (egx === pgx && egy === pgy) return null;
    const key = (x, y) => x + ',' + y;
    const q = [[egx, egy]];
    const came = {};
    came[key(egx, egy)] = null;
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    let found = false;
    let guard = 0;

    while (q.length && guard++ < 400) {
      const [x, y] = q.shift();
      if (x === pgx && y === pgy) {
        found = true;
        break;
      }
      for (let [dx, dy] of dirs) {
        const nx = x + dx;
        const ny = y + dy;
        const k = key(nx, ny);
        if (came[k] !== undefined) continue;
        const isGoal = nx === pgx && ny === pgy;
        if (!isGoal && bomberSolidAt(nx, ny)) continue;
        came[k] = [x, y];
        q.push([nx, ny]);
      }
    }

    if (!found) return null;

    let cur = [pgx, pgy];
    while (true) {
      const prev = came[key(cur[0], cur[1])];
      if (!prev) return null;
      if (prev[0] === egx && prev[1] === egy) return cur;
      cur = prev;
    }
  }

  // Идти к игроку, обходя блоки
  function chaseBomberPlayer(e) {
    if (!bomberPlayer || !bomberPlayer.alive) return;
    const spd = e.chaseSpeed;
    const cell = BOMBER_CELL;
    const egx = Math.floor((e.x + e.w / 2) / cell);
    const egy = Math.floor((e.y + e.h / 2) / cell);
    const pgx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / cell);
    const pgy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / cell);

    // Цель центра клетки следующего шага
    let tx = bomberPlayer.x + bomberPlayer.w / 2;
    let ty = bomberPlayer.y + bomberPlayer.h / 2;

    const next = bomberPathNextStep(egx, egy, pgx, pgy);
    if (next) {
      tx = next[0] * cell + cell / 2;
      ty = next[1] * cell + cell / 2;
    } else {
      // Пути нет — хотя бы жадный шаг, если свободен
      pickBomberEnemyDir(e, true);
      return;
    }

    const cx = e.x + e.w / 2;
    const cy = e.y + e.h / 2;
    const dx = tx - cx;
    const dy = ty - cy;

    // Двигаемся по одной оси за раз (как по сетке)
    if (Math.abs(dx) > Math.abs(dy)) {
      e.vy = 0;
      e.vx = dx > 2 ? spd : (dx < -2 ? -spd : 0);
      if (e.vx === 0 && Math.abs(dy) > 2) {
        e.vy = dy > 0 ? spd : -spd;
      }
    } else {
      e.vx = 0;
      e.vy = dy > 2 ? spd : (dy < -2 ? -spd : 0);
      if (e.vy === 0 && Math.abs(dx) > 2) {
        e.vx = dx > 0 ? spd : -spd;
      }
    }
  }

  function placeBomberBomb() {
    if (!bomberPlayer || !bomberPlayer.alive) return;
    const cell = BOMBER_CELL;
    const gx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / cell);
    const gy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / cell);
    const bx = gx * cell, by = gy * cell;
    if (bomberBombs.some(b => b.x === bx && b.y === by)) return;
    bomberBombs.push({ x: bx, y: by, w: cell, h: cell, timer: 100, range: 2 });
  }

  function explodeBomberBomb(bomb) {
    const cell = BOMBER_CELL;
    const gx = bomb.x / cell;
    const gy = bomb.y / cell;
    const hitCells = [[gx, gy]];
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    for (let [dx, dy] of dirs) {
      for (let r = 1; r <= bomb.range; r++) {
        const cx = gx + dx * r;
        const cy = gy + dy * r;
        let blocked = false;
        let brokeSoft = false;
        for (let i = bomberWalls.length - 1; i >= 0; i--) {
          const wall = bomberWalls[i];
          if (wall.x === cx * cell && wall.y === cy * cell) {
            if (wall.breakable) {
              if (wall.hasLife) {
                bomberPickups.push({
                  x: wall.x + 8, y: wall.y + 8, w: 24, h: 24,
                  type: 'life', anim: 0
                });
              }
              bomberWalls.splice(i, 1);
              brokeSoft = true;
            } else {
              blocked = true;
            }
            break;
          }
        }
        if (blocked) break;
        hitCells.push([cx, cy]);
        if (brokeSoft) break;
      }
    }

    for (let [cx, cy] of hitCells) {
      bomberExplosions.push({
        x: cx * cell, y: cy * cell, w: cell, h: cell, timer: 22
      });
      for (let e of bomberEnemies) {
        if (!e.alive) continue;
        const egx = Math.floor((e.x + e.w / 2) / cell);
        const egy = Math.floor((e.y + e.h / 2) / cell);
        if (egx === cx && egy === cy) e.alive = false;
      }
      if (bomberPlayer && bomberPlayer.alive) {
        const pgx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / cell);
        const pgy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / cell);
        if (pgx === cx && pgy === cy) bomberPlayer.alive = false;
      }
    }
  }

  function drawMenuLogo() {
    const lctx = menuLogoCtx;
    const S = 140;
    lctx.clearRect(0, 0, S, S);
    lctx.save();
    lctx.translate(S / 2, S / 2 + 8);

    // мягкое свечение
    const glow = lctx.createRadialGradient(0, 0, 10, 0, 0, 60);
    glow.addColorStop(0, 'rgba(247,212,74,0.35)');
    glow.addColorStop(1, 'rgba(247,212,74,0)');
    lctx.fillStyle = glow;
    lctx.beginPath();
    lctx.arc(0, 0, 60, 0, Math.PI * 2);
    lctx.fill();

    // шапка
    lctx.fillStyle = '#d44c4c';
    lctx.beginPath();
    lctx.moveTo(0, -52);
    lctx.quadraticCurveTo(48, -10, 36, 18);
    lctx.lineTo(-36, 18);
    lctx.quadraticCurveTo(-48, -10, 0, -52);
    lctx.fill();
    lctx.fillStyle = '#fff';
    lctx.fillRect(-38, 10, 76, 12);
    lctx.beginPath();
    lctx.arc(0, -52, 12, 0, Math.PI * 2);
    lctx.fill();

    // лицо
    lctx.fillStyle = '#f7d8b0';
    lctx.fillRect(-28, -8, 56, 40);
    // борода
    lctx.fillStyle = '#e8d5b0';
    lctx.beginPath();
    lctx.moveTo(-24, 18);
    lctx.quadraticCurveTo(0, 52, 24, 18);
    lctx.closePath();
    lctx.fill();
    // глаза
    lctx.fillStyle = '#222';
    lctx.fillRect(-16, 0, 10, 10);
    lctx.fillRect(6, 0, 10, 10);
    lctx.fillStyle = '#fff';
    lctx.fillRect(-13, 2, 4, 4);
    lctx.fillRect(9, 2, 4, 4);
    // нос
    lctx.fillStyle = '#d49a6a';
    lctx.beginPath();
    lctx.arc(8, 12, 7, 0, Math.PI * 2);
    lctx.fill();
    // улыбка
    lctx.strokeStyle = '#c0392b';
    lctx.lineWidth = 2;
    lctx.beginPath();
    lctx.arc(0, 20, 10, 0.15, Math.PI - 0.15);
    lctx.stroke();

    // монетка рядом
    lctx.translate(48, -28);
    lctx.fillStyle = '#2ecc71';
    lctx.beginPath();
    lctx.arc(0, 0, 16, 0, Math.PI * 2);
    lctx.fill();
    lctx.strokeStyle = '#1e8449';
    lctx.lineWidth = 2;
    lctx.stroke();
    lctx.fillStyle = '#145a32';
    lctx.font = 'bold 16px Segoe UI, Arial';
    lctx.textAlign = 'center';
    lctx.textBaseline = 'middle';
    lctx.fillText('G', 0, 1);

    lctx.restore();
  }

  function drawCutsceneGnome(ctx, x, y, facing, opts) {
    opts = opts || {};
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(facing, 1);
    ctx.fillStyle = '#d44c4c';
    ctx.beginPath();
    ctx.arc(0, -8, 18, 0, Math.PI, true);
    ctx.fill();
    ctx.fillStyle = '#f7d8b0';
    ctx.fillRect(-12, -8, 24, 18);
    ctx.fillStyle = '#e0c8a0';
    ctx.fillRect(-10, 6, 20, 12);
    ctx.fillStyle = '#222';
    if (opts.shocked) {
      ctx.beginPath();
      ctx.arc(-5, -2, 3.5, 0, Math.PI * 2);
      ctx.arc(5, -2, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-5, -2, 1.5, 0, Math.PI * 2);
      ctx.arc(5, -2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(2, 8, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (opts.thinking) {
      ctx.fillRect(-7, -3, 5, 4);
      ctx.fillRect(2, -3, 5, 4);
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-8, -8);
      ctx.lineTo(-3, -6);
      ctx.moveTo(8, -8);
      ctx.lineTo(3, -6);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 10, 3, 0.2, Math.PI - 0.2);
      ctx.stroke();
    } else if (opts.sad) {
      ctx.fillRect(-7, -3, 5, 5);
      ctx.fillRect(2, -3, 5, 5);
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 12, 5, Math.PI * 1.1, Math.PI * 1.9);
      ctx.stroke();
    } else {
      ctx.fillRect(-7, -3, 5, 5);
      ctx.fillRect(2, -3, 5, 5);
    }
    ctx.fillStyle = '#d49a6a';
    ctx.beginPath();
    ctx.arc(5, 2, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6b4f3c';
    ctx.fillRect(-10, 18, 8, 10);
    ctx.fillRect(2, 18, 8, 10);
    if (opts.kiss) {
      ctx.fillStyle = '#e91e63';
      ctx.beginPath();
      ctx.ellipse(opts.hardKiss ? 18 : 14, 4, opts.hardKiss ? 8 : 5, opts.hardKiss ? 5 : 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (opts.hardKiss) {
      // руки гномика «хватают» при поцелуе
      ctx.fillStyle = '#f7d8b0';
      ctx.fillRect(10, 6, 16, 7);
      ctx.fillRect(12, 12, 14, 7);
    }
    if (opts.thinking) {
      // рука у подбородка
      ctx.fillStyle = '#f7d8b0';
      ctx.beginPath();
      ctx.ellipse(12, 6, 5, 7, 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d49a6a';
      ctx.beginPath();
      ctx.arc(14, 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCutsceneChild(ctx, x, y, facing, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(facing, 1);
