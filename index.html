<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Гномик и зеленая монетка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: #1a1f2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .game-wrapper {
      background: #10131f;
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      text-align: center;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      width: 800px !important;
      height: 450px !important;
      max-width: none;
      border-radius: 0;
      background: #8bb8d4;
      border: 3px solid #3a415a;
      /* запрет размытия при масштабе браузера */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      -ms-interpolation-mode: nearest-neighbor;
    }
    .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 10px 8px;
      color: #b5c7e8;
      font-size: 18px;
      font-weight: bold;
    }
    .info span {
      background: #181e2e;
      padding: 4px 16px;
      border-radius: 40px;
      border: 1px solid #2f3850;
    }
    .controls {
      margin-top: 10px;
      color: #8a9bbf;
      background: #181e2e;
      padding: 8px 18px;
      border-radius: 60px;
      display: inline-block;
      border: 1px solid #2f3850;
      font-size: 16px;
    }
    .controls kbd {
      background: #2f3850;
      color: #fff;
      padding: 2px 12px;
      border-radius: 30px;
      font-weight: bold;
      margin: 0 4px;
    }
    button {
      background: #3f5a8c;
      border: none;
      color: #fff;
      font-size: 16px;
      padding: 6px 24px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      margin-left: 15px;
    }
    button:hover { background: #5a79b5; transform: scale(1.03); }
    #message {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: bold;
      color: #f7d44a;
      min-height: 26px;
      height: auto;
      text-align: center;
    }
    #message:empty {
      margin: 0;
      min-height: 0;
    }
    .fs-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 2000;
      width: 48px;
      height: 48px;
      margin: 0;
      padding: 0;
      border-radius: 14px;
      border: 2px solid #3a415a;
      background: #181e2e;
      color: #f7d44a;
      font-size: 22px;
      line-height: 1;
      box-shadow: 0 8px 20px rgba(0,0,0,0.45);
    }
    .fs-btn:hover { background: #2a3348; transform: scale(1.06); }
    .game-wrapper.is-fullscreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
      padding: 10px 12px 72px;
      border-radius: 0;
      box-shadow: none;
      background: #0a0c14;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      z-index: 1500;
      overflow: hidden;
    }
    .game-wrapper.is-fullscreen .canvas-wrap {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
    }
    .game-wrapper.is-fullscreen #gameCanvas {
      width: min(100vw - 24px, calc((100vh - 140px) * 800 / 450)) !important;
      height: auto !important;
      max-height: calc(100vh - 140px) !important;
      aspect-ratio: 800 / 450;
    }
    .game-wrapper.is-fullscreen .info,
    .game-wrapper.is-fullscreen .controls {
      position: relative;
      z-index: 2;
      margin: 6px 0 0;
    }
    .game-wrapper.is-fullscreen #message {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      padding: 8px 18px;
      border-radius: 12px;
      background: rgba(16, 20, 36, 0.88);
      border: 1px solid #3a415a;
      z-index: 5;
      pointer-events: none;
      height: auto;
      min-height: 0;
      max-width: min(90vw, 720px);
      text-align: center;
    }
    .game-wrapper.is-fullscreen #message:empty {
      display: none;
      padding: 0;
      border: none;
      background: none;
    }
    body.fs-lock {
      overflow: hidden;
      height: 100vh;
    }
    .canvas-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    #gameOverOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.55);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 5;
    }
    #gameOverOverlay.visible {
      display: flex;
    }
    #gameOverOverlay .over-title {
      font-size: 42px;
      font-weight: bold;
      color: #ff6b6b;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #gameOverOverlay .over-title.win {
      color: #f7d44a;
    }
    #restartOverlayBtn {
      margin-left: 0;
      font-size: 22px;
      padding: 14px 40px;
      background: #c0392b;
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    }
    #restartOverlayBtn:hover { background: #e74c3c; }
    #pauseOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(10, 14, 28, 0.72);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 6;
    }
    #pauseOverlay.visible { display: flex; }
    #pauseOverlay .pause-title {
      font-size: 48px;
      font-weight: bold;
      color: #f7d44a;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    #pauseOverlay .pause-hint {
      color: #b5c7e8;
      font-size: 18px;
    }
    #menuOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(16, 28, 48, 0.55) 0%, rgba(10, 16, 28, 0.82) 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 7;
    }
    #menuOverlay.visible { display: flex; }
    #menuLogo {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.45));
    }
    #menuTitle {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 42px;
      font-weight: bold;
      color: #f7d44a;
      text-shadow: 0 3px 0 #8b6914, 0 8px 24px rgba(0,0,0,0.5);
      letter-spacing: 0.5px;
      max-width: 90%;
      line-height: 1.2;
    }
    #menuSubtitle {
      color: #b5c7e8;
      font-size: 16px;
      margin-top: -6px;
    }
    #playBtn {
      margin-left: 0;
      margin-top: 10px;
      font-size: 26px;
      padding: 14px 56px;
      border-radius: 60px;
      background: linear-gradient(180deg, #5a9e3e, #3d7a28);
      border: 3px solid #c8e6a0;
      box-shadow: 0 8px 0 #2a5518, 0 12px 24px rgba(0,0,0,0.4);
    }
    #playBtn:hover {
      background: linear-gradient(180deg, #6bb84a, #4a8f32);
      transform: translateY(-2px) scale(1.03);
    }
    #playBtn:active {
      transform: translateY(4px) scale(0.99);
      box-shadow: 0 3px 0 #2a5518, 0 6px 12px rgba(0,0,0,0.35);
    }
    #skipStoryBtn {
      margin-left: 0;
      margin-top: 4px;
      font-size: 15px;
      padding: 10px 28px;
      border-radius: 60px;
      background: linear-gradient(180deg, #5c6bc0, #3949ab);
      border: 2px solid #9fa8da;
      box-shadow: 0 5px 0 #1a237e, 0 8px 16px rgba(0,0,0,0.35);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    #skipStoryBtn:hover {
      background: linear-gradient(180deg, #7986cb, #5c6bc0);
      transform: translateY(-2px) scale(1.02);
    }

    #classOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(12, 10, 28, 0.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 8;
      padding: 20px;
    }
    #classOverlay.visible { display: flex; }
    #classOverlay .class-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 34px;
      color: #f7d44a;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #classOverlay .class-sub {
      color: #f8bbd0;
      font-size: 16px;
      margin-bottom: 8px;
    }
    #classCards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .class-card {
      width: 168px;
      margin-left: 0;
      padding: 14px 10px 16px;
      border-radius: 18px;
      border: 3px solid rgba(255,255,255,0.25);
      background: linear-gradient(180deg, #3a3158, #241e38);
      box-shadow: 0 10px 24px rgba(0,0,0,0.4);
      text-align: center;
      color: #fff;
    }
    .class-card:hover { transform: translateY(-3px) scale(1.03); }
    .class-card .cn { font-size: 20px; font-weight: bold; margin-bottom: 6px; }
    .class-card .cd { font-size: 12px; color: #c5cae9; line-height: 1.35; }
    .class-card.mage { border-color: #7e57c2; }
    .class-card.swordsman { border-color: #ef5350; }
    .class-card.archer { border-color: #66bb6a; }
    .class-card.summoner { border-color: #ffb74d; }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div id="message"></div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="menuOverlay" class="visible">
      <canvas id="menuLogo" width="140" height="140"></canvas>
      <div id="menuTitle">Гномик и зеленая монетка</div>
      <div id="menuSubtitle">Мышь: наведение и клик по кнопкам · перетаскивание в инвентаре</div>
      <button id="playBtn">▶ Играть</button>
      <button id="skipStoryBtn" type="button">Играть без сюжета</button>
    </div>
    <div id="gameOverOverlay">
      <div class="over-title" id="overTitle">💀 КОНЕЦ</div>
      <button id="restartOverlayBtn">🔄 Заново</button>
    </div>

    <div id="classOverlay">
      <div class="class-title">Кем стать?</div>
      <div class="class-sub">Девочка-администратор предлагает выбрать путь искателя</div>
      <div id="classCards">
        <button class="class-card mage" data-class="mage" type="button">
          <div class="cn">Маг</div>
          <div class="cd">Старт: 5 HP · 5 маны<br>Навык «Шар» 1 ур. (1 урон)</div>
        </button>
        <button class="class-card swordsman" data-class="swordsman" type="button">
          <div class="cn">Мечник</div>
          <div class="cd">Старт: 5 HP<br>Меч + «Рассекание» 1 ур.</div>
        </button>
        <button class="class-card archer" data-class="archer" type="button">
          <div class="cn">Лучник</div>
          <div class="cd">Старт: 5 HP<br>Лук + «Выстрел» 1 ур.</div>
        </button>
        <button class="class-card summoner" data-class="summoner" type="button">
          <div class="cn">Призыватель</div>
          <div class="cd">Старт: 5 HP · 5 маны<br>«Скелет-страж» · сломанный тотем</div>
        </button>
      </div>
    </div>
    <div id="pauseOverlay">
      <div class="pause-title">⏸ ПАУЗА</div>
      <div class="pause-hint">Нажми <kbd style="background:#2f3850;color:#fff;padding:2px 10px;border-radius:8px;">Esc</kbd> чтобы продолжить</div>
    </div>
  </div>
  <div class="info" id="hudClassic">
    <span>🪙 <span id="coinDisplay">0</span></span>
    <span>❤️ <span id="livesDisplay">5</span></span>
    <span>🏆 <span id="levelDisplay">Марио</span></span>
    <button id="restartBtn">🔄 Заново</button>
  </div>
  <div class="info" id="hudAdventure" style="display:none;">
    <span title="Медные">🟤 <span id="copperDisplay">0</span></span>
    <span title="Серебряные">⚪ <span id="silverDisplay">0</span></span>
    <span title="Золотые">🟡 <span id="goldDisplay">0</span></span>
    <span>🏆 <span id="advLevelDisplay">Город</span></span>
    <button id="restartBtnAdv">🔄 Заново</button>
  </div>
  <div class="controls" id="controlsHint">
    <kbd>WASD</kbd>/<kbd>стрелки</kbd> – ход &nbsp;|&nbsp; в Марио: <kbd>A/D</kbd> + <kbd>W</kbd>/<kbd>Пробел</kbd> прыжок
  </div>
</div>
<button id="fsBtn" class="fs-btn" type="button" title="На весь экран / свернуть">⛶</button>

<script>
  // ============================================================
  //  ИГРА «ГНОМИК И ЗЕЛЁНАЯ МОНЕТА»
  //  Платформер + бомбермен + босс-дракон
  // ============================================================

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const W = 800, H = 450;

  // Рендер в целочисленный 2×/3× буфер — без дробного DPR (из‑за него мылит)
  function setupCrispCanvas() {
    const dpr = Math.max(1, Math.round(window.devicePixelRatio || 1));
    const scale = Math.max(2, dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = W * scale;
    canvas.height = H * scale;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
    ctx.imageSmoothingEnabled = false;
    if ('imageSmoothingQuality' in ctx) ctx.imageSmoothingQuality = 'low';
  }
  setupCrispCanvas();
  window.addEventListener('resize', setupCrispCanvas);

  function ensureCrispDraw() {
    ctx.imageSmoothingEnabled = false;
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'rgba(0,0,0,0)';
  }

  // Пиксельные курсоры (16×16, увеличены в 2 раза)
  function buildPixelCursor(pixels, hx, hy, scale) {
    scale = scale || 2;
    const n = 16;
    const c = document.createElement('canvas');
    c.width = n * scale;
    c.height = n * scale;
    const g = c.getContext('2d');
    g.imageSmoothingEnabled = false;
    for (let y = 0; y < n; y++) {
      for (let x = 0; x < n; x++) {
        const ch = pixels[y][x];
        if (ch === '.' || ch === ' ') continue;
        if (ch === '#') g.fillStyle = '#1a1a1a';
        else if (ch === 'W') g.fillStyle = '#ffffff';
        else if (ch === 'Y') g.fillStyle = '#ffe082';
        else if (ch === 'G') g.fillStyle = '#c8e6a0';
        else continue;
        g.fillRect(x * scale, y * scale, scale, scale);
      }
    }
    return 'url(' + c.toDataURL('image/png') + ') ' + (hx * scale) + ' ' + (hy * scale) + ', auto';
  }

  const PIXEL_CURSORS = {
    default: buildPixelCursor([
      'W...............',
      'WW..............',
      'W#W.............',
      'W##W............',
      'W###W...........',
      'W####W..........',
      'W#####W.........',
      'W######W........',
      'W#######W.......',
      'W#####WWWW......',
      'W###W#W.........',
      'W##W.#W.........',
      'W#W...#W........',
      'WW.....#W.......',
      'W.......#W......',
      '.........WW.....'
    ], 0, 0),
    pointer: buildPixelCursor([
      '....WW..........',
      '...W##W.........',
      '...W##W.........',
      '...W##W.........',
      '...W##WWWWW.....',
      '...W##W###W#W...',
      'WWW##W###W#W...',
      'W#######W#W....',
      'W#W#####W#W....',
      '.W.W####W#W....',
      '...W####W#W....',
      '...W####WW.....',
      '...W##W##W.....',
      '...W#W.W#W.....',
      '...WW...WW.....',
      '................'
    ], 5, 0),
    grab: buildPixelCursor([
      '......YY........',
      '.....Y##Y.......',
      '...YY#Y##Y.YY...',
      '..Y##Y####Y##Y..',
      '.Y############Y.',
      '.Y############Y.',
      '.Y############Y.',
      '..Y##########Y..',
      '..Y##########Y..',
      '...Y########Y...',
      '...Y########Y...',
      '....Y######Y....',
      '....Y######Y....',
      '.....Y####Y.....',
      '.....YYYYYY.....',
      '................'
    ], 8, 8),
    grabbing: buildPixelCursor([
      '................',
      '....YYYYYY......',
      '...Y######Y.....',
      '..Y########Y....',
      '.Y##########Y...',
      '.Y##########Y...',
      '.Y##########Y...',
      '..Y########Y....',
      '..Y########Y....',
      '...Y######Y.....',
      '...Y######Y.....',
      '....Y####Y......',
      '....Y####Y......',
      '.....YYYY.......',
      '................',
      '................'
    ], 8, 8)
  };

  function setGameCursor(kind) {
    const cur = PIXEL_CURSORS[kind] || PIXEL_CURSORS.default;
    canvas.style.cursor = cur;
  }
  setGameCursor('default');
  // те же пиксельные курсоры на кнопках меню/оверлеев
  document.querySelectorAll('button').forEach(btn => {
    btn.style.cursor = PIXEL_CURSORS.pointer;
  });
  document.body.style.cursor = PIXEL_CURSORS.default;

  const coinSpan = document.getElementById('coinDisplay');
  const livesSpan = document.getElementById('livesDisplay');
  const levelSpan = document.getElementById('levelDisplay');
  const messageDiv = document.getElementById('message');
  const gameWrapper = document.querySelector('.game-wrapper');
  const fsBtn = document.getElementById('fsBtn');

  function refreshMessagePlacement() {
    // в fullscreen все игровые сообщения сверху
    const fs = gameWrapper.classList.contains('is-fullscreen');
    const hasText = !!(messageDiv.textContent || '').trim();
    messageDiv.classList.toggle('msg-top', fs && hasText);
  }

  new MutationObserver(refreshMessagePlacement).observe(messageDiv, {
    childList: true, characterData: true, subtree: true
  });

  function isGameFullscreen() {
    return document.fullscreenElement === gameWrapper || gameWrapper.classList.contains('is-fullscreen');
  }

  function syncFullscreenUi() {
    const on = !!document.fullscreenElement || gameWrapper.classList.contains('is-fullscreen');
    // если браузерный FS активен на wrapper — класс тоже
    if (document.fullscreenElement === gameWrapper) gameWrapper.classList.add('is-fullscreen');
    if (!document.fullscreenElement && gameWrapper.dataset.fsMode !== 'css') {
      gameWrapper.classList.remove('is-fullscreen');
    }
    const active = gameWrapper.classList.contains('is-fullscreen');
    document.body.classList.toggle('fs-lock', active);
    if (fsBtn) fsBtn.textContent = active ? '⛶' : '⛶';
    if (fsBtn) fsBtn.title = active ? 'Свернуть окно' : 'На весь экран';
    refreshMessagePlacement();
    setupCrispCanvas();
  }

  async function toggleGameFullscreen() {
    try {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
        gameWrapper.classList.remove('is-fullscreen');
        gameWrapper.dataset.fsMode = '';
      } else if (gameWrapper.classList.contains('is-fullscreen') && gameWrapper.dataset.fsMode === 'css') {
        gameWrapper.classList.remove('is-fullscreen');
        gameWrapper.dataset.fsMode = '';
      } else if (gameWrapper.requestFullscreen) {
        await gameWrapper.requestFullscreen();
        gameWrapper.classList.add('is-fullscreen');
        gameWrapper.dataset.fsMode = 'native';
      } else {
        gameWrapper.classList.add('is-fullscreen');
        gameWrapper.dataset.fsMode = 'css';
      }
    } catch (err) {
      // fallback без Permission / iframe
      gameWrapper.classList.toggle('is-fullscreen');
      gameWrapper.dataset.fsMode = gameWrapper.classList.contains('is-fullscreen') ? 'css' : '';
    }
    syncFullscreenUi();
  }

  if (fsBtn) fsBtn.addEventListener('click', (ev) => {
    ev.preventDefault();
    toggleGameFullscreen();
  });
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      gameWrapper.classList.remove('is-fullscreen');
      gameWrapper.dataset.fsMode = '';
    }
    syncFullscreenUi();
  });

  // колесо: листать навыки на левелапе, не скроллить страницу
  function onGameWheel(ev) {
    if (rpgUi === 'levelup' && levelUpChoices.length) {
      ev.preventDefault();
      ev.stopPropagation();
      if (ev.deltaY > 0) levelUpFocus = Math.min(levelUpChoices.length - 1, levelUpFocus + 1);
      else levelUpFocus = Math.max(0, levelUpFocus - 1);
      ensureLevelUpInView();
      return;
    }
    if (gameWrapper.classList.contains('is-fullscreen')) {
      ev.preventDefault();
    }
  }
  canvas.addEventListener('wheel', onGameWheel, { passive: false });
  gameWrapper.addEventListener('wheel', onGameWheel, { passive: false });

  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const overTitle = document.getElementById('overTitle');
  const hudClassic = document.getElementById('hudClassic');
  const hudAdventure = document.getElementById('hudAdventure');
  const copperSpan = document.getElementById('copperDisplay');
  const silverSpan = document.getElementById('silverDisplay');
  const goldSpan = document.getElementById('goldDisplay');
  const advLevelSpan = document.getElementById('advLevelDisplay');

  function showRestartOverlay(title, isWin) {
    overTitle.textContent = title;
    overTitle.classList.toggle('win', !!isWin);

  function applyMoveKeys(e, isDown) {
    const k = e.key;
    const code = e.code;
    let handled = false;
    if (k === 'ArrowLeft' || code === 'KeyA' || k === 'a' || k === 'A' || k === 'ф' || k === 'Ф') {
      keys.ArrowLeft = isDown; handled = true;
    }
    if (k === 'ArrowRight' || code === 'KeyD' || k === 'd' || k === 'D' || k === 'в' || k === 'В') {
      keys.ArrowRight = isDown; handled = true;
    }
    if (k === 'ArrowUp' || code === 'KeyW' || k === 'w' || k === 'W' || k === 'ц' || k === 'Ц') {
      keys.ArrowUp = isDown; handled = true;
    }
    if (k === 'ArrowDown' || code === 'KeyS' || k === 's' || k === 'S' || k === 'ы' || k === 'Ы') {
      keys.ArrowDown = isDown; handled = true;
    }
    if (k === ' ' || code === 'Space') {
      keys.Space = isDown; handled = true;
    }
    if (code === 'ShiftLeft' || code === 'ShiftRight' || k === 'Shift') {
      keys.Shift = isDown; handled = true;
    }
    if (code === 'KeyQ' || k === 'q' || k === 'Q' || k === 'й' || k === 'Й') {
      keys.KeyQ = isDown; handled = true;
    }
    if (handled) e.preventDefault();
    return handled;
  }

  function hasSprintBoots() {

  function aimTownAt(tx, ty) {
    const p = townPlayer;
    if (!p) return { dx: 1, dy: 0 };
    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;
    let dx = tx - cx;
    let dy = ty - cy;
    const len = Math.hypot(dx, dy);
    if (len < 2) {
      dx = p.facing || 1;
      dy = 0;
    } else {
      dx /= len;
      dy /= len;
    }
    p.dirX = dx;
    p.dirY = dy;
    if (Math.abs(dx) >= Math.abs(dy)) p.facing = dx < 0 ? -1 : 1;
    return { dx, dy };
  }

  function doTownPunch() {
    if (!townPlayer || rpgUi || townPunchCd > 0 || paused) return;
    const { dx, dy } = aimTownAt(mousePos.x, mousePos.y);
    townPunchCd = 16;
    const dmg = Math.max(1, 1 + getWeaponDamage());
    const cx = townPlayer.x + townPlayer.w / 2;
    const cy = townPlayer.y + townPlayer.h / 2;
    townProjectiles.push({
      kind: 'slash',
      x: cx + dx * 16,
      y: cy + dy * 16,
      vx: 0, vy: 0,
      r: 18,
      damage: dmg,
      life: 10,
      color: '#ffcc80',
      dirX: dx,
      dirY: dy
    });
  }

  function rand(min, max) { return Math.random() * (max - min) + min; }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
  function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;

  class Player {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.w = 28;
      this.h = 36;
      this.vx = 0;
      this.vy = 0;
      this.onGround = false;
      this.speed = 4;
      this.jumpPower = -12;
      this.gravity = 0.45;
      this.facing = 1;
      this.alive = true;
      this.hasGun = false;
    }

    update() {
      if (!this.alive) return;

      if (keys.ArrowLeft) { this.vx = -this.speed; this.facing = -1; }
      else if (keys.ArrowRight) { this.vx = this.speed; this.facing = 1; }
      else { this.vx *= 0.8; if (Math.abs(this.vx) < 0.1) this.vx = 0; }

      if ((keys.ArrowUp || keys.Space) && this.onGround) {
        this.vy = this.jumpPower;
        this.onGround = false;
      }

      this.vy += this.gravity;
      if (this.vy > 12) this.vy = 12;

      this.x += this.vx;
      for (let p of platforms) {
        if (rectCollide(this, p)) {
          if (this.vx > 0) this.x = p.x - this.w;
          else if (this.vx < 0) this.x = p.x + p.w;
          this.vx = 0;
        }
      }

      this.y += this.vy;
      this.onGround = false;
      for (let p of platforms) {
        if (rectCollide(this, p)) {
          if (this.vy > 0) {
            this.y = p.y - this.h;
            this.vy = 0;
            this.onGround = true;
          } else if (this.vy < 0) {
            this.y = p.y + p.h;
            this.vy = 0;
          }
        }
      }

      if (this.x < 0) this.x = 0;
      if (this.x + this.w > W) this.x = W - this.w;
      if (this.y > H + 50) this.alive = false;
    }

    draw(ctx) {
      if (!this.alive) return;
      ctx.save();
      ctx.translate(Math.round(this.x + this.w / 2), Math.round(this.y + this.h / 2));
      ctx.scale(this.facing, 1);

      const walking = this.onGround && Math.abs(this.vx) > 0.35;
      const air = !this.onGround;
      const phase = walking ? frame * 0.42 : 0;
      const leftSwing = walking ? Math.sin(phase) * 7 : (air ? -2 : 0);
      const rightSwing = walking ? Math.sin(phase + Math.PI) * 7 : (air ? 2 : 0);
      const bob = walking ? Math.abs(Math.sin(phase)) * 1.2 : 0;
      const armSwing = walking ? Math.sin(phase) * 4 : (air ? 5 : 0);
      ctx.translate(0, -bob);

      // тень под ногами
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(0, 18, 12, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // ноги
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(-8 + leftSwing * 0.25, 10 + Math.max(0, -leftSwing) * 0.15, 6, 9);
      ctx.fillRect(2 + rightSwing * 0.25, 10 + Math.max(0, -rightSwing) * 0.15, 6, 9);
      ctx.fillStyle = '#3e2723';
      ctx.fillRect(-9 + leftSwing * 0.35, 17 + Math.max(0, leftSwing) * 0.12, 8, 4);
      ctx.fillRect(1 + rightSwing * 0.35, 17 + Math.max(0, rightSwing) * 0.12, 8, 4);

      // туловище
      const bodyGrad = ctx.createLinearGradient(-10, -2, 10, 12);
      bodyGrad.addColorStop(0, '#ef9a9a');
      bodyGrad.addColorStop(0.45, '#e57373');
      bodyGrad.addColorStop(1, '#c62828');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(-11, 2);
      ctx.quadraticCurveTo(-12, 14, -8, 16);
      ctx.lineTo(8, 16);
      ctx.quadraticCurveTo(12, 14, 11, 2);
      ctx.closePath();
      ctx.fill();
      // пояс
      ctx.fillStyle = '#fff8e1';
      ctx.fillRect(-11, 6, 22, 3.5);
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.arc(0, 8, 2.2, 0, Math.PI * 2);
      ctx.fill();

      // руки
      ctx.fillStyle = '#f7d8b0';
      ctx.fillRect(-14, 1 + armSwing * 0.2, 4, 9);
      ctx.fillRect(10, 1 - armSwing * 0.2, 4, 9);

      // голова
      const skin = ctx.createRadialGradient(-2, -6, 2, 0, -4, 12);
      skin.addColorStop(0, '#ffe0c2');
      skin.addColorStop(1, '#f0c4a0');
      ctx.fillStyle = skin;
      ctx.beginPath();
      ctx.ellipse(0, -4, 11, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      // шапка-колпак
      const hat = ctx.createLinearGradient(0, -22, 0, 2);
      hat.addColorStop(0, '#ef5350');
      hat.addColorStop(0.55, '#e53935');
      hat.addColorStop(1, '#b71c1c');
      ctx.fillStyle = hat;
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.quadraticCurveTo(16, -8, 13, 4);
      ctx.lineTo(-13, 4);
      ctx.quadraticCurveTo(-16, -8, 0, -24);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(-13, 2, 26, 3.5);
      ctx.beginPath();
      ctx.arc(0, -24, 3.5, 0, Math.PI * 2);
      ctx.fill();

      // глаза
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(-4, -5, 3.2, 3.6, 0, 0, Math.PI * 2);
      ctx.ellipse(4, -5, 3.2, 3.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a237e';
      ctx.beginPath();
      ctx.arc(-3.2, -4.5, 1.6, 0, Math.PI * 2);
      ctx.arc(4.8, -4.5, 1.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-3.7, -5.1, 0.6, 0, Math.PI * 2);
      ctx.arc(4.3, -5.1, 0.6, 0, Math.PI * 2);
      ctx.fill();

      // румянец + носик
      ctx.fillStyle = 'rgba(239, 154, 154, 0.55)';
      ctx.beginPath();
      ctx.ellipse(-7.5, -1, 2.2, 1.4, 0, 0, Math.PI * 2);
      ctx.ellipse(7.5, -1, 2.2, 1.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e8a070';
      ctx.beginPath();
      ctx.arc(0.5, -1.5, 2.2, 0, Math.PI * 2);
      ctx.fill();

      if (this.hasGun) {
        ctx.fillStyle = '#37474f';
        ctx.fillRect(8, 0, 22, 6);
        ctx.fillStyle = '#263238';
        ctx.fillRect(26, 1, 8, 4);
        ctx.fillStyle = '#90a4ae';
        ctx.fillRect(10, 6, 6, 7);
      }
      ctx.restore();
    }
  }

  class Platform {
    constructor(x, y, w, h, color = '#6b8c42') {
      this.x = x; this.y = y; this.w = w; this.h = h;
      this.color = color;
      this.isGround = h >= 36;
    }
    draw(ctx) {
      const { x, y, w, h } = this;
      const grassH = this.isGround ? 10 : 6;
      // земля / доски
      const dirt = ctx.createLinearGradient(x, y, x, y + h);
      if (this.isGround) {
        dirt.addColorStop(0, '#7a5230');
        dirt.addColorStop(0.35, '#5d4037');
        dirt.addColorStop(1, '#3e2723');
      } else {
        dirt.addColorStop(0, '#a1887f');
        dirt.addColorStop(0.5, '#8d6e63');
        dirt.addColorStop(1, '#6d4c41');
      }
      ctx.fillStyle = dirt;
      ctx.fillRect(x, y, w, h);

      // текстура почвы
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y + grassH, w, Math.max(0, h - grassH));
      ctx.clip();
      for (let i = 0; i < Math.ceil(w / 14); i++) {
        const px = x + i * 14 + ((i * 7) % 5);
        const seed = (i * 13 + ((x * 3) | 0)) % 5;
        ctx.fillStyle = seed < 2 ? 'rgba(0,0,0,0.14)' : 'rgba(255,255,255,0.08)';
        ctx.fillRect(px, y + grassH + 2 + seed, 10, Math.max(3, h - grassH - 4 - seed));
      }
      ctx.restore();

      // травяной верх
      const grass = ctx.createLinearGradient(x, y, x, y + grassH);
      grass.addColorStop(0, '#9ccc65');
      grass.addColorStop(0.55, '#7cb342');
      grass.addColorStop(1, '#558b2f');
      ctx.fillStyle = grass;
      ctx.fillRect(x, y, w, grassH);
      // травинки
      ctx.strokeStyle = 'rgba(46, 125, 50, 0.75)';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < w; i += 5) {
        const hx = x + i + ((i * 3) % 3);
        const hh = 3 + ((i * 5 + (x | 0)) % 4);
        ctx.beginPath();
        ctx.moveTo(hx, y + grassH - 1);
        ctx.lineTo(hx + 0.5, y + grassH - 1 - hh);
        ctx.stroke();
      }
      // блик сверху
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fillRect(x, y, w, 2);
      // тень снизу платформы
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(x, y + h - 2, w, 2);
      ctx.strokeStyle = 'rgba(46, 70, 30, 0.55)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    }
  }

  class Enemy {
    constructor(x, y, w = 30, h = 30) {
      this.x = x; this.y = y; this.w = w; this.h = h;
      this.vx = 1.2;
      this.speed = 1.2;
      this.alive = true;
      this.type = 'walker';
      this.chaser = false;
    }

    findPlatform() {
      for (let p of platforms) {
        if (this.y + this.h >= p.y - 2 && this.y + this.h <= p.y + p.h + 8 &&
            this.x + this.w > p.x + 2 && this.x < p.x + p.w - 2) {
          return p;
        }
      }
      return null;
    }

    update() {
      if (!this.alive) return;
      const plat = this.findPlatform();

      if (this.chaser && plat && player && player.alive) {
        const mid = this.x + this.w / 2;
        const target = player.x + player.w / 2;
        if (target < mid - 6) this.vx = -this.speed;
        else if (target > mid + 6) this.vx = this.speed;
        else this.vx = 0;
      }

      this.x += this.vx;

      if (plat) {
        // Не сходить с платформы
        if (this.x < plat.x + 2) {
          this.x = plat.x + 2;
          this.vx = this.chaser ? 0 : Math.abs(this.speed);
        } else if (this.x + this.w > plat.x + plat.w - 2) {
          this.x = plat.x + plat.w - this.w - 2;
          this.vx = this.chaser ? 0 : -Math.abs(this.speed);
        }
      } else {
        // упал с края — разворот
        this.vx *= -1;
        this.x += this.vx;
      }
    }

    draw(ctx) {
      if (!this.alive) return;
      const cx = this.x + this.w / 2;
      const cy = this.y + this.h / 2;
      const phase = frame * 0.28 * Math.sign(this.vx || 1);
      const leg = Math.sin(phase) * 3.5;
      const bob = Math.abs(Math.sin(phase)) * 0.8;
      const cap = this.chaser ? '#8e24aa' : '#e53935';
      const capDark = this.chaser ? '#4a148c' : '#b71c1c';
      const body = this.chaser ? '#ce93d8' : '#ffe0c2';

      ctx.save();
      ctx.translate(cx, cy - bob);
      // тень
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.beginPath();
      ctx.ellipse(0, this.h / 2 - 1, 11, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // ноги
      ctx.fillStyle = this.chaser ? '#7b1fa2' : '#6d4c41';
      ctx.fillRect(-8 + leg * 0.3, 8, 6, 7);
      ctx.fillRect(2 - leg * 0.3, 8, 6, 7);

      // тело
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(-11, 0);
      ctx.lineTo(-11, 10);
      ctx.quadraticCurveTo(-11, 12, -8, 12);
      ctx.lineTo(8, 12);
      ctx.quadraticCurveTo(11, 12, 11, 10);
      ctx.lineTo(11, 0);
      ctx.closePath();
      ctx.fill();

      // голова / шапка
      const hat = ctx.createRadialGradient(-2, -8, 2, 0, -4, 14);
      hat.addColorStop(0, cap);
      hat.addColorStop(1, capDark);
      ctx.fillStyle = hat;
      ctx.beginPath();
      ctx.arc(0, -4, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(-12, 2, 24, 3);

      // глаза
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(-4.5, -6, 3, 3.4, 0, 0, Math.PI * 2);
      ctx.ellipse(4.5, -6, 3, 3.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(-3.5, -5.5, 1.5, 0, Math.PI * 2);
      ctx.arc(5.5, -5.5, 1.5, 0, Math.PI * 2);
      ctx.fill();

      if (this.chaser) {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(-7, -10);
        ctx.lineTo(-2, -7.5);
        ctx.moveTo(7, -10);
        ctx.lineTo(2, -7.5);
        ctx.stroke();
        // рожки
        ctx.fillStyle = '#4a148c';
        ctx.beginPath();
        ctx.moveTo(-8, -14);
        ctx.lineTo(-11, -22);
        ctx.lineTo(-4, -16);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(8, -14);
        ctx.lineTo(11, -22);
        ctx.lineTo(4, -16);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class Coin {
    constructor(x, y, isGreen = false) {
      this.x = x; this.y = y;
      this.r = 12;
      this.isGreen = isGreen;
      this.collected = false;
      this.anim = 0;
    }
    update() { this.anim += 0.08; }
    draw(ctx) {
      if (this.collected) return;
      const bob = Math.sin(this.anim) * 2;
      // вращение монетки (сжатие по X)
      const spin = Math.abs(Math.cos(this.anim * 1.2));
      const rx = Math.max(3, this.r * (0.25 + spin * 0.75));
      const ry = this.r;
      const gold = this.isGreen;
      const c1 = gold ? '#1faa59' : '#f4d03f';
      const c2 = gold ? '#145a32' : '#b7950b';
      const c3 = gold ? '#58d68d' : '#f9e79f';
      const rim = gold ? '#0e6655' : '#9a7d0a';

      ctx.save();
      ctx.translate(Math.round(this.x), Math.round(this.y + bob));
      // без shadowBlur — он даёт мыло по всему кадру

      // внешний диск
      const grad = ctx.createLinearGradient(-rx, -ry, rx, ry);
      grad.addColorStop(0, c3);
      grad.addColorStop(0.45, c1);
      grad.addColorStop(1, c2);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      // ободок
      ctx.strokeStyle = rim;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, rx - 1, ry - 1, 0, 0, Math.PI * 2);
      ctx.stroke();

      // внутреннее кольцо и символ — только когда монета «лицом»
      if (spin > 0.45) {
        ctx.strokeStyle = rim;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(0, 0, rx * 0.62, ry * 0.62, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = rim;
        ctx.font = 'bold ' + Math.floor(ry * 1.05) + 'px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(gold ? 'G' : '★', 0, 1);
      } else {
        // ребро монеты при боковом виде
        ctx.fillStyle = c2;
        ctx.fillRect(-rx, -ry + 2, rx * 2, ry * 2 - 4);
      }

      // блик
      if (spin > 0.5) {
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.beginPath();
        ctx.ellipse(-rx * 0.35, -ry * 0.35, rx * 0.22, ry * 0.18, -0.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  class Fireball {
    constructor(x, y, vx, vy, r = 10) {
      this.x = x; this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.r = r;
      this.alive = true;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.15;
      if (this.x < -30 || this.x > W + 30 || this.y > H + 30 || this.y < -40) this.alive = false;
    }
    draw(ctx) {
      if (!this.alive) return;
      const grad = ctx.createRadialGradient(this.x, this.y, 2, this.x, this.y, this.r);
      grad.addColorStop(0, '#ffd93d');
      grad.addColorStop(0.7, '#ff6b35');
      grad.addColorStop(1, '#c0392b');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(Math.round(this.x), Math.round(this.y), this.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  class PlayerBullet {
    constructor(x, y, vx, vy) {
      this.x = x; this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.r = 4;
      this.alive = true;
      this.life = 90;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life--;
      if (this.life <= 0 || this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) {
        this.alive = false;
      }
    }
    draw(ctx) {
      if (!this.alive) return;
      ctx.fillStyle = '#ffe566';
      ctx.beginPath();
      ctx.arc(Math.round(this.x), Math.round(this.y), this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(Math.round(this.x), Math.round(this.y), 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  class GunPickup {

  class Dragon {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.w = 70;
      this.h = 60;
      this.hp = 30;
      this.maxHp = 30;
      this.alive = true;
      this.mode = 'chase';
      this.modeTimer = 0;
      this.jumpTimer = 0;
      this.shootTimer = 0;
      this.dashTimer = 0;
      this.speedX = 2.3;
      this.dir = -1;
      this.vy = 0;
      this.vx = 0;
      this.onGround = false;
      this.hurtTimer = 0;
      this.flash = 0;
    }

    setMode(mode, duration) {
      this.mode = mode;
      this.modeTimer = duration;
    }

    update(playerX, playerY) {
      if (!this.alive) return;
      if (this.hurtTimer > 0) this.hurtTimer--;
      if (this.flash > 0) this.flash--;
      this.modeTimer--;

      const cx = this.x + this.w / 2;
      const cy = this.y + this.h / 2;
      const dx = playerX + 14 - cx;
      const dy = playerY + 18 - cy;
      const dist = Math.hypot(dx, dy) || 1;

      // Смена режимов для динамики
      if (this.modeTimer <= 0 && this.mode !== 'dash') {
        const roll = Math.random();
        if (roll < 0.28) this.setMode('dash', 40);
        else if (roll < 0.5) this.setMode('jump', 55);
        else if (roll < 0.72) this.setMode('spray', 60);
        else this.setMode('chase', 80 + Math.random() * 40);
      }

      if (this.mode === 'dash') {
        this.dir = dx > 0 ? 1 : -1;
        this.vx = this.dir * 6.2;
        this.x += this.vx;
        if (this.onGround && this.modeTimer % 14 === 0) {
          this.vy = -5.5;
          this.onGround = false;
        }
        if (this.modeTimer <= 0) {
          this.vx = 0;
          this.setMode('chase', 50);
        }
      } else if (this.mode === 'jump') {
        this.dir = dx > 0 ? 1 : -1;
        this.x += this.dir * 1.8;
        if (this.onGround) {
          this.vy = -12 - Math.random() * 2.5;
          this.onGround = false;
        }
        if (this.modeTimer <= 0) this.setMode('chase', 45);
      } else if (this.mode === 'spray') {
        this.dir = dx > 0 ? 1 : -1;
        this.x += Math.sin(frame * 0.12) * 1.3;
        this.shootTimer++;
        if (this.shootTimer > 11) {
          this.shootTimer = 0;
          for (let a = -0.6; a <= 0.6; a += 0.3) {
            const ang = Math.atan2(dy, dx) + a;
            fireballs.push(new Fireball(cx, cy, Math.cos(ang) * 4.5, Math.sin(ang) * 4.5, 9));
          }
        }
        if (this.modeTimer <= 0) this.setMode('chase', 55);
      } else {
        // chase
        this.dir = dx > 0 ? 1 : -1;
        if (Math.abs(dx) > 20) this.x += this.dir * this.speedX;
        this.jumpTimer++;
        if (this.onGround && this.jumpTimer > 45) {
          if (playerY < this.y - 20) this.vy = -11;
          else if (playerY > this.y + 40) this.vy = -4.5;
          else this.vy = -8 - Math.random() * 3;
          this.onGround = false;
          this.jumpTimer = 0;
        }
        this.shootTimer++;
        if (this.shootTimer > 28) {
          this.shootTimer = 0;
          const ang = Math.atan2(dy, dx);
          const spd = 4.2 + Math.random() * 0.6;
          fireballs.push(new Fireball(cx, this.y + 12, Math.cos(ang) * spd, Math.sin(ang) * spd + 0.2));
          if (Math.random() < 0.4) {
            fireballs.push(new Fireball(cx, this.y + 12, Math.cos(ang + 0.35) * spd, Math.sin(ang + 0.35) * spd));
            fireballs.push(new Fireball(cx, this.y + 12, Math.cos(ang - 0.35) * spd, Math.sin(ang - 0.35) * spd));
          }
        }
      }

      this.vy += 0.55;
      if (this.vy > 15) this.vy = 15;
      const prevBottom = this.y + this.h;
      this.y += this.vy;

      this.onGround = false;
      for (let p of platforms) {
        const feetNow = this.y + this.h;
        const overlapX = this.x + this.w > p.x + 4 && this.x < p.x + p.w - 4;
        const landedFromAbove = prevBottom <= p.y + 6 && feetNow >= p.y && this.vy >= 0;
        if (overlapX && landedFromAbove) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.onGround = true;
          break;
        }
      }

      if (this.x < 0) { this.x = 0; if (this.mode === 'dash') this.setMode('chase', 40); }
      if (this.x + this.w > W) { this.x = W - this.w; if (this.mode === 'dash') this.setMode('chase', 40); }
      if (this.y > H + 50) { this.alive = false; return; }
    }

    takeHit(dmg) {
      this.hp -= dmg;
      this.hurtTimer = 10;
      this.flash = 8;
      if (this.hp <= 0) {
        this.hp = 0;
        this.alive = false;
      }
      return true;
    }

    draw(ctx) {
      if (!this.alive) return;
      ctx.save();
      ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
      if (this.flash > 0) ctx.globalAlpha = 0.55 + Math.sin(frame) * 0.2;
      const body = this.mode === 'dash' ? '#c62828' : '#2e7d32';
      ctx.fillStyle = body;
      ctx.shadowColor = '#1b5e20';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#388e3c';
      ctx.beginPath();
      ctx.arc(this.dir * 20, -10, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath();
      ctx.arc(this.dir * 24, -14, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c62828';
      ctx.beginPath();
      ctx.arc(this.dir * 26, -14, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1b5e20';
      ctx.beginPath();
      ctx.moveTo(-10, -20);
      ctx.lineTo(-30, -40);
      ctx.lineTo(-20, -20);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(10, -20);
      ctx.lineTo(30, -40);
      ctx.lineTo(20, -20);
      ctx.fill();
      ctx.fillStyle = '#2e7d32';
      ctx.beginPath();
      ctx.moveTo(-this.dir * 30, 10);
      ctx.lineTo(-this.dir * 50, 20);
      ctx.lineTo(-this.dir * 30, 0);
      ctx.fill();
      ctx.fillStyle = '#c62828';
      for (let i = -4; i <= 4; i += 2) {
        ctx.beginPath();
        ctx.moveTo(i * 6, -20);
        ctx.lineTo(i * 6 + 6, -30);
        ctx.lineTo(i * 6 + 6, -20);
        ctx.fill();
      }
      ctx.restore();

      ctx.fillStyle = '#333';
      ctx.fillRect(this.x, this.y - 20, this.w, 8);
      ctx.fillStyle = '#c62828';
      ctx.fillRect(this.x + 2, this.y - 18, (this.w - 4) * (this.hp / this.maxHp), 4);
      ctx.fillStyle = '#fff';
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('❤️ ' + this.hp, this.x + this.w / 2, this.y - 26);
    }
  }

  // Спавн на земле слева, без пересечения с блоками
  function spawnMarioPlayer(opts) {
    opts = opts || {};
    const x = opts.x != null ? opts.x : 36;
    const p = new Player(x, 0);
    p.alive = true;
    if (opts.hasGun) p.hasGun = true;

    // Встать на верхнюю поверхность под ногами (земля / платформа)
    let standY = H - 40;
    for (let plat of platforms) {
      if (x + p.w > plat.x + 2 && x < plat.x + plat.w - 2) {
        if (plat.y < standY) standY = plat.y;
      }
    }
    // Берём только землю у старта: не телепортировать на высокие полки
    standY = H - 40;
    p.y = standY - p.h;

    // Если всё же внутри блока — вытолкнуть наверх
    for (let guard = 0; guard < 30; guard++) {
      let hit = null;
      for (let plat of platforms) {
        if (rectCollide(p, plat)) { hit = plat; break; }
      }
      if (!hit) break;
      p.y = hit.y - p.h;
      p.vy = 0;
      p.onGround = true;
    }

    p.vx = 0;
    p.vy = 0;
    p.onGround = true;
    return p;
  }

  function generateBomberLevel() {
    bomberWalls = [];
    bomberEnemies = [];
    bomberBombs = [];
    bomberExplosions = [];
    bomberPickups = [];
    bomberExit = null;
    bomberComplete = false;
    bomberBombKeyWasDown = false;

    const cell = BOMBER_CELL;
    const gridW = BOMBER_GRID_W, gridH = BOMBER_GRID_H;
    const hard = {};

    for (let i = 0; i < gridW; i++) {
      for (let j = 0; j < gridH; j++) {
        if (i === 0 || i === gridW - 1 || j === 0 || j === gridH - 1) {
          hard[i + ',' + j] = true;
          bomberWalls.push({ x: i * cell, y: j * cell, w: cell, h: cell, solid: true, breakable: false });
        } else if (i % 2 === 0 && j % 2 === 0) {
          hard[i + ',' + j] = true;
          bomberWalls.push({ x: i * cell, y: j * cell, w: cell, h: cell, solid: true, breakable: false });
        }
      }
    }

    // Небольшая свободная зона (буква Г): хватает заложить бомбу и укрыться
    const clearStart = {
      '1,1': 1,
      '2,1': 1,
      '1,2': 1
    };
    bomberExit = { x: (gridW - 2) * cell, y: (gridH - 2) * cell, w: cell, h: cell };
    const exitKey = (gridW - 2) + ',' + (gridH - 2);

    const softBlocks = [];
    for (let i = 1; i < gridW - 1; i++) {
      for (let j = 1; j < gridH - 1; j++) {
        const key = i + ',' + j;
        if (hard[key] || clearStart[key]) continue;
        if (key === exitKey || Math.random() < 0.62) {
          const block = {
            x: i * cell, y: j * cell, w: cell, h: cell,
            solid: true, breakable: true, hasLife: false
          };
          bomberWalls.push(block);
          if (key !== exitKey) softBlocks.push(block);
        }
      }
    }

    // В одном случайном мягком блоке — бонус +1 жизнь
    if (softBlocks.length) {
      softBlocks[randInt(0, softBlocks.length - 1)].hasLife = true;
    }

    const enemyPos = [
      [3, 3], [5, 5], [7, 3], [9, 7], [12, 4], [15, 8], [17, 5], [4, 8], [14, 2]
    ];
    for (let [gi, gj] of enemyPos) {
      if (hard[gi + ',' + gj]) continue;
      // Не ставить врагов прямо у спавна
      if (clearStart[gi + ',' + gj] || (gi === 2 && gj === 2)) continue;
      bomberWalls = bomberWalls.filter(w => !(w.breakable && w.x === gi * cell && w.y === gj * cell));
      const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
      const d = dirs[randInt(0, 3)];
      const spd = 1.15;
      bomberEnemies.push({
        x: gi * cell + 5,
        y: gj * cell + 5,
        w: 30, h: 30,
        vx: d[0] * spd,
        vy: d[1] * spd,
        speed: spd,
        chaseSpeed: 1.55,
        alive: true,
        aggro: false,
        aggroTimer: 0,
        turnTimer: randInt(40, 100)
      });
    }

    // Спавн в левом верхнем углу
    bomberPlayer = {
      x: cell + 6,
      y: cell + 6,
      w: 28, h: 28,
      vx: 0, vy: 0,
      alive: true,
      speed: 3,
      moving: false
    };
  }

  function bomberSolidAt(gx, gy, ignoreBreakable) {
    if (gx < 0 || gy < 0 || gx >= BOMBER_GRID_W || gy >= BOMBER_GRID_H) return true;
    for (let wall of bomberWalls) {
      if (!wall.solid) continue;
      if (ignoreBreakable && wall.breakable) continue;
      if (wall.x === gx * BOMBER_CELL && wall.y === gy * BOMBER_CELL) return true;
    }
    return false;
  }

  // Видит игрока только по прямой (горизонталь/вертикаль), не сквозь блоки, до 3 клеток
  function bomberEnemySeesPlayer(egx, egy, pgx, pgy) {
    if (egx !== pgx && egy !== pgy) return false;
    const dist = Math.abs(egx - pgx) + Math.abs(egy - pgy);
    if (dist === 0 || dist > 3) return false;

    if (egy === pgy) {
      const step = pgx > egx ? 1 : -1;
      for (let x = egx + step; x !== pgx; x += step) {
        if (bomberSolidAt(x, egy)) return false;
      }
    } else {
      const step = pgy > egy ? 1 : -1;
      for (let y = egy + step; y !== pgy; y += step) {
        if (bomberSolidAt(egx, y)) return false;
      }
    }
    return true;
  }

  function pickBomberEnemyDir(e, towardPlayer) {
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    const gx = Math.floor((e.x + e.w / 2) / BOMBER_CELL);
    const gy = Math.floor((e.y + e.h / 2) / BOMBER_CELL);
    const spd = e.aggro ? e.chaseSpeed : e.speed;

    if (towardPlayer && bomberPlayer && bomberPlayer.alive) {
      const pgx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / BOMBER_CELL);
      const pgy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / BOMBER_CELL);
      dirs.sort((a, b) => {
        const da = Math.abs(gx + a[0] - pgx) + Math.abs(gy + a[1] - pgy);
        const db = Math.abs(gx + b[0] - pgx) + Math.abs(gy + b[1] - pgy);
        return da - db;
      });
    } else {
      for (let i = dirs.length - 1; i > 0; i--) {
        const j = randInt(0, i);
        [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
      }
    }

    for (let [dx, dy] of dirs) {
      if (!bomberSolidAt(gx + dx, gy + dy)) {
        e.vx = dx * spd;
        e.vy = dy * spd;
        return;
      }
    }
    e.vx = 0;
    e.vy = 0;
  }

  // Кратчайший шаг к игроку в обход блоков (BFS)
  function bomberPathNextStep(egx, egy, pgx, pgy) {
    if (egx === pgx && egy === pgy) return null;
    const key = (x, y) => x + ',' + y;
    const q = [[egx, egy]];
    const came = {};
    came[key(egx, egy)] = null;
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    let found = false;
    let guard = 0;

    while (q.length && guard++ < 400) {
      const [x, y] = q.shift();
      if (x === pgx && y === pgy) {
        found = true;
        break;
      }
      for (let [dx, dy] of dirs) {
        const nx = x + dx;
        const ny = y + dy;
        const k = key(nx, ny);
        if (came[k] !== undefined) continue;
        const isGoal = nx === pgx && ny === pgy;
        if (!isGoal && bomberSolidAt(nx, ny)) continue;
        came[k] = [x, y];
        q.push([nx, ny]);
      }
    }

    if (!found) return null;

    let cur = [pgx, pgy];
    while (true) {
      const prev = came[key(cur[0], cur[1])];
      if (!prev) return null;
      if (prev[0] === egx && prev[1] === egy) return cur;
      cur = prev;
    }
  }

  // Идти к игроку, обходя блоки
  function chaseBomberPlayer(e) {
    if (!bomberPlayer || !bomberPlayer.alive) return;
    const spd = e.chaseSpeed;
    const cell = BOMBER_CELL;
    const egx = Math.floor((e.x + e.w / 2) / cell);
    const egy = Math.floor((e.y + e.h / 2) / cell);
    const pgx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / cell);
    const pgy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / cell);

    // Цель центра клетки следующего шага
    let tx = bomberPlayer.x + bomberPlayer.w / 2;
    let ty = bomberPlayer.y + bomberPlayer.h / 2;

    const next = bomberPathNextStep(egx, egy, pgx, pgy);
    if (next) {
      tx = next[0] * cell + cell / 2;
      ty = next[1] * cell + cell / 2;
    } else {
      // Пути нет — хотя бы жадный шаг, если свободен
      pickBomberEnemyDir(e, true);
      return;
    }

    const cx = e.x + e.w / 2;
    const cy = e.y + e.h / 2;
    const dx = tx - cx;
    const dy = ty - cy;

    // Двигаемся по одной оси за раз (как по сетке)
    if (Math.abs(dx) > Math.abs(dy)) {
      e.vy = 0;
      e.vx = dx > 2 ? spd : (dx < -2 ? -spd : 0);
      if (e.vx === 0 && Math.abs(dy) > 2) {
        e.vy = dy > 0 ? spd : -spd;
      }
    } else {
      e.vx = 0;
      e.vy = dy > 2 ? spd : (dy < -2 ? -spd : 0);
      if (e.vy === 0 && Math.abs(dx) > 2) {
        e.vx = dx > 0 ? spd : -spd;
      }
    }
  }

  function placeBomberBomb() {
    if (!bomberPlayer || !bomberPlayer.alive) return;
    const cell = BOMBER_CELL;
    const gx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / cell);
    const gy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / cell);
    const bx = gx * cell, by = gy * cell;
    if (bomberBombs.some(b => b.x === bx && b.y === by)) return;
    bomberBombs.push({ x: bx, y: by, w: cell, h: cell, timer: 100, range: 2 });
  }

  function explodeBomberBomb(bomb) {
    const cell = BOMBER_CELL;
    const gx = bomb.x / cell;
    const gy = bomb.y / cell;
    const hitCells = [[gx, gy]];
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    for (let [dx, dy] of dirs) {
      for (let r = 1; r <= bomb.range; r++) {
        const cx = gx + dx * r;
        const cy = gy + dy * r;
        let blocked = false;
        let brokeSoft = false;
        for (let i = bomberWalls.length - 1; i >= 0; i--) {
          const wall = bomberWalls[i];
          if (wall.x === cx * cell && wall.y === cy * cell) {
            if (wall.breakable) {
              if (wall.hasLife) {
                bomberPickups.push({
                  x: wall.x + 8, y: wall.y + 8, w: 24, h: 24,
                  type: 'life', anim: 0
                });
              }
              bomberWalls.splice(i, 1);
              brokeSoft = true;
            } else {
              blocked = true;
            }
            break;
          }
        }
        if (blocked) break;
        hitCells.push([cx, cy]);
        if (brokeSoft) break;
      }
    }

    for (let [cx, cy] of hitCells) {
      bomberExplosions.push({
        x: cx * cell, y: cy * cell, w: cell, h: cell, timer: 22
      });
      for (let e of bomberEnemies) {
        if (!e.alive) continue;
        const egx = Math.floor((e.x + e.w / 2) / cell);
        const egy = Math.floor((e.y + e.h / 2) / cell);
        if (egx === cx && egy === cy) e.alive = false;
      }
      if (bomberPlayer && bomberPlayer.alive) {
        const pgx = Math.floor((bomberPlayer.x + bomberPlayer.w / 2) / cell);
        const pgy = Math.floor((bomberPlayer.y + bomberPlayer.h / 2) / cell);
        if (pgx === cx && pgy === cy) bomberPlayer.alive = false;
      }
    }
  }

  function drawThoughtBubble(ctx, x, y, text, alpha) {
    if (!text) return;
    alpha = alpha == null ? 1 : alpha;
    if (alpha <= 0.02) return;
    const isLove = text.indexOf('люблю') !== -1;
    ctx.save();
    ctx.globalAlpha = alpha;

    ctx.font = isLove ? 'italic 22px Georgia, Times New Roman, serif' : '18px Segoe UI, Arial';
    const padX = isLove ? 28 : 22;
    const tw = ctx.measureText(text).width;
    const boxW = Math.max(tw + padX * 2, isLove ? 240 : 160);
    const boxH = isLove ? 68 : 52;
    const bx = x - boxW / 2;
    const by = y - boxH - 8;
    const pulse = isLove ? 1 + Math.sin(frame * 0.08) * 0.02 : 1;

    ctx.translate(x, by + boxH / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-x, -(by + boxH / 2));

    if (isLove) {
      const loveGrad = ctx.createLinearGradient(bx, by, bx, by + boxH);
      loveGrad.addColorStop(0, '#fff7fb');
      loveGrad.addColorStop(1, '#ffd6e7');
      ctx.fillStyle = loveGrad;
      ctx.strokeStyle = '#f7a8c4';
      ctx.shadowColor = 'rgba(233, 90, 140, 0.4)';
      ctx.shadowBlur = 20;
    } else {
      ctx.fillStyle = 'rgba(255,252,245,0.97)';
      ctx.strokeStyle = '#9eb0d0';
      ctx.shadowColor = 'rgba(80,100,140,0.25)';
      ctx.shadowBlur = 12;
    }
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(bx + 18, by);
    ctx.lineTo(bx + boxW - 18, by);
    ctx.quadraticCurveTo(bx + boxW, by, bx + boxW, by + 18);
    ctx.lineTo(bx + boxW, by + boxH - 18);
    ctx.quadraticCurveTo(bx + boxW, by + boxH, bx + boxW - 18, by + boxH);
    ctx.lineTo(bx + 18, by + boxH);
    ctx.quadraticCurveTo(bx, by + boxH, bx, by + boxH - 18);
    ctx.lineTo(bx, by + 18);
    ctx.quadraticCurveTo(bx, by, bx + 18, by);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x - 14, y + 6, 6.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x - 24, y + 20, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x - 30, y + 32, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    if (isLove) {
      const hearts = [
        { ox: -boxW / 2 - 6, oy: -20, s: 15 },
        { ox: boxW / 2 + 2, oy: -14, s: 17 },
        { ox: -boxW / 2 + 12, oy: 24, s: 13 },
        { ox: boxW / 2 - 4, oy: 22, s: 14 }
      ];
      for (let i = 0; i < hearts.length; i++) {
        const h = hearts[i];
        const bob = Math.sin(frame * 0.1 + i) * 3;
        ctx.globalAlpha = alpha * (0.5 + 0.4 * Math.sin(frame * 0.08 + i));
        ctx.font = h.s + 'px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('💕', x + h.ox, by + boxH / 2 + h.oy + bob);
      }
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ad1457';
      ctx.font = 'italic bold 22px Georgia, Times New Roman, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255, 192, 210, 0.9)';
      ctx.shadowBlur = 10;
      ctx.fillText(text, x, by + boxH / 2 + 1);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#34495e';
      ctx.font = '18px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, x, by + boxH / 2 + 1);
    }
    ctx.restore();
  }

  function drawCutscenePrincess(ctx, x, y, facing, opts) {
    opts = opts || {};
    ctx.save();
    ctx.translate(x, y);
    // при поцелуе слегка наклоняется к гномику
    if (opts.kiss && !opts.angry) {
      ctx.rotate(facing < 0 ? -0.12 : 0.12);
    }
    ctx.scale(facing, 1);

    const skin = opts.angry ? '#f0c4a8' : '#ffe0c2';
    const dressMain = opts.angry ? '#8e44ad' : '#ff4d8d';
    const dressLight = opts.angry ? '#bb8fce' : '#ff8fb8';
    const hair = '#f4c430';
    const hairDark = '#d4a017';

    // длинные волосы сзади
    ctx.fillStyle = hair;
    ctx.beginPath();
    ctx.ellipse(-12, 6, 9, 26, 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(12, 6, 9, 26, -0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = hairDark;
    ctx.beginPath();
    ctx.ellipse(-14, 16, 4.5, 12, 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(14, 16, 4.5, 12, -0.15, 0, Math.PI * 2);
    ctx.fill();

    // узкое платье
    const dressGrad = ctx.createLinearGradient(0, 8, 0, 38);
    dressGrad.addColorStop(0, dressLight);
    dressGrad.addColorStop(1, dressMain);
    ctx.fillStyle = dressGrad;
    ctx.beginPath();
    ctx.moveTo(-6, 10);
    ctx.quadraticCurveTo(-14, 20, -12, 38);
    ctx.lineTo(12, 38);
    ctx.quadraticCurveTo(14, 20, 6, 10);
    ctx.closePath();
    ctx.fill();
    // оборка
    ctx.fillStyle = opts.angry ? '#d2b4de' : '#ffc1d6';
    ctx.beginPath();
    ctx.moveTo(-12, 36);
    for (let i = -10; i <= 10; i += 5) {
      ctx.quadraticCurveTo(i, 40, i + 2.5, 36);
    }
    ctx.lineTo(12, 38);
    ctx.lineTo(-12, 38);
    ctx.fill();
    // корсет / талия
    ctx.fillStyle = opts.angry ? '#6c3483' : '#e91e63';
    ctx.beginPath();
    ctx.moveTo(-5, 10);
    ctx.lineTo(5, 10);
    ctx.lineTo(4, 20);
    ctx.lineTo(-4, 20);
    ctx.closePath();
    ctx.fill();
    // блеск на платье
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(-4, 26, 3, 7, -0.25, 0, Math.PI * 2);
    ctx.fill();

    // руки — при поцелуе тянется к гномику (вперёд)
    ctx.fillStyle = skin;
    if (opts.hardKiss || opts.kiss) {
      ctx.beginPath();
      ctx.ellipse(14, 12, 3.5, 9, 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(12, 16, 3.2, 8, 0.35, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.ellipse(-11, 16, 3.2, 10, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(11, 16, 3.2, 10, -0.2, 0, Math.PI * 2);
      ctx.fill();
    }

    // шея
    ctx.fillStyle = skin;
    ctx.fillRect(-2.5, 5, 5, 7);

    // голова — чуть меньше, пропорциональнее телу
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.ellipse(0, -3, 11.5, 13.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // чёлка / волосы сверху
    ctx.fillStyle = hair;
    ctx.beginPath();
    ctx.ellipse(0, -12, 12.5, 10, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-8, -7, 5, 7, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, -7, 5, 7, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // локон на лице
    ctx.fillStyle = hairDark;
    ctx.beginPath();
    ctx.ellipse(-9, 1, 2.2, 6, 0.35, 0, Math.PI * 2);
    ctx.fill();

    // корона
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-9, -17);
    ctx.lineTo(-6, -27);
    ctx.lineTo(-3, -19);
    ctx.lineTo(0, -29);
    ctx.lineTo(3, -19);
    ctx.lineTo(6, -27);
    ctx.lineTo(9, -17);
    ctx.lineTo(9, -13);
    ctx.lineTo(-9, -13);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff8dc';
    ctx.fillRect(-9, -15, 18, 2.5);
