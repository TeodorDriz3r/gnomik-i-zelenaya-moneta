    } else if (sp === 'flowers') {
      houseBtn(200, midY, 400, 58, 'Цветы — купить', 'shop_flowers', '#ad1457', '#f48fb1');
    } else if (sp === 'tavern') {
      houseBtn(200, midY, 400, 58, 'Таверна — ночлег', 'shop_tavern', '#4e342e', '#d7ccc8');
    } else if (sp === 'forge') {
      houseBtn(90, midY, 200, 52, 'Починка', 'forge_repair', '#546e7a', '#cfd8dc');
      houseBtn(300, midY, 200, 52, 'Улучшение', 'forge_upgrade', '#ef6c00', '#ffe0b2');
      houseBtn(510, midY, 200, 52, 'Создание', 'forge_craft', '#6a1b9a', '#e1bee7');
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(90, midY + 58, 620, 22);
      ctx.fillStyle = '#ffe082';
      ctx.font = '12px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Починка снаряжения · Улучшение снаряжения · Создание нового снаряжения', W / 2, midY + 73);
    } else if (hasStealSkill()) {
      const stolen = !!(insideHouse.stolen || houseStolenIds[b.id]);
      houseBtn(200, midY, 400, 52, stolen ? 'Уже обокраден' : 'Взлом', 'steal',
        stolen ? '#455a64' : '#6a1b9a', '#ce93d8');
    }

    // дверь
    const doorIdx = houseUiButtons.length;
    houseUiButtons.push({ x: 370, y: H - 70, w: 60, h: 30, action: 'exit' });
    if (uiHover && uiHover.kind === 'house' && uiHover.index === doorIdx) {
      ctx.strokeStyle = '#fff59d';
      ctx.lineWidth = 3;
      ctx.strokeRect(367, H - 73, 66, 36);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(W / 2 - 240, H - 36, 480, 24);
    ctx.fillStyle = '#fffde7';
    ctx.font = '13px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Наведи курсор — кнопка подсветится · ЛКМ — нажать', W / 2, H - 20);
  }

  function handleHouseUiClick(mx, my) {
    if (!insideHouse) return false;
    if (rpgUi) return false;
    if (!houseUiButtons || !houseUiButtons.length) return false;
    for (let i = houseUiButtons.length - 1; i >= 0; i--) {
      const btn = houseUiButtons[i];
      if (mx < btn.x || my < btn.y || mx > btn.x + btn.w || my > btn.y + btn.h) continue;
      if (btn.action === 'exit') { exitHouseInterior(); return true; }
      if (btn.action === 'steal') { tryStealHouse(); return true; }
      if (btn.action === 'shop_guild') { openShop('guild'); return true; }
      if (btn.action === 'shop_weapons') { openShop('weapons'); return true; }
      if (btn.action === 'shop_potions') { openShop('potions'); return true; }
      if (btn.action === 'shop_flowers') { openShop('flowers'); return true; }
      if (btn.action === 'shop_tavern') { openShop('tavern'); return true; }
      if (btn.action === 'forge_repair') { openForgeMode('repair'); return true; }
      if (btn.action === 'forge_upgrade') { openForgeMode('upgrade'); return true; }
      if (btn.action === 'forge_craft') { openForgeMode('craft'); return true; }
      if (btn.action === 'guild_quests') { openGuildQuestsMenu(); return true; }
      return true;
    }
    return false;
  }

  function handleMenuUiClick(mx, my) {
    if (!rpgUi || !menuHitBoxes.length) return false;
    for (let i = menuHitBoxes.length - 1; i >= 0; i--) {
      const row = menuHitBoxes[i];
      if (!hitBox(mx, my, row)) continue;

      if (row.action === 'close') {
        if (rpgUi === 'shop') { rpgUi = null; shopKind = null; }
        else if (rpgUi === 'guild_quests') rpgUi = null;
        else if (String(rpgUi).indexOf('forge_') === 0) closeForgeUi();
        else rpgUi = null;
        return true;
      }

      if (rpgUi === 'shop') {
        shopFocus = row.index;
        buyShopItem();
        return true;
      }
      if (rpgUi === 'forge_craft') {
        shopFocus = row.index;
        const recipe = FORGE_CRAFT[row.index];
        if (recipe) tryForgeCraft(recipe);
        return true;
      }
      if (rpgUi === 'forge_repair' && row.action === 'do_repair') {
        tryForgeRepair();
        return true;
      }
      if (rpgUi === 'forge_upgrade' && row.action === 'do_upgrade') {
        tryForgeUpgrade();
        return true;
      }
      if (rpgUi === 'guild_quests') {
        shopFocus = row.index;
        const list = getGuildQuestListUi();
        const entry = list[shopFocus];
        if (!entry) return true;
        if (entry.locked) {
          messageDiv.textContent = 'Ранг ещё не открыт';
          return true;
        }
        if (entry.action === 'open_rank') {
          guildQuestRank = entry.rank;
          guildQuestView = 'list';
          shopFocus = 0;
          return true;
        }
        if (entry.action === 'back_ranks') {
          guildQuestView = 'ranks';
          shopFocus = 0;
          return true;
        }
        tryAcceptOrCompleteQuest(entry);
        return true;
      }
      if (rpgUi === 'levelup') {
        levelUpFocus = row.index;
        applyLevelUpChoice();
        return true;
      }
      if (rpgUi === 'skills') {
        townPlayer.activeSkill = row.index;
        return true;
      }
      if (rpgUi === 'rank') {
        rpgUi = null;
        return true;
      }
    }
    // клик по затемнению / панели — закрыть rank
    if (rpgUi === 'rank') {
      rpgUi = null;
      return true;
    }
    return false;
  }

  function updateCity() {
    if (!townPlayer) return;
    const p = townPlayer;
    p.walking = false;

    // внутри дома
    if (insideHouse) {
      if (!rpgUi) {
        let dx = 0, dy = 0;
        if (keys.ArrowLeft) dx -= 1;
        if (keys.ArrowRight) dx += 1;
        if (keys.ArrowUp) dy -= 1;
        if (keys.ArrowDown) dy += 1;
        if (dx || dy) {
          const len = Math.hypot(dx, dy) || 1;
          p.dirX = dx / len;
          p.dirY = dy / len;
          if (Math.abs(dx) >= Math.abs(dy)) p.facing = dx < 0 ? -1 : 1;
          const spd = getMoveSpeed();
          const mx = p.dirX * spd;
          const my = p.dirY * spd;
          let moved = false;
          if (!houseSolidAt(p.x + mx, p.y, p.w, p.h)) { p.x += mx; moved = true; }
          if (!houseSolidAt(p.x, p.y + my, p.w, p.h)) { p.y += my; moved = true; }
          if (moved) {
            p.walking = true;
            p.anim += 0.35;
          }
        }
        if (p.slowTimer > 0) p.slowTimer--;
        if (townSkillCd > 0) townSkillCd--;
        if (townPunchCd > 0) townPunchCd--;
      }
      // выход дверью вниз
      if (p.y + p.h > H - 55 && p.x + p.w / 2 > 360 && p.x + p.w / 2 < 440) {
        exitHouseInterior();
      }
      regenMana();
      return;
    }

    if (!rpgUi) {
      let dx = 0, dy = 0;
      if (keys.ArrowLeft) dx -= 1;
      if (keys.ArrowRight) dx += 1;
      if (keys.ArrowUp) dy -= 1;
      if (keys.ArrowDown) dy += 1;
      if (dx || dy) {
        const len = Math.hypot(dx, dy) || 1;
        p.dirX = dx / len;
        p.dirY = dy / len;
        if (Math.abs(dx) >= Math.abs(dy)) p.facing = dx < 0 ? -1 : 1;
        const spd = getMoveSpeed();
        const mx = p.dirX * spd;
        const my = p.dirY * spd;
        let moved = false;
        if (!townSolidAt(p.x + mx, p.y, p.w, p.h, true)) { p.x += mx; moved = true; }
        if (!townSolidAt(p.x, p.y + my, p.w, p.h, true)) { p.y += my; moved = true; }
        if (moved) {
          p.walking = true;
          p.anim += 0.35;
        }
      }

      if (p.slowTimer > 0) p.slowTimer--;

      if (townSkillCd > 0) townSkillCd--;
      if (townPunchCd > 0) townPunchCd--;
    }

    for (let i = townProjectiles.length - 1; i >= 0; i--) {
      const pr = townProjectiles[i];
      pr.x += pr.vx;
      pr.y += pr.vy;
      pr.life--;
      if (pr.life <= 0 || pr.x < 0 || pr.y < 0 || pr.x > W || pr.y > H) {
        townProjectiles.splice(i, 1);
      }
    }

    // Выход из города через ворота → поляна
    if (p.y + p.h > TOWN_GATES.y + 8 && p.x + p.w / 2 > TOWN_GATES.x - 10 && p.x + p.w / 2 < TOWN_GATES.x + TOWN_GATES.w + 10) {
      enterHub('city');
      return;
    }

    // Подсказка у зданий — только у двери
    nearTownBuilding = null;
    for (let b of TOWN_BUILDINGS) {
      const cx = p.x + p.w / 2;
      const cy = p.y + p.h / 2;
      if (atBuildingDoor(cx, cy, b)) { nearTownBuilding = b; break; }
    }
    if (nearTownBuilding && !messageDiv.textContent.startsWith('Получено') && !rpgUi) {
      let tip = nearTownBuilding.name;
      tip += '  ·  [E] войти в дверь';
      if (isEmptyHouse(nearTownBuilding) && hasStealSkill()) {
        tip += houseStolenIds[nearTownBuilding.id] ? ' · уже взломан' : ' · внутри: Взлом';
      }
      messageDiv.textContent = tip;
    } else if (nearSeekerNpc() && !rpgUi && !messageDiv.textContent.startsWith('Получено') && !messageDiv.textContent.startsWith('Куплено')) {
      messageDiv.textContent = 'Искатель  ·  [E] товары (тотем курицы 3🟡)';
    } else if (!nearTownBuilding && !rpgUi && !messageDiv.textContent.startsWith('Получено')) {
      const t = messageDiv.textContent;
      if (t.indexOf('[E]') !== -1 || t.indexOf('закрыт') !== -1 || t.indexOf('взломан') !== -1 ||
          t === 'Гильдия' || t === 'Цветы' || t === 'Оружейная' || t === 'Зелья' || t === 'Таверна' || t === 'Кузня' ||
          t.indexOf('Дом ') === 0 || t.indexOf('Искатель') === 0) {
        messageDiv.textContent = '';
      }
    }

    regenMana();
    updateTownNpcs();
  }

  function castTownSkill(skillIndex, opts) {
    opts = opts || {};
    const p = townPlayer;
    if (!p || !p.skills.length || rpgUi) return;
    if (possessTimer > 0) return;
    const idx = skillIndex != null ? skillIndex : (p.activeSkill || 0);
    const sk = p.skills[idx] || p.skills[0];
    if (!sk) return;
    if (townSkillCd > 0) return;
    aimTownAt(mousePos.x, mousePos.y);
    const kind = sk.kind || sk.id;
    if (kind === 'steal' || kind === 'lockpick') {
      if (nearTownBuilding && isEmptyHouse(nearTownBuilding)) tryLockpickHouse(nearTownBuilding);
      else messageDiv.textContent = 'Взлом: подойди к пустому дому и нажми E / кнопку';
      return;
    }
    if (!weaponAllowsSkill(sk, kind)) return;
    if (kind === 'chicken' && summonedAlly && summonedAlly.life > 0) {
      messageDiv.textContent = 'Курица уже на поле!';
      return;
    }

    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;
    let dx = p.dirX, dy = p.dirY;
    if (!dx && !dy) { dx = p.facing; dy = 0; }
    const len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    const col = sk.color || '#7e57c2';
    const mod = sk.mod || null;
    const chargeFrames = opts.chargeFrames || 0;

    let manaCost = 0;
    if ((p.maxMana || 0) > 0) {
      manaCost = 1;
      if (kind === 'orb' && mod === 'charged') manaCost = Math.max(1, Math.min(3, 1 + Math.floor(chargeFrames / 40)));
      if (kind === 'skel_mage' || kind === 'meat_wall' || kind === 'possess') manaCost = 2;
      if ((p.mana || 0) < manaCost) {
        messageDiv.textContent = 'Не хватает маны!';
        setTimeout(() => { if (messageDiv.textContent === 'Не хватает маны!') messageDiv.textContent = ''; }, 800);
        return;
      }
      p.mana -= manaCost;
    }

    if (kind === 'chicken') {
      townSkillCd = 90;
      const dur = sk.duration || 180;
      summonedAlly = { kind: 'chicken', x: cx + dx * 36, y: cy + dy * 36, bob: 0, life: dur, maxLife: dur };
      flashSkillMsg('Курица отвлекает врагов!');
      return;
    }
    if (kind === 'skel_guard') {
      summonedMinions = summonedMinions.filter(m => m.role !== 'guard');
      townSkillCd = 50;
      spawnMinion('guard', cx + dx * 28, cy + dy * 28, sk);
      flashSkillMsg('Скелет-страж призван!');
      return;
    }
    if (kind === 'skel_mage') {
      summonedMinions = summonedMinions.filter(m => m.role !== 'mage');
      townSkillCd = 60;
      spawnMinion('mage', cx + dx * 24, cy + dy * 24, sk);
      flashSkillMsg('Скелет-маг призван!');
      return;
    }
    if (kind === 'meat_wall') {
      townSkillCd = 100;
      const dur = sk.duration || 180;
      const base = Math.atan2(dy, dx);
      for (let i = 0; i < 3; i++) {
        const a = base + (-0.8 + i * 0.8);
        summonedMinions.push({
          id: 'meat_' + frame + '_' + i, role: 'meat', kind: 'meat',
          x: cx + Math.cos(a) * 30, y: cy + Math.sin(a) * 30,
          w: 16, h: 16, hp: 2, maxHp: 2, damage: 0.2, speed: 0.55,
          bob: 0, life: dur, distract: true, atkCd: 0
        });
      }
      flashSkillMsg('Мясная стена!');
      return;
    }
    if (kind === 'sacrifice') {
      const m = nearestMinion(cx, cy);
      if (!m) { p.mana += manaCost; messageDiv.textContent = 'Нет миньона для жертвы'; return; }
      townSkillCd = 45;
      const boom = Math.max(2, Math.round(m.maxHp * 1.5));
      applyAoEDamage(m.x + m.w / 2, m.y + m.h / 2, 55, boom);
      removeMinion(m);
      flashSkillMsg('Жертвоприношение! −' + boom);
      return;
    }
    if (kind === 'possess') {
      const m = nearestMinion(cx, cy);
      if (!m) { p.mana += manaCost; messageDiv.textContent = 'Нет миньона для одержимости'; return; }
      townSkillCd = 120;
      possessTimer = 480;
      possessMinionId = m.id;
      m.possessed = true; m.invuln = true; m.damageMul = 3;
      flashSkillMsg('Одержимость! 8 сек');
      return;
    }
    if (kind === 'frost_spark') {
      townSkillCd = 35;
      townProjectiles.push({ kind: 'orb', x: cx + dx * 10, y: cy + dy * 10, vx: dx * 4.5, vy: dy * 4.5, r: 6, damage: 0, life: 55, color: col, slow: 180 });
      flashSkillMsg('Ледяная искра — замедление');
      return;
    }
    if (kind === 'magic_fist') {
      townSkillCd = 50;
      applyAoEDamage(cx, cy, 48, sk.damage, { knock: 10 });
      townProjectiles.push({ kind: 'slash', x: cx, y: cy, vx: 0, vy: 0, r: 48, damage: 0, life: 10, color: col });
      flashSkillMsg('Магический кулак!');
      return;
    }
    if (kind === 'cold_wave') {
      townSkillCd = 55;
      for (let a = -0.55; a <= 0.55; a += 0.275) {
        const ang = Math.atan2(dy, dx) + a;
        townProjectiles.push({ kind: 'orb', x: cx + Math.cos(ang) * 8, y: cy + Math.sin(ang) * 8, vx: Math.cos(ang) * 3.6, vy: Math.sin(ang) * 3.6, r: 8, damage: sk.damage, life: 40, color: col, slow: 120 });
      }
      flashSkillMsg('Волна холода!');
      return;
    }
    if (kind === 'shatter') {
      sk.enabled = true;
      townSkillCd = 20;
      flashSkillMsg('Раскол: убийства шаром взрываются');
      return;
    }
    if (kind === 'provoke') {
      townSkillCd = 55;
      const tgt = nearestAliveEnemy(cx, cy, 200);
      if (tgt) {
        const tx = tgt.x + (tgt.w || 0) / 2, ty = tgt.y + (tgt.h || 0) / 2;
        const d = Math.hypot(tx - cx, ty - cy) || 1;
        p.x += ((tx - cx) / d) * Math.min(80, Math.max(0, d - 18));
        p.y += ((ty - cy) / d) * Math.min(80, Math.max(0, d - 18));
        tgt.stunTimer = 60;
        tgt.hp -= sk.damage;
        if (tgt.hp <= 0) killEnemy(tgt);
      }
      flashSkillMsg('Рывок + оглушение!');
      return;
    }
    if (kind === 'steel_block') {
      townSkillCd = 70;
      playerBlockCharges = 1;
      flashSkillMsg('Стальной блок готов');
      return;
    }
    if (kind === 'deadly_thrust') {
      townSkillCd = 40;
      townProjectiles.push({ kind: 'slash', x: cx + dx * 22, y: cy + dy * 22, vx: 0, vy: 0, r: 18, damage: sk.damage, life: 12, color: col, armorIgnore: 0.3 });
      flashSkillMsg('Смертельный выпад!');
      return;
    }
    if (kind === 'mad_blade') {
      townSkillCd = 100;
      const baseSlash = p.skills.find(s => s.id === 'slash');
      const hitDmg = Math.max(1, Math.round((baseSlash ? baseSlash.damage : 1) * 0.7));
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          if (!townPlayer) return;
          const px = townPlayer.x + townPlayer.w / 2, py = townPlayer.y + townPlayer.h / 2;
          let ddx = townPlayer.dirX, ddy = townPlayer.dirY;
          if (!ddx && !ddy) { ddx = townPlayer.facing; ddy = 0; }
          const L = Math.hypot(ddx, ddy) || 1;
          townProjectiles.push({ kind: 'slash', x: px + (ddx / L) * 18, y: py + (ddy / L) * 18, vx: 0, vy: 0, r: 22, damage: hitDmg, life: 10, color: col });
        }, i * 90);
      }
      flashSkillMsg('Бешеный клинок!');
      return;
    }
    if (kind === 'dagger_kick') {
      townSkillCd = 40;
      townProjectiles.push({ kind: 'slash', x: cx + dx * 16, y: cy + dy * 16, vx: 0, vy: 0, r: 16, damage: sk.damage, life: 10, color: col });
      p.x -= dx * 28; p.y -= dy * 28;
      flashSkillMsg('Укол и отпрыжка!');
      return;
    }
    if (kind === 'snare') {
      townSkillCd = 55;
      fieldTraps.push({ x: cx + dx * 40, y: cy + dy * 40, r: 18, life: 600, armed: true });
      flashSkillMsg('Ловушка установлена');
      return;
    }
    if (kind === 'hawk_eye') {
      townSkillCd = 90;
      hawkEyeTimer = 300;
      flashSkillMsg('Меткий глаз! 5 сек');
      return;
    }
    if (kind === 'sniper') {
      if (chargeFrames < 160) {
        p.mana += manaCost;
        messageDiv.textContent = 'Снайперский залп: держи ПКМ ~3 сек';
        return;
      }
      townSkillCd = 80;
      townProjectiles.push({ kind: 'arrow', x: cx + dx * 8, y: cy + dy * 8, vx: dx * 7, vy: dy * 7, r: 5, damage: sk.damage * 3, life: 90, color: col, pierce: 99 });
      flashSkillMsg('Снайперский залп!');
      return;
    }

    let cd = 28;
    if (kind === 'shot' && mod === 'rapid') cd = Math.round(28 * 0.6);
    townSkillCd = cd;

    if (kind === 'orb') {
      let dmg = sk.damage, spd = 4.2, pierce = 0, knock = 0;
      if (mod === 'twin') dmg = Math.max(1, Math.round(sk.damage * 0.7));
      if (mod === 'heavy') { spd = 2.4; knock = 14; pierce = 1; }
      if (mod === 'charged') {
        const t = Math.min(1, chargeFrames / 90);
        dmg = Math.max(1, Math.round(sk.damage * (1 + t * 2)));
      }
      const shatterOn = !!(p.skills.find(s => s.id === 'shatter'));
      const fireOrb = (ox, oy, ovx, ovy) => {
        townProjectiles.push({ kind: 'orb', x: ox, y: oy, vx: ovx, vy: ovy, r: 7 + sk.level, damage: dmg, life: 70, color: col, pierce: pierce, knock: knock, shatter: shatterOn });
      };
      if (mod === 'twin') {
        const ang = Math.atan2(dy, dx);
        fireOrb(cx + Math.cos(ang - 0.2) * 10, cy + Math.sin(ang - 0.2) * 10, Math.cos(ang - 0.2) * spd, Math.sin(ang - 0.2) * spd);
        fireOrb(cx + Math.cos(ang + 0.2) * 10, cy + Math.sin(ang + 0.2) * 10, Math.cos(ang + 0.2) * spd, Math.sin(ang + 0.2) * spd);
      } else fireOrb(cx + dx * 10, cy + dy * 10, dx * spd, dy * spd);
    } else if (kind === 'slash') {
      let dmg = sk.damage, r = 20 + sk.level * 2, single = false, bleed = 0;
      if (mod === 'vertical') { dmg = Math.round(sk.damage * 1.5); r = 16; single = true; }
      if (mod === 'whirl') { r = Math.round(r * 1.5); dmg = Math.max(1, Math.round(sk.damage * 0.8)); }
      if (mod === 'bloody') bleed = 90;
      townProjectiles.push({ kind: 'slash', x: cx + dx * 18, y: cy + dy * 18, vx: 0, vy: 0, r: r, damage: dmg, life: 12, color: col, single: single, bleed: bleed });
    } else if (kind === 'shot') {
      let dmg = sk.damage;
      if (hawkEyeTimer > 0) dmg *= 2;
      const fireArrow = (ang) => {
        townProjectiles.push({ kind: 'arrow', x: cx + Math.cos(ang) * 8, y: cy + Math.sin(ang) * 8, vx: Math.cos(ang) * 5.5, vy: Math.sin(ang) * 5.5, r: 4, damage: dmg, life: 55, color: col, distScale: mod === 'precise', spawnX: cx, spawnY: cy });
      };
      const baseAng = Math.atan2(dy, dx);
      if (mod === 'fan') { fireArrow(baseAng - 0.28); fireArrow(baseAng); fireArrow(baseAng + 0.28); }
      else fireArrow(baseAng);
    }

    flashSkillMsg(sk.name + ' Lv.' + sk.level);
  }

  function flashSkillMsg(msg) {
    messageDiv.textContent = msg;
    setTimeout(() => { if (messageDiv.textContent === msg) messageDiv.textContent = ''; }, 1000);
  }

  function weaponAllowsSkill(sk, kind) {
    const w = townPlayer && townPlayer.slots && townPlayer.slots.weapon;
    if (kind === 'chicken') {
      if (!w || w.id !== 'totem_chicken') {
        messageDiv.textContent = 'Нужен «Тотем призыва курицы» (Искатель, 3 золота)';
        setTimeout(() => { if (messageDiv.textContent.indexOf('Тотем призыва курицы') !== -1) messageDiv.textContent = ''; }, 1400);
        return false;
      }
      return true;
    }
    if (w && w.id === 'totem_chicken') {
      messageDiv.textContent = 'Тотем курицы умеет только «Призыв курицы»';
      setTimeout(() => { if (messageDiv.textContent.indexOf('Тотем курицы') !== -1) messageDiv.textContent = ''; }, 1200);
      return false;
    }
    if (w && w.broken && kind !== 'skel_guard') {
      messageDiv.textContent = 'Тотем сломан — только «Скелет-страж» или почини';
      setTimeout(() => { if (messageDiv.textContent.indexOf('сломан') !== -1) messageDiv.textContent = ''; }, 1400);
      return false;
    }
    return true;
  }

  function hasSkillMod(id) { return !!skillModsOwned[id]; }

  function skillNeedsCharge(sk) {
    if (!sk) return false;
    if (sk.kind === 'sniper' || sk.charge) return true;
    if (sk.kind === 'orb' && sk.mod === 'charged') return true;
    return false;
  }

  function beginHotbarCharge(slot) {
    if (!townPlayer || rpgUi || paused || insideHouse) return;
    if (townSkillCd > 0) return;
    const sk = getHotbarSkill(slot);
    if (!sk) return;
    if (skillNeedsCharge(sk)) {
      skillCharge = { slot: slot, startFrame: frame, skillId: sk.id };
      messageDiv.textContent = sk.kind === 'sniper' ? 'Заряд снайпера…' : 'Заряд шара…';
      return;
    }
    castHotbarSlot(slot);
  }

  function releaseHotbarCharge() {
    if (!skillCharge) return;
    const held = frame - skillCharge.startFrame;
    const slot = skillCharge.slot;
    skillCharge = null;
    castHotbarSlot(slot, { chargeFrames: held });
  }

  function countMinionsOf(role) {
    let n = 0;
    for (let m of summonedMinions) if (m.role === role && m.hp > 0) n++;
    return n;
  }

  function nearestMinion(cx, cy) {
    let best = null, bd = 1e9;
    for (let m of summonedMinions) {
      if (m.hp <= 0) continue;
      const d = Math.hypot(m.x + m.w / 2 - cx, m.y + m.h / 2 - cy);
      if (d < bd) { bd = d; best = m; }
    }
    return best;
  }

  function removeMinion(m) {
    summonedMinions = summonedMinions.filter(x => x !== m && x.id !== m.id);
  }

  function spawnMinion(role, x, y, sk) {
    const guardSk = townPlayer.skills.find(s => s.id === 'skel_guard');
    const mod = (guardSk && guardSk.mod) || null;
    let hp = role === 'mage' ? 4 : 8;
    let dmg = sk.damage || 1;
    let speed = role === 'mage' ? 1.1 : 1.35;
    let range = role === 'mage' ? 90 : (mod === 'spear' ? 70 : 26);
    if (role === 'guard') {
      if (mod === 'berserk') { dmg = Math.round(dmg * 1.5); speed *= 1.5; }
      if (mod === 'shield') hp = Math.round(hp * 1.5);
      if (mod === 'poison') dmg = Math.max(1, Math.round(dmg * 0.85));
    }
    summonedMinions.push({
      id: role + '_' + frame + '_' + Math.floor(Math.random() * 999),
      role: role, kind: role,
      x: x, y: y, w: 16, h: 18,
      hp: hp, maxHp: hp, damage: dmg, speed: speed, range: range,
      bob: 0, atkCd: 0, life: 0,
      mod: role === 'guard' ? mod : null,
      poison: role === 'guard' && mod === 'poison',
      shieldBlock: role === 'guard' && mod === 'shield',
      damageMul: 1
    });
  }

  function currentCombatTargets() {
    const list = [];
    for (let s of fieldSlimes) if (s.alive) list.push(s);
    if (typeof guildDungeonBoss !== 'undefined' && guildDungeonBoss && guildDungeonBoss.alive) list.push(guildDungeonBoss);
    return list;
  }

  function nearestAliveEnemy(cx, cy, maxD) {
    let best = null, bd = maxD || 1e9;
    for (let t of currentCombatTargets()) {
      const d = Math.hypot(t.x + (t.w || 0) / 2 - cx, t.y + (t.h || 0) / 2);
      if (d < bd) { bd = d; best = t; }
    }
    return best;
  }

  function killEnemy(t) {
    if (!t) return;
    t.alive = false;
    t.hp = 0;
    if (t.boss) gainXp(8);
    else if (t.goblin) gainXp(2);
    else gainXp(t.kind === 'dungeon' ? 2 : 1);
    if (!t.goblin && t.kind !== 'dungeon') dropSlimeCore(t.x + (t.w || 0) / 2, t.y + (t.h || 0) / 2);
  }

  function applyAoEDamage(x, y, r, dmg, opts) {
    opts = opts || {};
    for (let t of currentCombatTargets()) {
      const tx = t.x + (t.w || 0) / 2, ty = t.y + (t.h || 0) / 2;
      if (Math.hypot(tx - x, ty - y) <= r) {
        t.hp -= dmg;
        if (opts.knock) {
          const d = Math.hypot(tx - x, ty - y) || 1;
          t.x += ((tx - x) / d) * opts.knock;
          t.y += ((ty - y) / d) * opts.knock;
        }
        if (opts.slow) t.slowTimer = Math.max(t.slowTimer || 0, opts.slow);
        if (t.hp <= 0) killEnemy(t);
      }
    }
  }

  function ensureSkillHotbar() {
    if (!townPlayer) return;
    if (!Array.isArray(townPlayer.skillHotbar) || townPlayer.skillHotbar.length !== 3) {
      const skills = townPlayer.skills || [];
      townPlayer.skillHotbar = [
        skills[0] ? skills[0].id : null,
        skills[1] ? skills[1].id : null,
        skills[2] ? skills[2].id : null
      ];
    }
  }

  function findSkillIndexById(id) {
    if (!townPlayer || !id) return -1;
    for (let i = 0; i < townPlayer.skills.length; i++) {
      if (townPlayer.skills[i].id === id) return i;
    }
    return -1;
  }

  function getHotbarSkill(slot) {
    ensureSkillHotbar();
    const id = townPlayer.skillHotbar[slot];
    if (!id) return null;
    const idx = findSkillIndexById(id);
    return idx >= 0 ? townPlayer.skills[idx] : null;
  }

  function castHotbarSlot(slot, opts) {
    if (!townPlayer || rpgUi || paused || insideHouse) return;
    if (townSkillCd > 0) return;
    ensureSkillHotbar();
    const id = townPlayer.skillHotbar[slot];
    if (!id) {
      messageDiv.textContent = 'Слот навыка пуст — открой X и перетащи навык';
      setTimeout(() => {
        if (messageDiv.textContent.indexOf('Слот навыка') !== -1) messageDiv.textContent = '';
      }, 1200);
      return;
    }
    const idx = findSkillIndexById(id);
    if (idx < 0) {
      townPlayer.skillHotbar[slot] = null;
      return;
    }
    castTownSkill(idx, opts);
  }

  function fillEmptyHotbarWithSkill(skillId) {
    if (!townPlayer || !skillId) return;
    ensureSkillHotbar();
    for (let i = 0; i < 3; i++) {
      if (!townPlayer.skillHotbar[i]) {
        townPlayer.skillHotbar[i] = skillId;
        return;
      }
    }
  }

  function nearDungeonChest() {
    if (!townPlayer || !dungeonChest || gameState !== STATE.DUNGEON) return false;
    const c = dungeonChest;
    return Math.hypot(
      townPlayer.x + townPlayer.w / 2 - (c.x + c.w / 2),
      townPlayer.y + townPlayer.h / 2 - (c.y + c.h / 2)
    ) < 42;
  }

  function nearGatherNode() {
    if (!townPlayer || (gameState !== STATE.GATHER && gameState !== STATE.GUILD_GATHER)) return false;
    for (let n of fieldNodes) {
      if (n.taken) continue;
      if (Math.hypot(townPlayer.x + townPlayer.w / 2 - n.x, townPlayer.y + townPlayer.h / 2 - n.y) < 28) return true;
    }
    return false;
  }

  function canInteractWithE() {
    if (insideHouse) return true;
    if (nearDungeonChest()) return true;
    if (nearGatherNode()) return true;
    if (nearTownBuilding && townPlayer) {
      const cx = townPlayer.x + townPlayer.w / 2;
      const cy = townPlayer.y + townPlayer.h / 2;
      if (atBuildingDoor(cx, cy, nearTownBuilding)) return true;
    }
    if (nearSeekerNpc()) return true;
    return false;
  }

  function tryUseEKey() {
    if (rpgUi) return;
    if (insideHouse) {
      exitHouseInterior();
      return;
    }
    if (gameState === STATE.DUNGEON && nearDungeonChest()) {
      tryOpenDungeonChest();
      return;
    }
    if ((gameState === STATE.GATHER || gameState === STATE.GUILD_GATHER) && nearGatherNode()) {
      tryGatherNode();
      return;
    }
    if (nearTownBuilding && townPlayer) {
      const cx = townPlayer.x + townPlayer.w / 2;
      const cy = townPlayer.y + townPlayer.h / 2;
      if (atBuildingDoor(cx, cy, nearTownBuilding)) {
        enterHouseInterior(nearTownBuilding);
        return;
      }
    }
    if (nearSeekerNpc()) {
      openShop('seeker');
      return;
    }
    // не у двери / сундука / ресурса — второй навык
    castHotbarSlot(1);
  }

  function nearSeekerNpc() {
    if (!townPlayer || gameState !== STATE.CITY || insideHouse) return false;
    ensureTownNpcs();
    const cx = townPlayer.x + townPlayer.w / 2;
    const cy = townPlayer.y + townPlayer.h / 2;
    for (let n of townNpcs) {
      if (n.role !== 'search') continue;
      if (Math.hypot(cx - n.x, cy - n.y) < 36) return true;
    }
    return false;
  }

  function regenMana() {
    if (!townPlayer || !(townPlayer.maxMana > 0)) return;
    if (townPlayer.mana < townPlayer.maxMana) {
      townPlayer.mana = Math.min(townPlayer.maxMana, townPlayer.mana + 0.04);
    }
  }

  function updateLevelUpSparkle() {
    if (!levelUpSparkleActive) return;
    if (performance.now() >= levelUpSparkleUntil) {
      levelUpSparkleActive = false;
      if (pendingLevelUps > 0 && rpgUi !== 'levelup') openLevelUpChoice();
    }
  }

  function updateSummonedAlly() {
    if (summonedAlly) {
      summonedAlly.life--;
      summonedAlly.bob += 0.2;
      if (summonedAlly.kind === 'chicken') {
        summonedAlly.x += Math.sin(summonedAlly.bob) * 0.55;
        summonedAlly.y += Math.cos(summonedAlly.bob * 0.8) * 0.35;
      }
      if (summonedAlly.life <= 0) summonedAlly = null;
    }
    updateSummonedMinions();
    if (hawkEyeTimer > 0) hawkEyeTimer--;
    if (possessTimer > 0) {
      possessTimer--;
      if (possessTimer <= 0) {
        for (let m of summonedMinions) {
          if (m.id === possessMinionId) {
            m.possessed = false;
            m.invuln = false;
            m.damageMul = 1;
          }
        }
        possessMinionId = null;
      }
    }
  }

  function updateSummonedMinions() {
    if (!townPlayer) return;
    const targets = currentCombatTargets();
    const pcx = townPlayer.x + townPlayer.w / 2;
    const pcy = townPlayer.y + townPlayer.h / 2;
    for (let i = summonedMinions.length - 1; i >= 0; i--) {
      const m = summonedMinions[i];
      m.bob += 0.15;
      if (m.life > 0) {
        m.life--;
        if (m.life <= 0) { summonedMinions.splice(i, 1); continue; }
      }
      if (m.mod === 'berserk') {
        m.hp -= m.maxHp * 0.05 / 60;
        if (m.hp <= 0) { summonedMinions.splice(i, 1); continue; }
      }
      // следование / бой
      let tx = pcx, ty = pcy, fight = null;
      let bestD = 1e9;
      for (let t of targets) {
        const d = Math.hypot(t.x + (t.w || 0) / 2 - (m.x + m.w / 2), t.y + (t.h || 0) / 2 - (m.y + m.h / 2));
        if (d < bestD) { bestD = d; fight = t; }
      }
      if (m.distract) {
        // мясо — просто стоит рядом, отвлекая
      } else if (fight && bestD < (m.range || 26) + 40) {
        tx = fight.x + (fight.w || 0) / 2;
        ty = fight.y + (fight.h || 0) / 2;
        const dx = tx - (m.x + m.w / 2);
        const dy = ty - (m.y + m.h / 2);
        const d = Math.hypot(dx, dy) || 1;
        if (d > (m.range || 26)) {
          m.x += (dx / d) * m.speed;
          m.y += (dy / d) * m.speed;
        } else if (m.atkCd <= 0) {
          let dmg = (m.damage || 1) * (m.damageMul || 1);
          fight.hp -= dmg;
          if (m.poison) fight.bleedTimer = Math.max(fight.bleedTimer || 0, 120);
          if (m.role === 'mage') fight.slowTimer = Math.max(fight.slowTimer || 0, 90);
          if (m.possessed) {
            townPlayer.hp = Math.min(townPlayer.maxHp, townPlayer.hp + Math.max(1, Math.round(dmg * 0.35)));
          }
          if (fight.hp <= 0) killEnemy(fight);
          m.atkCd = m.role === 'mage' ? 40 : 28;
        }
      } else {
        const dx = pcx - (m.x + m.w / 2);
        const dy = pcy - (m.y + m.h / 2);
        const d = Math.hypot(dx, dy) || 1;
        if (d > 40) {
          m.x += (dx / d) * m.speed * 0.9;
          m.y += (dy / d) * m.speed * 0.9;
        }
      }
      if (m.atkCd > 0) m.atkCd--;
    }
  }

  function getMobChaseTarget(pcx, pcy) {
    if (summonedAlly && summonedAlly.kind === 'chicken' && summonedAlly.life > 0) {
      return { x: summonedAlly.x, y: summonedAlly.y, distract: true };
    }
    for (let m of summonedMinions) {
      if (m.distract && m.hp > 0) return { x: m.x + m.w / 2, y: m.y + m.h / 2, distract: true };
    }
    // лёгкий аггро на стража рядом
    for (let m of summonedMinions) {
      if (m.role === 'guard' && m.hp > 0) {
        const d = Math.hypot(m.x + m.w / 2 - pcx, m.y + m.h / 2 - pcy);
        if (d < 100) return { x: m.x + m.w / 2, y: m.y + m.h / 2, distract: false };
      }
    }
    return { x: pcx, y: pcy, distract: false };
  }

  function mobSpeedMul(m) {
    if (m.stunTimer > 0) return 0;
    if (m.slowTimer > 0) return 0.45;
    if (m.snareTimer > 0) return 0;
    return 1;
  }

  function tickMobStatus(m) {
    if (m.stunTimer > 0) m.stunTimer--;
    if (m.slowTimer > 0) m.slowTimer--;
    if (m.snareTimer > 0) m.snareTimer--;
    if (m.bleedTimer > 0) {
      m.bleedTimer--;
      if (m.bleedTimer % 30 === 0) {
        m.hp -= 0.5;
        if (m.hp <= 0) killEnemy(m);
      }
    }
  }

  function updateFieldTraps() {
    for (let i = fieldTraps.length - 1; i >= 0; i--) {
      const tr = fieldTraps[i];
      tr.life--;
      if (tr.life <= 0) { fieldTraps.splice(i, 1); continue; }
      if (!tr.armed) continue;
      for (let t of currentCombatTargets()) {
        const d = Math.hypot(t.x + (t.w || 0) / 2 - tr.x, t.y + (t.h || 0) / 2 - tr.y);
        if (d < tr.r + 10) {
          t.snareTimer = 120;
          tr.armed = false;
          tr.life = Math.min(tr.life, 30);
          break;
        }
      }
    }
  }

  function dropSlimeCore(x, y) {
    fieldDrops.push({
      kind: 'slime_core',
      x: x + rand(-8, 8),
      y: y + rand(-6, 6),
      r: 10,
      bob: rand(0, Math.PI * 2),
      taken: false
    });
    messageDiv.textContent = 'Ядро выпало — подойди и подбери!';
    setTimeout(() => {
      if (messageDiv.textContent.indexOf('Ядро выпало') !== -1) messageDiv.textContent = '';
    }, 1200);
  }

  function updateFieldDrops() {
    if (!townPlayer || !fieldDrops.length) return;
    const pcx = townPlayer.x + townPlayer.w / 2;
    const pcy = townPlayer.y + townPlayer.h / 2;
    for (let i = fieldDrops.length - 1; i >= 0; i--) {
      const d = fieldDrops[i];
      if (d.taken) { fieldDrops.splice(i, 1); continue; }
      d.bob += 0.12;
      if (Math.hypot(pcx - d.x, pcy - d.y) < 22) {
        d.taken = true;
        if (d.kind === 'slime_core') {
          townPlayer.bag.push(makeItem(
            'slime_core_' + frame + '_' + i,
            'Ядро слизня I',
            'quest',
            { desc: 'Можно сдать в гильдии за 1⚪', coreLevel: 1, sellSilver: 1 }
          ));
          messageDiv.textContent = 'Подобрано: Ядро слизня I';
          setTimeout(() => {
            if (messageDiv.textContent.indexOf('Подобрано') !== -1) messageDiv.textContent = '';
          }, 900);
        }
        fieldDrops.splice(i, 1);
      }
    }
  }

  function drawFieldDrops() {
    for (let d of fieldDrops) {
      if (d.taken) continue;
      const bounce = Math.sin(d.bob) * 3;
      // тень
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y + 6, 8, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // ядро
      const g = ctx.createRadialGradient(d.x - 2, d.y - 2 + bounce, 2, d.x, d.y + bounce, d.r);
      g.addColorStop(0, '#c8e6c9');
      g.addColorStop(0.5, '#66bb6a');
      g.addColorStop(1, '#2e7d32');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(d.x, d.y + bounce, d.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#a5d6a7';
      ctx.lineWidth = 2;
      ctx.stroke();
      // блик
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(d.x - 3, d.y - 3 + bounce, 3, 0, Math.PI * 2);
      ctx.fill();
      // подсказка
      if (Math.sin(d.bob) > 0.6) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.font = '10px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ядро', d.x, d.y - 14 + bounce);
      }
    }
  }

  function xpNeededForLevel(level) {
    return Math.round(10 * Math.pow(1.5, Math.max(0, level - 1)));
  }

  function gainXp(amount) {
    if (!townPlayer || amount <= 0) return;
    townPlayer.xp += amount;
    messageDiv.textContent = '+' + amount + ' XP';
    setTimeout(() => {
      if (messageDiv.textContent.indexOf('XP') !== -1) messageDiv.textContent = '';
    }, 700);
    while (townPlayer.xp >= townPlayer.xpToNext) {
      townPlayer.xp -= townPlayer.xpToNext;
      pendingLevelUps++;
      townPlayer.maxHp = Math.round(townPlayer.maxHp * 1.5);
      townPlayer.hp = townPlayer.maxHp;
      townPlayer.level++;
      townPlayer.xpToNext = xpNeededForLevel(townPlayer.level);
      if (advLevelSpan) {
        const def = CLASS_DEFS[townPlayer.classId];
        advLevelSpan.textContent = (def ? def.title + ' · ' : '') + 'Lv.' + townPlayer.level;
      }
      if (townPlayer.maxMana > 0) {
        townPlayer.maxMana = Math.round((townPlayer.maxMana || 5) * 1.5);
        townPlayer.mana = townPlayer.maxMana;
      }
    }
    if (pendingLevelUps > 0 && rpgUi !== 'levelup') {
      tryStartLevelUpFlow();
    }
  }

  function tryStartLevelUpFlow() {
    if (!townPlayer || pendingLevelUps <= 0 || rpgUi === 'levelup') return;
    if (townPlayer.classId === 'mage') {
      if (!levelUpSparkleActive) {
        levelUpSparkleActive = true;
        levelUpSparkleUntil = performance.now() + 3000;
        messageDiv.textContent = 'Новый уровень! Магия вспыхивает блёстками...';
      }
      return;
    }
    openLevelUpChoice();
  }

  function openLevelUpChoice() {
    if (!townPlayer || pendingLevelUps <= 0) return;
    levelUpSparkleActive = false;
    levelUpChoices = [];
    const owned = {};
    for (let s of townPlayer.skills) owned[s.id] = true;

    // модификации стартового навыка (ещё не взятые; одна на ветку)
    const mods = CLASS_SKILL_MODS[townPlayer.classId] || [];
    const baseHasMod = {};
    for (let m of mods) {
      if (skillModsOwned[m.id]) baseHasMod[m.baseId] = true;
    }
    for (let m of mods) {
      if (skillModsOwned[m.id] || baseHasMod[m.baseId]) continue;
      if (!owned[m.baseId]) continue;
      levelUpChoices.push({
        type: 'mod',
        mod: m,
        title: 'Модификация: «' + m.name + '»',
        desc: m.desc
      });
    }

    // навыки, открытые по уровню персонажа
    const unlocks = CLASS_SKILL_UNLOCKS[townPlayer.classId] || [];
    for (let u of unlocks) {
      if (townPlayer.level < u.atLevel) continue;
      if (owned[u.skill.id]) continue;
      levelUpChoices.push({
        type: 'new',
        skill: Object.assign({}, u.skill),
        title: 'Выучить «' + u.skill.name + '»',
        desc: 'Открытие с ур.' + u.atLevel + (u.skill.damage > 0 ? (' · урон ' + u.skill.damage) : '')
      });
    }

    // усиление уже известных
    for (let i = 0; i < townPlayer.skills.length; i++) {
      const s = townPlayer.skills[i];
      let desc = 'Ур. ' + s.level + ' → ' + (s.level + 1);
      if (s.kind === 'chicken' || s.kind === 'meat_wall') desc += ' · длительность +0.5с';
      else if (s.damage > 0) desc += ' · урон ' + s.damage + ' → ' + (s.damage + 1);
      else desc += ' · сила навыка +';
      levelUpChoices.push({
        type: 'upgrade',
        skillIndex: i,
        title: 'Улучшить «' + s.name + '»',
        desc: desc
      });
    }

    if (!levelUpChoices.length) {
      pendingLevelUps = 0;
      return;
    }
    levelUpFocus = 0;
    levelUpScroll = 0;
    rpgUi = 'levelup';
    messageDiv.textContent = 'Уровень ' + townPlayer.level + '! Выбери награду';
  }

  function ensureLevelUpInView() {
    if (!levelUpChoices.length) {
      levelUpScroll = 0;
      return;
    }
    levelUpFocus = Math.max(0, Math.min(levelUpChoices.length - 1, levelUpFocus));
    const maxScroll = Math.max(0, levelUpChoices.length - LEVELUP_VISIBLE);
    if (levelUpFocus < levelUpScroll) levelUpScroll = levelUpFocus;
    if (levelUpFocus >= levelUpScroll + LEVELUP_VISIBLE) {
      levelUpScroll = levelUpFocus - LEVELUP_VISIBLE + 1;
    }
    levelUpScroll = Math.max(0, Math.min(maxScroll, levelUpScroll));
  }

  function applyLevelUpChoice() {
    const ch = levelUpChoices[levelUpFocus];
    if (!ch || !townPlayer) return;
    if (ch.type === 'mod') {
      const mods = CLASS_SKILL_MODS[townPlayer.classId] || [];
      for (let m of mods) {
        if (m.baseId === ch.mod.baseId) delete skillModsOwned[m.id];
      }
      skillModsOwned[ch.mod.id] = true;
      const base = townPlayer.skills.find(s => s.id === ch.mod.baseId);
      if (base) {
        base.mod = ch.mod.id;
        const clean = (CLASS_DEFS[townPlayer.classId].skills.find(s => s.id === base.id) || {}).name || base.name;
        base.name = clean + ' (' + ch.mod.name + ')';
      }
      messageDiv.textContent = 'Модификация: ' + ch.mod.name;
    } else if (ch.type === 'upgrade') {
      const s = townPlayer.skills[ch.skillIndex];
      s.level++;
      if (s.kind === 'chicken' || s.kind === 'meat_wall') {
        s.duration = (s.duration || 180) + 30;
      } else if (s.damage > 0) {
        s.damage++;
      }
      messageDiv.textContent = s.name + ' теперь ур.' + s.level + '!';
    } else if (ch.type === 'new') {
      townPlayer.skills.push(Object.assign({}, ch.skill));
      fillEmptyHotbarWithSkill(ch.skill.id);
      messageDiv.textContent = 'Изучено: ' + ch.skill.name;
    }
    pendingLevelUps = Math.max(0, pendingLevelUps - 1);
    if (pendingLevelUps > 0) openLevelUpChoice();
    else {
      rpgUi = null;
      levelUpChoices = [];
    }
  }

  function paintStoneWall(x, y, w, h) {
    if (w <= 0 || h <= 0) return;
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.clip();

    const bw = 11;
    const bh = 8;
    const rows = Math.ceil(h / bh) + 2;
    const cols = Math.ceil(w / bw) + 3;

    for (let row = 0; row < rows; row++) {
      const oy = y + row * bh;
      // чуть неровный ряд — «дикий» камень
      const rowJitter = ((row * 17) % 3) - 1;
      const offset = (row % 2) * (bw * 0.5) + rowJitter;
      for (let col = -1; col < cols; col++) {
        const ox = x + col * bw + offset;
        const seed = (row * 31 + col * 17 + ((ox * 3) | 0)) & 7;
        const inset = 0.5 + (seed % 3) * 0.3;
        const sw = bw - 1.2 - (seed % 2) * 0.6;
        const sh = bh - 1.1 - ((seed >> 1) % 2) * 0.5;

        // объём камня: тень / свет поверх цвета стены
        ctx.fillStyle = seed < 3
          ? 'rgba(0,0,0,0.16)'
          : (seed < 5 ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.14)');
        ctx.fillRect(ox + inset, oy + inset, sw, sh);

        // блик на верхнем краю
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(ox + inset + 1, oy + inset + 0.5, sw - 2, 1.5);

        // тёмная кромка снизу/справа
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(ox + inset, oy + inset + sh - 1.2, sw, 1.2);
        ctx.fillRect(ox + inset + sw - 1.2, oy + inset, 1.2, sh);

        // мелкие точки-фактура
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        const px = ox + inset + 2 + (seed % 4);
        const py = oy + inset + 2 + ((seed * 3) % 3);
        ctx.fillRect(px, py, 1.2, 1.2);
        if (seed % 2 === 0) ctx.fillRect(px + 3, py + 2, 1, 1);
      }
    }

    // швы раствора между камнями
    ctx.strokeStyle = 'rgba(40, 28, 20, 0.28)';
    ctx.lineWidth = 1;
    for (let row = 0; row < rows; row++) {
      const oy = y + row * bh;
      const offset = (row % 2) * (bw * 0.5);
      ctx.beginPath();
      ctx.moveTo(x, oy);
      ctx.lineTo(x + w, oy);
      ctx.stroke();
      for (let col = -1; col < cols; col++) {
        const ox = x + col * bw + offset;
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox, oy + bh);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  function drawTownBuilding(b, highlight) {
    const roofH = 20;
    const bodyY = b.y + roofH * 0.45;
    const bodyH = b.h - roofH * 0.45;

    // тень
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(b.x + b.w / 2 + 4, b.y + b.h + 4, b.w * 0.45, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // стены с лёгким градиентом + фактура камня (цвет тот же)
    const wall = ctx.createLinearGradient(b.x, bodyY, b.x + b.w, bodyY + bodyH);
    wall.addColorStop(0, b.accent || '#fff');
    wall.addColorStop(0.35, b.color);
    wall.addColorStop(1, b.color);
    ctx.fillStyle = wall;
    ctx.fillRect(b.x, bodyY, b.w, bodyH);
    paintStoneWall(b.x, bodyY, b.w, bodyH);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(b.x + 0.5, bodyY + 0.5, b.w - 1, bodyH - 1);

    // крыша
    ctx.fillStyle = b.roof;
    ctx.beginPath();
    ctx.moveTo(b.x - 8, bodyY + 2);
    ctx.lineTo(b.x + b.w / 2, b.y);
    ctx.lineTo(b.x + b.w + 8, bodyY + 2);
    ctx.lineTo(b.x + b.w + 2, bodyY + 8);
    ctx.lineTo(b.x - 2, bodyY + 8);
    ctx.closePath();
    ctx.fill();
    // блик на крыше
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x + 8, bodyY);
    ctx.lineTo(b.x + b.w / 2 - 4, b.y + 8);
    ctx.stroke();

    // труба
    if (b.id % 2 === 0 || b.special === 'guild') {
      const cx = b.x + b.w * 0.72;
      ctx.fillStyle = '#78909c';
      ctx.fillRect(cx, b.y + 4, 10, 18);
      ctx.fillStyle = '#546e7a';
      ctx.fillRect(cx - 2, b.y + 2, 14, 5);
      if (frame % 40 < 28) {
        ctx.fillStyle = 'rgba(200,200,200,0.35)';
        ctx.beginPath();
        ctx.arc(cx + 5, b.y - 2 - (frame % 20) * 0.4, 4 + (frame % 10) * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // окна с рамами и ставнями
    function windowAt(wx, wy) {
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(wx - 2, wy - 2, 16, 16);
      ctx.fillStyle = '#fff59d';
      ctx.fillRect(wx, wy, 12, 12);
      ctx.strokeStyle = '#6d4c41';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx + 6, wy);
      ctx.lineTo(wx + 6, wy + 12);
      ctx.moveTo(wx, wy + 6);
      ctx.lineTo(wx + 12, wy + 6);
      ctx.stroke();
      // ставни
      ctx.fillStyle = b.roof;
      ctx.fillRect(wx - 7, wy, 5, 12);
      ctx.fillRect(wx + 14, wy, 5, 12);
    }
    windowAt(b.x + 12, bodyY + 12);
    windowAt(b.x + b.w - 28, bodyY + 12);
    if (b.w > 90) windowAt(b.x + b.w / 2 - 6, bodyY + 12);

    // дверь + крылечко
    if (b.door) {
      const dx = b.x + b.w / 2 - 9;
      const dy = b.y + b.h - 22;
      ctx.fillStyle = '#c4a574';
      ctx.fillRect(dx - 6, b.y + b.h - 4, 30, 5);
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(dx, dy, 18, 22);
      ctx.fillStyle = '#8d6e63';
      ctx.fillRect(dx + 2, dy + 2, 14, 18);
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.arc(dx + 14, dy + 12, 2, 0, Math.PI * 2);
      ctx.fill();
      // цветочный ящик
      ctx.fillStyle = '#6d4c41';
      ctx.fillRect(b.x + 8, bodyY + 28, 18, 5);
      ctx.fillStyle = '#e91e63';
      ctx.beginPath();
      ctx.arc(b.x + 12, bodyY + 26, 2.5, 0, Math.PI * 2);
      ctx.arc(b.x + 18, bodyY + 25, 2.5, 0, Math.PI * 2);
      ctx.arc(b.x + 24, bodyY + 26, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    // табличка / номер — только у домов без подписи и функции
    if (!b.special) {
      ctx.fillStyle = highlight ? '#fffde7' : 'rgba(255,255,255,0.9)';
      ctx.fillRect(b.x + b.w / 2 - 10, bodyY + bodyH / 2 - 2, 20, 16);
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 1;
      ctx.strokeRect(b.x + b.w / 2 - 10, bodyY + bodyH / 2 - 2, 20, 16);
      ctx.fillStyle = '#3e2723';
      ctx.font = 'bold 11px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(b.id), b.x + b.w / 2, bodyY + bodyH / 2 + 6);
    }

    if (b.special === 'guild') {
      ctx.fillStyle = '#ffe082';
      ctx.font = 'bold 11px Segoe UI, Arial';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('ГИЛЬДИЯ', b.x + b.w / 2, b.y + b.h - 6);
    }
    if (b.special === 'flowers') {
      ctx.fillStyle = '#fce4ec';
      ctx.font = 'bold 10px Segoe UI, Arial';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('ЦВЕТЫ', b.x + b.w / 2, b.y + b.h - 6);
    }
    if (b.special === 'weapons') {
      ctx.fillStyle = '#e8f5e9';
      ctx.font = 'bold 9px Segoe UI, Arial';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('ОРУЖИЕ', b.x + b.w / 2, b.y + b.h - 6);
    }
    if (b.special === 'potions') {
      ctx.fillStyle = '#f3e5f5';
      ctx.font = 'bold 9px Segoe UI, Arial';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('ЗЕЛЬЯ', b.x + b.w / 2, b.y + b.h - 6);
    }
    if (b.special === 'tavern') {
      ctx.fillStyle = '#ffe0b2';
      ctx.font = 'bold 9px Segoe UI, Arial';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('ТАВЕРНА', b.x + b.w / 2, b.y + b.h - 6);
    }
    if (b.special === 'forge') {
      ctx.fillStyle = '#eceff1';
      ctx.font = 'bold 10px Segoe UI, Arial';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('КУЗНЯ', b.x + b.w / 2, b.y + b.h - 6);
    }
  }

  function fillBrickRect(x, y, w, h) {
    if (w <= 0 || h <= 0) return;
    const bw = 16;
    const bh = 8;
    const mortar = '#4e342e';
    const brickLight = '#a1887f';
    const brickMid = '#8d6e63';
    const brickDark = '#6d4c41';
    ctx.fillStyle = mortar;
    ctx.fillRect(x, y, w, h);
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.clip();
    const rows = Math.ceil(h / bh) + 2;
    const cols = Math.ceil(w / bw) + 3;
    for (let row = 0; row < rows; row++) {
      const oy = y + row * bh;
      const offset = (row % 2) * (bw * 0.5);
      for (let col = -1; col < cols; col++) {
        const ox = x + col * bw + offset;
        const tone = (row * 3 + col * 5 + ((ox * 13) | 0)) % 3;
        ctx.fillStyle = tone === 0 ? brickLight : (tone === 1 ? brickMid : brickDark);
        ctx.fillRect(ox + 1, oy + 1, bw - 2, bh - 2);
        // лёгкий блик на кирпиче
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(ox + 2, oy + 2, bw - 5, 2);
      }
    }
    ctx.restore();
    // бордюр
    ctx.strokeStyle = 'rgba(62, 39, 35, 0.55)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  }

  function drawPathToDoor(b) {
    const doorX = b.x + b.w / 2;
    const doorY = b.y + b.h;
    // центры горизонтальных дорог (полоса h=28: 198→212, 340→354)
    let roadY = 212;
    if (doorY >= 300) roadY = 354;
    else if (doorY <= 200) roadY = 212;
    else roadY = doorY > 260 ? 354 : 212;

    // для гильдии — к центральной вертикальной
    if (b.special === 'guild') {
      const gh = Math.max(8, 212 - doorY);
      fillBrickRect(doorX - 10, doorY, 20, gh);
      return;
    }

    const pathW = 16;
    // вертикаль от двери к горизонтали
    const top = Math.min(doorY, roadY);
    const bot = Math.max(doorY, roadY + 14);
    if (bot > top) fillBrickRect(doorX - pathW / 2, top, pathW, bot - top);
  }

  function updateTownNpcs() {
    ensureTownNpcs();
    for (let n of townNpcs) {
      n.t++;
      n.phase += 0.12;
      if (n.role === 'monument') {
        if (n.pause > 0) { n.pause--; continue; }
        n.angle += 0.012;
        const nx = TOWN_FOUNTAIN.x + Math.cos(n.angle) * n.radius;
        const ny = TOWN_FOUNTAIN.y + Math.sin(n.angle) * n.radius * 0.72;
        if (!npcTownSolid(nx, ny)) {
          n.x = nx;
          n.y = ny;
        } else {
          // если упёрся в дом — чуть уменьши радиус на кадр
          n.angle += 0.04;
        }
        n.facing = Math.cos(n.angle + 0.1) >= 0 ? 1 : -1;
        if (n.t % 160 === 0) n.pause = 40 + (n.t % 30);
      } else if (n.role === 'water') {
        if (n.watering > 0) {
          n.watering--;
          continue;
        }
        if (n.pause > 0) { n.pause--; continue; }
        const tg = n.targets[n.ti];
        const dx = tg.x - n.x;
        const dy = tg.y - n.y;
        const d = Math.hypot(dx, dy) || 1;
        if (d < 4) {
          n.watering = 50;
          n.ti = (n.ti + 1) % n.targets.length;
          n.pause = 10;
        } else {
          moveNpcAround(n, dx, dy, 0.7);
        }
      } else if (n.role === 'search') {
        if (n.look > 0) { n.look--; continue; }
        if (n.pause > 0) { n.pause--; continue; }
        const dx = n.tx - n.x;
        const dy = n.ty - n.y;
        const d = Math.hypot(dx, dy) || 1;
        if (d < 5) {
          n.look = 45;
          n.pause = 8;
          n.tx = 120 + Math.random() * 560;
          n.ty = 120 + Math.random() * 240;
          if (Math.hypot(n.tx - TOWN_FOUNTAIN.x, n.ty - TOWN_FOUNTAIN.y) < 55) {
            n.tx = TOWN_FOUNTAIN.x + 90;
          }
        } else {
          moveNpcAround(n, dx, dy, 0.95);
        }
      } else if (n.role === 'merchant') {
        if (n.wave > 0) { n.wave--; }
        if (n.pause > 0) { n.pause--; continue; }
        const dx = n.tx - n.x;
        const dy = n.ty - n.y;
        const d = Math.hypot(dx, dy) || 1;
        if (d < 5) {
          n.wave = 35;
          n.pause = 50 + (n.t % 40);
          // вдоль нижней улицы у домов
          n.tx = 100 + Math.random() * 600;
          n.ty = 350 + Math.random() * 18;
        } else {
          moveNpcAround(n, dx, dy, 0.55);
        }
      }
    }
  }

      ctx.fillRect(-5, 0, 10, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(-7, -5, 4, 8);
    } else {
      ctx.fillStyle = n.color || '#8d6e63';
      ctx.fillRect(-8, -6, 16, 14);
    }

    // руки
    ctx.fillStyle = skin;
    if (n.role === 'water' && n.watering > 0) {
      ctx.fillRect(7, -4, 3.5, 9);
      ctx.fillRect(-7 - armSwing * 0.2, -2, 3.5, 8);
    } else if (n.role === 'merchant' && n.wave > 0) {
      ctx.fillRect(-7, -2, 3.5, 8);
      // машет
      ctx.save();
      ctx.translate(8, -4);
      ctx.rotate(-0.8 + Math.sin(frame * 0.25) * 0.35);
      ctx.fillRect(0, 0, 3.5, 9);
      ctx.restore();
    } else {
      ctx.fillRect(-8 - armSwing * 0.15, -2, 3.5, 9);
      ctx.fillRect(5 + armSwing * 0.15, -2, 3.5, 9);
    }

    // рукава поверх рук (короткие)
    if (n.role === 'monument') {
      ctx.fillStyle = n.coat || '#8d4e4e';
      ctx.fillRect(-9, -5, 4, 7);
      ctx.fillRect(5, -5, 4, 7);
    } else if (n.role === 'search') {
      ctx.fillStyle = n.tunic || '#6d4c41';
      ctx.fillRect(-9, -5, 4, 6);
      ctx.fillRect(5, -5, 4, 6);
    }

    // шея + голова
    ctx.fillStyle = skin;
    ctx.fillRect(-2.5, -10, 5, 4);
    ctx.beginPath();
    ctx.arc(0, -14, 7.2, 0, Math.PI * 2);
    ctx.fill();
    // румянец
    ctx.fillStyle = 'rgba(220, 120, 100, 0.28)';
    ctx.beginPath();
    ctx.ellipse(-4.2, -12.5, 1.8, 1.2, 0, 0, Math.PI * 2);
    ctx.ellipse(4.2, -12.5, 1.8, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // волосы
    ctx.fillStyle = hair;
    ctx.beginPath();
    ctx.ellipse(0, -17, 7.4, 4.8, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    if (n.role === 'merchant') {
      // пучок
      ctx.beginPath();
      ctx.arc(5, -19, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c62828';
      ctx.fillRect(3, -17, 4, 2);
    } else if (n.role === 'search') {
      ctx.fillRect(-7, -16, 14, 3);
      ctx.beginPath();
      ctx.moveTo(-6, -14);
      ctx.lineTo(-9, -8);
      ctx.lineTo(-4, -12);
      ctx.fill();
    } else if (n.role === 'water') {
      // шляпа садовника
      ctx.fillStyle = n.hat || '#8d6e63';
      ctx.beginPath();
      ctx.ellipse(0, -18, 9, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-5, -24, 10, 7);
      ctx.fillStyle = '#6d4c41';
      ctx.fillRect(-5, -19, 10, 2);
    } else {
      // гуляка — лёгкая чёлка
      ctx.beginPath();
      ctx.moveTo(-6, -16);
      ctx.quadraticCurveTo(-2, -12, 1, -16);
      ctx.fill();
    }

    // глаза и брови
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(-4.2, -16, 2.6, 0.8);
    ctx.fillRect(1.6, -16, 2.6, 0.8);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-2.8, -13.5, 1.7, 0, Math.PI * 2);
    ctx.arc(2.8, -13.5, 1.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2c1810';
    ctx.beginPath();
    ctx.arc(-2.4, -13.4, 0.9, 0, Math.PI * 2);
    ctx.arc(3.2, -13.4, 0.9, 0, Math.PI * 2);
    ctx.fill();
    // рот
    ctx.strokeStyle = 'rgba(120, 60, 50, 0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, -10.5, 2.2, 0.15, Math.PI - 0.15);
    ctx.stroke();

    // реквизит
    if (n.role === 'water' && n.watering > 0) {
      ctx.fillStyle = '#607d8b';
      ctx.beginPath();
      ctx.moveTo(9, -1);
      ctx.lineTo(20, -3);
      ctx.lineTo(21, 4);
      ctx.lineTo(10, 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#455a64';
      ctx.fillRect(18, -6, 4, 10);
      ctx.strokeStyle = 'rgba(120, 190, 255, 0.75)';
      ctx.lineWidth = 1.4;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(20, 3);
        ctx.lineTo(24 + i * 2.2, 11 + Math.sin(frame * 0.28 + i) * 2.5);
        ctx.stroke();
      }
    }
    if (n.role === 'search' && n.look > 0) {
      // карта в руках
      ctx.fillStyle = '#ffe0b2';
      ctx.fillRect(8, -8, 10, 8);
      ctx.strokeStyle = '#a1887f';
      ctx.strokeRect(8.5, -7.5, 9, 7);
      ctx.strokeStyle = '#8d6e63';
      ctx.beginPath();
      ctx.moveTo(10, -5);
      ctx.lineTo(15, -3);
      ctx.lineTo(12, -1);
      ctx.stroke();
    }
    if (n.role === 'merchant') {
      // корзина
      ctx.fillStyle = '#a1887f';
      ctx.beginPath();
      ctx.moveTo(8, 4);
      ctx.lineTo(10, 14);
      ctx.lineTo(20, 14);
      ctx.lineTo(18, 4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#6d4c41';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(14, 4, 5, Math.PI, 0);
      ctx.stroke();
      const blooms = ['#e91e63', '#fff59d', '#ce93d8', '#ef9a9a'];
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = blooms[i];
        ctx.beginPath();
        ctx.arc(11 + i * 2.2, 6 + (i % 2), 2.1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // подпись при паузе рядом — тонкая, как вывески города
    if (idle && (n.pause > 20 || n.wave > 10 || n.look > 20 || n.watering > 20)) {
      ctx.scale(n.facing || 1, 1); // сброс зеркала для текста
      ctx.fillStyle = 'rgba(255, 248, 225, 0.92)';
      ctx.fillRect(-18, -34, 36, 12);
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 1;
      ctx.strokeRect(-18, -34, 36, 12);
      ctx.fillStyle = '#3e2723';
      ctx.font = 'bold 9px Georgia, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.name, 0, -28);
      ctx.textBaseline = 'alphabetic';
    }

    ctx.restore();
  }

  function drawTownMap(opts) {
    opts = opts || {};
    // трава
    ctx.fillStyle = '#7cb342';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#8bc34a';
    for (let i = 0; i < 40; i++) {
      const gx = (i * 97 + 20) % W;
      const gy = (i * 53 + 15) % H;
      ctx.fillRect(gx, gy, 18, 10);
    }

    // вода слева и снизу
    ctx.fillStyle = '#64b5f6';
    ctx.fillRect(0, 0, 36, H);
    ctx.beginPath();
    ctx.moveTo(40, H - 55);
    ctx.quadraticCurveTo(200, H - 70, 380, H - 48);
    ctx.quadraticCurveTo(560, H - 30, 800, H - 50);
    ctx.lineTo(800, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f48fb1';
    ctx.fillRect(120, H - 38, 22, 10);
    ctx.fillStyle = '#fff59d';
    ctx.fillRect(220, H - 42, 20, 9);

    // доп. травяные пятна — только на газоне (до дорог, чтобы не портить кирпич)
    ctx.fillStyle = '#66bb6a';
    const grassPatches = [
      [45, 120], [180, 130], [310, 95], [480, 95],
      [620, 130], [95, 160], [740, 250], [40, 250],
      [300, 370], [520, 370], [700, 290], [160, 250]
    ];
    for (let g of grassPatches) {
      ctx.fillRect(g[0], g[1], 16 + (g[0] % 7), 9);
      ctx.fillRect(g[0] + 10, g[1] + 6, 12, 7);
    }

    function roadH(y, x0, x1) {
      fillBrickRect(x0, y, x1 - x0, 28);
    }
    function roadV(x, y0, y1) {
      fillBrickRect(x, y0, 28, y1 - y0);
    }

    // главные дороги — кирпичная кладка
    roadV(386, 90, 410);
    roadH(198, 60, 740);
    roadH(340, 70, 730);
    // боковые вертикали к рядам домов
    roadV(236, 100, 340);
    roadV(516, 100, 340);
    roadV(100, 110, 320);
    roadV(660, 110, 330);

    // дорожки к каждому дому
    for (let b of TOWN_BUILDINGS) drawPathToDoor(b);

    // площадь вокруг фонтана — тоже кирпич
    ctx.save();
    ctx.beginPath();
    ctx.arc(TOWN_FOUNTAIN.x, TOWN_FOUNTAIN.y, 62, 0, Math.PI * 2);
    ctx.clip();
    fillBrickRect(TOWN_FOUNTAIN.x - 62, TOWN_FOUNTAIN.y - 62, 124, 124);
    ctx.restore();
    // кольцо-памятник / бордюр
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(TOWN_FOUNTAIN.x, TOWN_FOUNTAIN.y, 62, 0, Math.PI * 2);
    ctx.stroke();

    // фонтан
    ctx.fillStyle = '#90caf9';
    ctx.beginPath();
    ctx.arc(TOWN_FOUNTAIN.x, TOWN_FOUNTAIN.y, TOWN_FOUNTAIN.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#546e7a';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.fillStyle = '#78909c';
    ctx.beginPath();
    ctx.arc(TOWN_FOUNTAIN.x, TOWN_FOUNTAIN.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      const a = frame * 0.08 + i * 1.2;
      ctx.beginPath();
      ctx.moveTo(TOWN_FOUNTAIN.x, TOWN_FOUNTAIN.y - 8);
      ctx.quadraticCurveTo(
        TOWN_FOUNTAIN.x + Math.cos(a) * 16,
        TOWN_FOUNTAIN.y - 28,
        TOWN_FOUNTAIN.x + Math.cos(a) * 22,
        TOWN_FOUNTAIN.y - 4
      );
      ctx.stroke();
    }
    const flowerCols = ['#f48fb1', '#fff', '#ce93d8', '#fff59d'];
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      ctx.fillStyle = flowerCols[i % flowerCols.length];
      ctx.beginPath();
      ctx.arc(
        TOWN_FOUNTAIN.x + Math.cos(a) * 50,
        TOWN_FOUNTAIN.y + Math.sin(a) * 50,
        4, 0, Math.PI * 2
      );
      ctx.fill();
    }

    function tree(tx, ty, spruce) {
      if (spruce) {
        ctx.fillStyle = '#00695c';
        ctx.beginPath();
        ctx.moveTo(tx, ty - 22);
        ctx.lineTo(tx + 10, ty);
        ctx.lineTo(tx - 10, ty);
        ctx.fill();
      } else {
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath();
        ctx.arc(tx, ty - 8, 12, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(tx - 2, ty - 2, 4, 8);
    }

    // куст (как под цифрой 1/2 на схеме)
    function bush(bx, by, scale) {
      scale = scale || 1;
      const r = 11 * scale;
      ctx.fillStyle = '#1b5e20';
      ctx.beginPath();
      ctx.arc(bx - 5 * scale, by - 2 * scale, r * 0.75, 0, Math.PI * 2);
      ctx.arc(bx + 5 * scale, by - 2 * scale, r * 0.75, 0, Math.PI * 2);
      ctx.arc(bx, by - 8 * scale, r * 0.9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#43a047';
      ctx.beginPath();
      ctx.arc(bx - 3 * scale, by - 6 * scale, r * 0.45, 0, Math.PI * 2);
      ctx.arc(bx + 4 * scale, by - 5 * scale, r * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }

    // деревья по краям
    tree(60, 80, false);
    tree(140, 70, true);
    tree(700, 80, false);
    tree(760, 160, false);
    tree(50, 300, true);

    // кусты (лишние убраны; 2 новых — по стрелкам на схеме)
    bush(40, 45, 1);
    // кривая стрелка: между оружейной и гильдией
    bush(295, 100, 1);
    // прямая стрелка: справа от площади фонтана / у кузни–цветов
    bush(475, 155, 1);
    // низ у фонтана (не мешают дорогам)
    bush(340, 320, 0.75);
    bush(460, 320, 0.75);

    function lamp(lx, ly) {
      ctx.fillStyle = '#212121';
      ctx.fillRect(lx - 2, ly - 18, 4, 18);
      ctx.fillStyle = '#ffe082';
      ctx.beginPath();
      ctx.arc(lx, ly - 20, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    lamp(370, 160); lamp(430, 160); lamp(370, 300); lamp(430, 300);
    lamp(200, 210); lamp(600, 210); lamp(120, 160); lamp(680, 160);

    // ворота
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(TOWN_GATES.x - 14, TOWN_GATES.y - 10, 14, 48);
    ctx.fillRect(TOWN_GATES.x + TOWN_GATES.w, TOWN_GATES.y - 10, 14, 48);
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(TOWN_GATES.x - 18, TOWN_GATES.y - 18, TOWN_GATES.w + 36, 12);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ВОРОТА', 400, TOWN_GATES.y + 28);

    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 6;
    ctx.strokeRect(12, 12, W - 24, H - 24);

    for (let b of TOWN_BUILDINGS) {
      drawTownBuilding(b, opts.highlightId === b.id);
    }
  }

  function drawTownGnome(x, y, facing, classId, walkPhase) {
    ctx.save();
    const walking = walkPhase != null && walkPhase !== false;
    const phase = typeof walkPhase === 'number' ? walkPhase : 0;
    const leg = walking ? Math.sin(phase) * 4.5 : 0;
    const bob = walking ? Math.abs(Math.sin(phase)) * 1.1 : 0;
    ctx.translate(x, y - bob);
    ctx.scale(facing || 1, 1);
    // ноги — шаг при ходьбе
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(-6 + leg * 0.35, 8 + Math.max(0, -leg) * 0.12, 5, 8);
    ctx.fillRect(1 - leg * 0.35, 8 + Math.max(0, leg) * 0.12, 5, 8);
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(-7 + leg * 0.35, 14, 6, 3);
    ctx.fillRect(0 - leg * 0.35, 14, 6, 3);
    // тело / шапка
    ctx.fillStyle = '#d44c4c';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.quadraticCurveTo(14, -2, 11, 10);
    ctx.lineTo(-11, 10);
    ctx.quadraticCurveTo(-14, -2, 0, -14);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-12, 6, 24, 4);
    ctx.beginPath();
    ctx.arc(0, -14, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-4, 0, 2, 0, Math.PI * 2);
    ctx.arc(4, 0, 2, 0, Math.PI * 2);
    ctx.fill();
    // класс-маркер
    if (classId === 'mage') {
      ctx.fillStyle = '#7e57c2';
      ctx.beginPath();
      ctx.arc(12, 2, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (classId === 'swordsman') {
      ctx.fillStyle = '#b0bec5';
      ctx.fillRect(10, -6, 3, 16);
      ctx.fillStyle = '#ef5350';
      ctx.fillRect(8, -8, 7, 4);
    } else if (classId === 'archer') {
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(12, 2, 8, -1.2, 1.2);
      ctx.stroke();
    } else if (classId === 'summoner') {
      ctx.fillStyle = '#ffb74d';
      ctx.beginPath();
      ctx.ellipse(13, 4, 6, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(15, 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ef6c00';
      ctx.fillRect(10, -10, 3, 10);
    }
    ctx.restore();
  }

  function drawMageLevelSparkles(cx, cy) {
    if (!levelUpSparkleActive) return;
    const t = performance.now() / 1000;
    ctx.save();
    for (let i = 0; i < 20; i++) {
      const a = t * 2.8 + i * 0.55;
      const r = 16 + (i % 5) * 4 + Math.sin(t * 5 + i) * 6;
      const x = cx + Math.cos(a) * r;
      const y = cy - 6 + Math.sin(a * 1.35) * r * 0.75;
      const s = 1.2 + (i % 4) * 0.7;
      ctx.globalAlpha = 0.4 + 0.55 * Math.abs(Math.sin(t * 7 + i));
      ctx.fillStyle = (i % 3 === 0) ? '#fff59d' : ((i % 3 === 1) ? '#e1bee7' : '#ffffff');
      ctx.beginPath();
      ctx.moveTo(x, y - s * 1.6);
      ctx.lineTo(x + s * 0.55, y);
      ctx.lineTo(x, y + s * 1.6);
      ctx.lineTo(x - s * 0.55, y);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSummonedAlly() {
    if (!summonedAlly || summonedAlly.life <= 0) return;
    const a = summonedAlly;
    const bounce = Math.sin(a.bob) * 2;
    ctx.save();
    ctx.translate(a.x, a.y + bounce);
    if (a.kind === 'chicken') {
      ctx.fillStyle = '#fff8e1';
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath();
      ctx.arc(8, -4, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ef6c00';
      ctx.beginPath();
      ctx.moveTo(12, -4);
      ctx.lineTo(17, -2);
      ctx.lineTo(12, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(10, -5, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e53935';
      ctx.beginPath();
      ctx.ellipse(-2, -8, 3, 2, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.35 + 0.25 * Math.sin(a.bob * 2);
      ctx.strokeStyle = '#ffecb3';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 16 + Math.sin(a.bob) * 2, 0, Math.PI * 2);
      ctx.stroke();
    } else if (a.kind === 'toad') {
      ctx.fillStyle = '#66bb6a';
      ctx.beginPath();
      ctx.ellipse(0, 2, 11, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#81c784';
      ctx.beginPath();
      ctx.arc(-4, -4, 5, 0, Math.PI * 2);
      ctx.arc(4, -4, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1b5e20';
      ctx.beginPath();
      ctx.arc(-4, -4, 1.5, 0, Math.PI * 2);
      ctx.arc(4, -4, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#a5d6a7';
      ctx.beginPath();
      ctx.arc(0, 0, a.slowRadius || 70, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawTownPlayerExtras() {
    if (!townPlayer) return;
    const cx = townPlayer.x + townPlayer.w / 2;
    const cy = townPlayer.y + townPlayer.h / 2;
    drawMageLevelSparkles(cx, cy);
    drawSummonedAlly();
    drawSummonedMinions();
    drawFieldTraps();
  }

  function drawSummonedMinions() {
    for (let m of summonedMinions) {
      if (m.hp <= 0) continue;
      const bounce = Math.sin(m.bob) * 2;
      ctx.save();
      ctx.translate(m.x + m.w / 2, m.y + m.h / 2 + bounce);
      if (m.role === 'meat') {
        ctx.fillStyle = '#8d6e63';
        ctx.beginPath();
        ctx.ellipse(0, 0, 9, 7, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (m.role === 'mage') {
        ctx.fillStyle = '#cfd8dc';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#81d4fa';
        ctx.beginPath();
        ctx.arc(0, -10, 5, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#eceff1';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#90a4ae';
        ctx.beginPath();
        ctx.arc(0, -10, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#263238';
        ctx.fillRect(-3, -11, 2, 2);
        ctx.fillRect(1, -11, 2, 2);
      }
      if (m.possessed) {
        ctx.strokeStyle = '#7e57c2';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 14, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
      // mini HP
      ctx.fillStyle = '#c62828';
      ctx.fillRect(m.x, m.y - 6, m.w, 3);
      ctx.fillStyle = '#66bb6a';
      ctx.fillRect(m.x, m.y - 6, m.w * Math.max(0, m.hp / m.maxHp), 3);
    }
  }

  function drawFieldTraps() {
    for (let tr of fieldTraps) {
      ctx.strokeStyle = tr.armed ? '#a1887f' : '#5d4037';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, tr.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(161,136,127,0.25)';

  function isOreItem(it) {
    return !!(it && (it.materialType === 'ore' || (it.name && it.name.indexOf('Руда') !== -1)));
  }

  function isGearWeapon(it) {
    return !!(it && it.slot === 'weapon');
  }

  function isForgeGear(it) {
    return !!(it && (it.slot === 'weapon' || it.slot === 'helmet' || it.slot === 'top' ||
      it.slot === 'bottom' || it.slot === 'boots'));
  }

  function itemLevelOf(it) {
    return Math.max(1, (it && it.itemLevel) || 1);
  }

  function repairCostSilver(it) {
    return 100 * Math.pow(2, itemLevelOf(it) - 1);
  }

  function upgradeCostSilver(it) {
    return 50 * Math.pow(2, itemLevelOf(it) - 1);
  }

  function markBroken(it) {
    if (!it || it.broken) return;
    it.broken = true;
    if (it._dmgBackup == null) it._dmgBackup = it.damage || 0;
    if (it._armorBackup == null) it._armorBackup = it.armor || 0;
    it.damage = Math.max(0, Math.floor((it._dmgBackup || it.damage || 0) * 0.3));
    it.armor = Math.max(0, Math.floor((it._armorBackup || it.armor || 0) * 0.3));
    if (it.name.indexOf('[Сломано]') !== 0) it.name = '[Сломано] ' + it.name;
  }

  function unmarkBroken(it) {
    if (!it || !it.broken) return;
    it.broken = false;
    if (it._dmgBackup != null) it.damage = it._dmgBackup;
    if (it._armorBackup != null) it.armor = it._armorBackup;
    it.name = (it.name || '').replace(/^\[Сломано\]\s*/, '');
  }

  function countOreInBag() {
    let n = 0;
    for (let it of townPlayer.bag) if (isOreItem(it)) n++;
    return n;
  }

  function consumeOreFromBag(n) {
    let left = n;
    for (let i = townPlayer.bag.length - 1; i >= 0 && left > 0; i--) {
      if (isOreItem(townPlayer.bag[i])) {
        townPlayer.bag.splice(i, 1);
        left--;
      }
    }
    return left === 0;
  }

  function returnForgeSlotsToBag() {
    if (!townPlayer) return;
    for (let k of ['weapon', 'ore', 'mat', 'out']) {
      if (forgeSlots[k]) {
        townPlayer.bag.push(forgeSlots[k]);
        forgeSlots[k] = null;
      }
    }
  }

  function forgeRepairPrice() {
    const w = forgeSlots.weapon;
    if (!w) return 100;
    return repairCostSilver(w);
  }

  function tryForgeRepair() {
    const w = forgeSlots.weapon;
    const ore = forgeSlots.ore;
    if (!w) { messageDiv.textContent = 'Положи сломанное оружие'; return; }
    if (!isGearWeapon(w)) { messageDiv.textContent = 'Нужно оружие'; return; }
    if (!w.broken) { messageDiv.textContent = 'Оружие целое — ремонт не нужен'; return; }
    if (!isOreItem(ore)) { messageDiv.textContent = 'Нужна руда'; return; }
    if (forgeSlots.out) { messageDiv.textContent = 'Забери готовое оружие из ячейки'; return; }
    const cost = repairCostSilver(w);
    if (getTotalCopper(townPlayer) < cost * 100) {
      messageDiv.textContent = 'Нужно ' + cost + '⚪';
      return;
    }
    addMoney(0, -cost, 0);
    const fixed = Object.assign({}, w);
    unmarkBroken(fixed);
    forgeSlots.weapon = null;
    forgeSlots.ore = null;
    forgeSlots.out = fixed;
    messageDiv.textContent = 'Починено: ' + fixed.name + ' (−' + cost + '⚪)';
    updateUI();
  }

  function tryForgeUpgrade() {
    const w = forgeSlots.weapon;
    if (!w || !isForgeGear(w)) { messageDiv.textContent = 'Положи снаряжение'; return; }
    if (w.broken) { messageDiv.textContent = 'Сначала почини'; return; }
    if (!isOreItem(forgeSlots.ore) || !isOreItem(forgeSlots.mat)) {
      messageDiv.textContent = 'Нужны 2 руды в ячейках';
      return;
    }
    if (forgeSlots.out) { messageDiv.textContent = 'Забери результат'; return; }
    const cost = upgradeCostSilver(w);
    if (getTotalCopper(townPlayer) < cost * 100) {
      messageDiv.textContent = 'Нужно ' + cost + '⚪';
      return;
    }
    addMoney(0, -cost, 0);
    const up = Object.assign({}, w);
    up.itemLevel = itemLevelOf(up) + 1;
    if (up.slot === 'weapon') {
      up.damage = (up.damage || 0) + 1;
      up._dmgBackup = up.damage;
    } else {
      up.armor = (up.armor || 0) + 1;
      up._armorBackup = up.armor;
    }
    up.name = (up.name || '').replace(/\s*·\s*ур\.\d+/, '') + ' · ур.' + up.itemLevel;
    up.desc = (up.desc || '') + ' · улучшено';
    forgeSlots.weapon = null;
    forgeSlots.ore = null;
    forgeSlots.mat = null;
    forgeSlots.out = up;
    messageDiv.textContent = 'Улучшено до ур.' + up.itemLevel + ' (−' + cost + '⚪)';
    updateUI();
  }

  function tryForgeCraft(recipe) {
    if (!recipe || !townPlayer) return;
    if (countOreInBag() < recipe.ore) {
      messageDiv.textContent = 'Нужно руды: ' + recipe.ore;
      return;
    }
    if (getTotalCopper(townPlayer) < (recipe.priceSilver || 0) * 100) {
      messageDiv.textContent = 'Нужно ' + recipe.priceSilver + '⚪';
      return;
    }
    consumeOreFromBag(recipe.ore);
    addMoney(0, -(recipe.priceSilver || 0), 0);
    const it = makeItem(
      'craft_' + recipe.slot + '_' + frame,
      recipe.name,
      recipe.slot,
      {
        damage: recipe.damage || 0,
        armor: recipe.armor || 0,
        itemLevel: recipe.itemLevel || 1,
        desc: recipe.desc || ''
      }
    );
    townPlayer.bag.push(it);
    messageDiv.textContent = 'Создано: ' + it.name;
    updateUI();

      return;

      return;

    if (q.type === 'flag') {
      if (q.flag === 'hubVisited' && townPlayer.hubVisited) {
        markQuestDone(q.id);
        addMoney(0, q.rewardSilver || 0, 0);
        messageDiv.textContent = 'Задание сдано! +' + (q.rewardSilver || 0) + '⚪';
      } else {
        messageDiv.textContent = 'Сначала выйди на поляну через ворота';
      }
      return;
    }
    if (q.type === 'dungeon') {
      townPlayer.activeGuildQuest = { id: q.id, rank: guildQuestRank, dungeon: q.dungeon, name: q.name };
      messageDiv.textContent = 'Задание взято! На поляне: «данж заданий» и «сбор ресурсов по заданию гильдии»';

  function onGoblinBossDefeated() {
    if (guildDungeonPhase === 'done') return;
    guildDungeonPhase = 'done';
    const qid = townPlayer.activeGuildQuest && townPlayer.activeGuildQuest.id;
    if (qid) markQuestDone(qid);
    if (townPlayer.activeGuildQuest) {
