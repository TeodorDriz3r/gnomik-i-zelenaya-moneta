    ctx.fillStyle = '#ff6b9d';
    ctx.beginPath();
    ctx.arc(0, -22, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5dade2';
    ctx.beginPath();
    ctx.arc(-6, -20, 1.8, 0, Math.PI * 2);
    ctx.arc(6, -20, 1.8, 0, Math.PI * 2);
    ctx.fill();

    // реалистичный глаз (пропорции ~1/5 лица)
    function drawPrettyEye(ex, ey, lookX, angry) {
      ctx.save();
      ctx.translate(ex, ey);
      // белок — миндалевидный
      ctx.fillStyle = '#fffaf5';
      ctx.beginPath();
      ctx.ellipse(0, 0, 3.4, 2.35, 0, 0, Math.PI * 2);
      ctx.fill();
      // тень верхнего века
      ctx.fillStyle = 'rgba(180,140,120,0.22)';
      ctx.beginPath();
      ctx.ellipse(0, -0.9, 3.2, 1.1, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      // радужка с градиентом
      const ig = ctx.createRadialGradient(lookX * 0.4, 0.2, 0.3, lookX * 0.2, 0, 2.1);
      ig.addColorStop(0, angry ? '#c39bd3' : '#a8d8ff');
      ig.addColorStop(0.45, angry ? '#7d3c98' : '#4a90c8');
      ig.addColorStop(1, angry ? '#4a235a' : '#1a3a5c');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.arc(lookX * 0.35, 0.15, 2.05, 0, Math.PI * 2);
      ctx.fill();
      // зрачок
      ctx.fillStyle = '#0d1b2a';
      ctx.beginPath();
      ctx.arc(lookX * 0.35, 0.15, 0.95, 0, Math.PI * 2);
      ctx.fill();
      // блики
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath();
      ctx.arc(lookX * 0.35 - 0.7, -0.55, 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(lookX * 0.35 + 0.55, 0.45, 0.28, 0, Math.PI * 2);
      ctx.fill();
      // линия верхнего века
      ctx.strokeStyle = '#5c4033';
      ctx.lineWidth = 1.15;
      ctx.beginPath();
      ctx.moveTo(-3.3, -0.3);
      ctx.quadraticCurveTo(0, angry ? -2.6 : -2.35, 3.3, -0.3);
      ctx.stroke();
      // нижнее веко мягко
      ctx.strokeStyle = 'rgba(92,64,51,0.45)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-3.1, 0.4);
      ctx.quadraticCurveTo(0, 2.1, 3.1, 0.4);
      ctx.stroke();
      // ресницы
      ctx.strokeStyle = '#3e2723';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-3.2, -0.5);
      ctx.lineTo(-4.1, -1.6);
      ctx.moveTo(-1.2, -2.0);
      ctx.lineTo(-1.5, -2.9);
      ctx.moveTo(1.2, -2.0);
      ctx.lineTo(1.5, -2.9);
      ctx.moveTo(3.2, -0.5);
      ctx.lineTo(4.1, -1.6);
      ctx.stroke();
      ctx.restore();
    }

    // румянец
    if (!opts.angry) {
      ctx.fillStyle = 'rgba(255,130,150,0.28)';
      ctx.beginPath();
      ctx.ellipse(-7.5, 3.5, 3.2, 2, 0, 0, Math.PI * 2);
      ctx.ellipse(7.5, 3.5, 3.2, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // глаза / лицо
    if (opts.angry) {
      drawPrettyEye(-5.2, -2.5, 0.4, true);
      drawPrettyEye(5.2, -2.5, 0.4, true);
      ctx.strokeStyle = '#4a3728';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-8.5, -6.5);
      ctx.lineTo(-2.5, -4.2);
      ctx.moveTo(8.5, -6.5);
      ctx.lineTo(2.5, -4.2);
      ctx.stroke();
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-4, 6.5);
      ctx.quadraticCurveTo(0, 4, 4, 6.5);
      ctx.stroke();
    } else if (opts.kiss) {
      // закрытые глаза
      ctx.strokeStyle = '#5c4033';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-8, -2);
      ctx.quadraticCurveTo(-5.2, 0.2, -2.4, -2);
      ctx.moveTo(2.4, -2);
      ctx.quadraticCurveTo(5.2, 0.2, 8, -2);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-7.5, -2.3);
      ctx.lineTo(-8.4, -3.4);
      ctx.moveTo(-5.2, -1.2);
      ctx.lineTo(-5.2, -2.5);
      ctx.moveTo(7.5, -2.3);
      ctx.lineTo(8.4, -3.4);
      ctx.moveTo(5.2, -1.2);
      ctx.lineTo(5.2, -2.5);
      ctx.stroke();
      ctx.fillStyle = opts.hardKiss ? '#ff2d6a' : '#ff6b9d';
      ctx.beginPath();
      // губы спереди лица (в сторону, куда смотрит — к гномику)
      ctx.ellipse(opts.hardKiss ? 11 : 9, 4, opts.hardKiss ? 5.5 : 4, opts.hardKiss ? 3.2 : 2.4, 0.2, 0, Math.PI * 2);
      ctx.fill();
      if (opts.hardKiss) {
        ctx.strokeStyle = '#4a3728';
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(-8, -6);
        ctx.lineTo(-3, -4);
        ctx.moveTo(8, -6);
        ctx.lineTo(3, -4);
        ctx.stroke();
      }
    } else {
      drawPrettyEye(-5.2, -2.8, 0.15, false);
      drawPrettyEye(5.2, -2.8, 0.15, false);
      // тонкие брови
      ctx.strokeStyle = '#8b6914';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-8.5, -7);
      ctx.quadraticCurveTo(-5.2, -8.2, -2.2, -6.8);
      ctx.moveTo(8.5, -7);
      ctx.quadraticCurveTo(5.2, -8.2, 2.2, -6.8);
      ctx.stroke();
      // нос едва заметный
      ctx.strokeStyle = 'rgba(180,130,110,0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0.5, -0.5);
      ctx.quadraticCurveTo(2, 2.5, 0, 3.2);
      ctx.stroke();
      // губы
      ctx.fillStyle = '#e86a8a';
      ctx.beginPath();
      ctx.ellipse(0, 6.2, 3.2, 1.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8fab';
      ctx.beginPath();
      ctx.ellipse(0, 5.6, 2.8, 0.9, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#d4577a';
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(-3, 6.2);
      ctx.lineTo(3, 6.2);
      ctx.stroke();
    }

    // ожерелье
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 9, 5.5, 0.25, Math.PI - 0.25);
    ctx.stroke();
    ctx.fillStyle = '#5dade2';
    ctx.beginPath();
    ctx.arc(0, 13.5, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawCutsceneDragon(ctx, x, y, facing, opts) {
    opts = opts || {};
    ctx.save();
    ctx.translate(x, y);
    if (opts.dive) ctx.rotate(facing < 0 ? -0.35 : 0.35);
    if (opts.flee) ctx.rotate(facing < 0 ? -0.55 : 0.55);
    ctx.scale(facing, 1);
    const flap = opts.flap ? Math.sin(opts.flap) * 12 : 0;
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath();
    ctx.ellipse(0, 0, 40, 28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#388e3c';
    ctx.beginPath();
    ctx.arc(28, -8, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.arc(32, -12, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c62828';
    ctx.beginPath();
    ctx.arc(34, -12, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // крылья — машут при полёте
    ctx.fillStyle = '#1b5e20';
    ctx.beginPath();
    ctx.moveTo(-5, -15);
    ctx.lineTo(-35, -45 - flap);
    ctx.lineTo(-15, -10);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, -15);
    ctx.lineTo(25, -50 - flap);
    ctx.lineTo(15, -10);
    ctx.fill();
    // когти
    ctx.fillStyle = '#1b5e20';
    ctx.fillRect(-20, 20, 12, 10);
    ctx.fillRect(8, 20, 12, 10);
    ctx.fillStyle = '#c0c0c0';
    ctx.beginPath();
    ctx.moveTo(-18, 30);
    ctx.lineTo(-22, 38);
    ctx.lineTo(-14, 30);
    ctx.moveTo(10, 30);
    ctx.lineTo(6, 38);
    ctx.lineTo(14, 30);
    ctx.fill();
    ctx.restore();
  }

  function drawCutsceneBackdrop() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#7ec8e8');
    grad.addColorStop(0.55, '#b8dfeb');
    grad.addColorStop(0.55, '#6b8c42');
    grad.addColorStop(1, '#4a6b2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // замок
    ctx.fillStyle = '#b0bec5';
    ctx.fillRect(560, 160, 160, 160);
    ctx.fillStyle = '#90a4ae';
    ctx.fillRect(540, 120, 50, 200);
    ctx.fillRect(690, 120, 50, 200);
    ctx.fillStyle = '#c62828';
    ctx.beginPath();
    ctx.moveTo(530, 120);
    ctx.lineTo(565, 80);
    ctx.lineTo(600, 120);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(680, 120);
    ctx.lineTo(715, 80);
    ctx.lineTo(750, 120);
    ctx.fill();
    ctx.fillStyle = '#fff59d';
    ctx.fillRect(590, 200, 30, 40);
    ctx.fillRect(660, 200, 30, 40);
    // земля линия
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 318, W, 4);
  }

  function updateCutscene() {
    if (!cutscene) return;
    const c = cutscene;
    c.t++;

    // Пропуск по пробелу (после короткой паузы)
    if (c.kind !== 'city' && c.t > 20 && keys.Space) {
      if (c.kind === 'intro') finishIntro();
      else if (c.kind === 'outro') finishOutro();
      return;
    }

    if (c.kind === 'intro') {
      // 0–70: сближение
      if (c.t < 70) {
        c.caption = 'Гномик и принцесса...';
        c.gnomeX += 1.1;
        c.princessX -= 1.1;
      }
      // 70–150: поцелуй
      else if (c.t < 150) {
        c.caption = '💕 Настоящая любовь!';
        if (c.t % 8 === 0) {
          c.hearts.push({ x: 390 + rand(-20, 20), y: 240, life: 60, vx: rand(-0.5, 0.5) });
        }
      }
      // 150–188: злодей пикирует с неба прямо к принцессе
      else if (c.t < 188) {
        c.caption = 'Злодей пикирует!!!';
        c.hearts = [];
        const targetX = c.princessX;
        const targetY = 250;
        const p = (c.t - 150) / 38;
        // ускорение пике
        const ease = p * p;
        c.dragonX = 820 + (targetX - 820) * ease;
        c.dragonY = -60 + (targetY - (-60)) * ease;
      }
      // 188–198: резко хватает
      else if (c.t < 198) {
        c.caption = 'Схватил принцессу!!!';
        c.princessHeld = true;
        c.grabFlash = 12;
        c.dragonX = c.princessX + (c.t === 188 ? 0 : rand(-2, 2));
        c.dragonY = 248;
      }
      // 198–270: резко уносит вверх и прочь
      else if (c.t < 270) {
        c.caption = 'Утащил её!!!';
        c.princessHeld = true;
        if (c.grabFlash > 0) c.grabFlash--;
        c.dragonX += 14;
        c.dragonY -= 9;
      }
      // 270–330: гномик в шоке
      else if (c.t < 330) {
        c.caption = 'Гномик отправляется на поиски...';
        c.dragonX += 10;
        c.dragonY -= 6;
      } else {
        finishIntro();
        return;
      }
    } else if (c.kind === 'outro') {
      if (c.t < 55) {
        c.caption = 'Победа! Принцесса свободна!';
        c.gnomeX += 2.4;
        c.princessX -= 1.0;
      } else if (c.t < 160) {
        // Жёсткий поцелуй — гномик наваливается
        c.hardKiss = true;
        c.caption = 'Гномик жёстко целует принцессу!!!';
        c.gnomeX = 355 + Math.sin(c.t * 0.45) * 3;
        c.princessX = 395 + Math.sin(c.t * 0.45 + 1) * 2;
        if (c.t % 5 === 0) {
          c.hearts.push({ x: 375 + rand(-25, 25), y: 230, life: 45, vx: rand(-0.8, 0.8) });
        }
        if (c.t > 100 && c.t % 12 === 0) {
          const words = ['Ммпф!!!', 'Отстань!!', 'Ты чё!!!', '#@%&!', 'Фу!!!'];
          c.swears.push({
            x: c.princessX + rand(-10, 30),
            y: 220,
            text: words[randInt(0, words.length - 1)],
            life: 40
          });
        }
      } else if (c.t < 200) {
        c.hardKiss = false;
        c.princessAngry = true;
        c.hearts = [];
        c.caption = 'Принцесса в бешенстве матерится!!!';
        if (c.t % 10 === 0) {
          const words = ['Бл@#%!!!', 'Идиот!!!', '#$%&!!!', 'Отвали!!!', 'Козёл!!!', 'Аааа!!!'];
          c.swears.push({
            x: c.princessX + rand(-20, 40),
            y: 210 + rand(-10, 10),
            text: words[randInt(0, words.length - 1)],
            life: 50
          });
        }
      } else if (c.t < 340) {
        c.caption = 'Убегает с детьми, матерясь!!! 😤👶👶';
        c.princessAngry = true;
        c.princessRun = true;
        c.princessX += 6.5;
        if (c.t % 14 === 0) {
          const words = ['Не подходит!!!', 'Дети, бежим!', '#@&%!!!', 'Вон отсюда!!!'];
          c.swears.push({
            x: c.princessX,
            y: 200,
            text: words[randInt(0, words.length - 1)],
            life: 45
          });
        }
        for (let kid of c.kids) {
          const target = c.princessX - kid.lag;
          kid.x += (target - kid.x) * 0.15;
        }
      } else if (c.t < 400) {
        c.caption = 'Гномик остался один... дети тоже сбежали';
        c.princessX += 8;
        for (let kid of c.kids) kid.x += 8;
      } else {
        // Сцена размышлений: по одному тексту, каждый ~2 сек
        c.thinking = true;
        c.swears = [];
        c.gnomeX += (360 - c.gnomeX) * 0.05;

        const thoughts = [
          'Нужно заработать больше денег...',
          'И нарвать цветов своей принцессе...',
          'Ведь я её так люблю… 💕'
        ];
        const settle = 45;       // пауза перед первой мыслью
        const holdBase = 120;    // ~2 сек на обычную мысль
        const holdLove = 180;    // последняя — подольше
        const gap = 30;          // пауза между мыслями
        const fade = 18;
        const local = c.t - 400;

        if (local < settle) {
          c.caption = 'Гномик задумался...';
          c.thoughtText = '';
          c.thoughtAlpha = 0;
        } else {
          // накопленное время по мыслям с разной длительностью
          let t2 = local - settle;
          let idx = 0;
          let phase = t2;
          while (idx < thoughts.length) {
            const h = idx === thoughts.length - 1 ? holdLove : holdBase;
            const cycle = h + gap;
            if (phase < cycle) break;
            phase -= cycle;
            idx++;
          }

          if (idx >= thoughts.length) {
            finishOutro();
            return;
          }

          const hold = idx === thoughts.length - 1 ? holdLove : holdBase;
          c.caption = 'Мысли гномика';
          if (phase < hold) {
            c.thoughtText = thoughts[idx];
            let a = 1;
            if (phase < fade) a = phase / fade;
            else if (phase > hold - fade) a = (hold - phase) / fade;
            c.thoughtAlpha = clamp(a, 0, 1);
          } else {
            c.thoughtText = '';
            c.thoughtAlpha = 0;
          }
        }
      }
    }

    for (let i = c.hearts.length - 1; i >= 0; i--) {
      const h = c.hearts[i];
      h.y -= 1.5;
      h.x += h.vx;
      h.life--;
      if (h.life <= 0) c.hearts.splice(i, 1);
    }
    if (c.swears) {
      for (let i = c.swears.length - 1; i >= 0; i--) {
        const s = c.swears[i];
        s.y -= 1.2;
        s.life--;
        if (s.life <= 0) c.swears.splice(i, 1);
      }
    }
  }

  function drawCutscene() {
    if (!cutscene) return;
    const c = cutscene;
    drawCutsceneBackdrop();

    const groundY = 290;

    if (c.kind === 'intro') {
      const kissing = c.t >= 70 && c.t < 150;
      const shocked = c.t >= 188;
      const diving = c.t >= 150 && c.t < 188;
      const fleeing = c.t >= 198;

      if (!c.princessHeld) {
        const px = kissing ? c.princessX - 8 : c.princessX;
        drawCutscenePrincess(ctx, px, groundY, -1, { kiss: kissing });
      }
      drawCutsceneGnome(ctx, c.gnomeX + (kissing ? 8 : 0), groundY, 1, {
        kiss: kissing && !shocked,
        shocked: shocked
      });

      if (c.t >= 150) {
        drawCutsceneDragon(ctx, c.dragonX, c.dragonY, diving || c.t < 198 ? -1 : 1, {
          flap: c.t * 0.55,
          dive: diving,
          flee: fleeing
        });
        if (c.princessHeld) {
          // принцесса в когтях — болтается
          const swing = Math.sin(c.t * 0.4) * 6;
          drawCutscenePrincess(ctx, c.dragonX + swing, c.dragonY + 28, fleeing ? 1 : -1, { angry: true });
        }
        // вспышка в момент хвата
        if (c.grabFlash > 0) {
          ctx.fillStyle = 'rgba(255,255,255,' + (c.grabFlash / 12) * 0.55 + ')';
          ctx.fillRect(0, 0, W, H);
        }
      }
    } else {
      const kissing = c.t >= 55 && c.t < 160 && !c.princessAngry;
      const hard = !!c.hardKiss;
      const thinking = !!c.thinking;
      const shakeX = hard ? Math.sin(c.t * 0.8) * 2 : 0;
      const gnomeDrawX = thinking ? 360 : (c.gnomeX + shakeX + (kissing ? 6 : 0));
      drawCutsceneGnome(ctx, gnomeDrawX, groundY, thinking ? -1 : 1, {
        kiss: kissing,
        hardKiss: hard,
        sad: c.t >= 200 && !thinking,
        thinking: thinking
      });
      if (!thinking && c.princessX < W + 80) {
        const bob = c.princessRun ? Math.sin(c.t * 0.55) * 5 : 0;
        const face = c.princessRun ? 1 : -1;
        const px = kissing ? c.princessX - 10 - shakeX : c.princessX - shakeX;
        drawCutscenePrincess(ctx, px, groundY + bob, face, {
          kiss: kissing,
          hardKiss: hard,
          angry: c.princessAngry
        });
      }
      // дети бегут за принцессой
      if (!thinking && c.kids && (c.princessRun || c.t >= 200)) {
        for (let kid of c.kids) {
          if (kid.x < W + 40) {
            const kb = Math.sin(c.t * 0.6 + kid.lag) * 3;
            drawCutsceneChild(ctx, kid.x, groundY + 8 + kb, 1, kid.hue);
          }
        }
      } else if (!thinking && c.kids && c.t < 200) {
        for (let i = 0; i < c.kids.length; i++) {
          const kid = c.kids[i];
          kid.x = 520 + i * 36;
          drawCutsceneChild(ctx, kid.x, groundY + 8, -1, kid.hue);
        }
      }
      if (thinking && c.thoughtText) {
        drawThoughtBubble(ctx, gnomeDrawX + 40, groundY - 50, c.thoughtText, c.thoughtAlpha);
      }
    }

    for (let h of c.hearts) {
      ctx.globalAlpha = clamp(h.life / 40, 0, 1);
      ctx.font = '22px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('💕', h.x, h.y);
      ctx.globalAlpha = 1;
    }
    if (c.swears) {
      for (let s of c.swears) {
        ctx.globalAlpha = clamp(s.life / 35, 0, 1);
        drawSwearBubble(ctx, s.x, s.y, s.text);
        ctx.globalAlpha = 1;
      }
    }

    // титры
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, H - 70, W, 70);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.fillText(c.caption, W / 2, H - 32);
    if (c.t > 25) {
      ctx.font = '14px Segoe UI, Arial';
      ctx.fillStyle = '#b5c7e8';
      ctx.fillText('Пробел — пропустить', W / 2, H - 10);
    }
  }

  function startBossFight() {
    dragon = new Dragon(W - 150, H - 40 - 60);
    fireballs = [];
    playerBullets = [];
    hasGun = false;
    gunFireCooldown = 0;
    gunPickup = new GunPickup(120, H - 40 - 50);
    gameState = STATE.BOSS;
    levelSpan.textContent = 'Босс';
    messageDiv.textContent = 'Дракон! Собери автомат и уворачивайся!';
    document.getElementById('controlsHint').innerHTML =
      'Подбери <b>автомат</b> — стреляет сам &nbsp;|&nbsp; уворачивайся от рывков и огня';
    if (player) {
      player = spawnMarioPlayer({ hasGun: false });
    }
  }

  function updateUI() {
    coinSpan.textContent = coins;
    livesSpan.textContent = lives;
    if (copperSpan && townPlayer) {
      normalizeMoney();
      copperSpan.textContent = townPlayer.copper || 0;
      silverSpan.textContent = townPlayer.silver || 0;
      goldSpan.textContent = townPlayer.gold || 0;
    }
  }

  function setAdventureHud(on) {
    if (hudClassic) hudClassic.style.display = on ? 'none' : 'flex';
    if (hudAdventure) hudAdventure.style.display = on ? 'flex' : 'none';
    if (on && townPlayer && advLevelSpan) {
      const def = CLASS_DEFS[townPlayer.classId];
      advLevelSpan.textContent = (def ? def.title + ' · ' : '') + 'Lv.' + townPlayer.level;
    }
    updateUI();
  }

  function isAdventureState() {
    return gameState === STATE.CITY || gameState === STATE.CITY_INTRO ||
      gameState === STATE.CLASS_SELECT || gameState === STATE.HUB ||
      gameState === STATE.SLIMES || gameState === STATE.DUNGEON || gameState === STATE.GATHER ||
      gameState === STATE.GUILD_DUNGEON || gameState === STATE.GUILD_GATHER;
  }

  function loseLife(msg) {
    lives--;
    updateUI();
    if (lives <= 0) {
      gameState = STATE.GAMEOVER;
      messageDiv.textContent = '💀 Игра окончена';
      showRestartOverlay('💀 КОНЕЦ', false);
      return true;
    }
    if (msg) {
      messageDiv.textContent = msg;
      setTimeout(() => { if (messageDiv.textContent === msg) messageDiv.textContent = ''; }, 1000);
    }
    return false;
  }

  function update() {
    if (paused) return;
    if (gameState === STATE.MENU) return;
    frame++;
    updateDayNight();

    if (gameState === STATE.INTRO || gameState === STATE.OUTRO) {
      updateCutscene();
      return;
    }
    if (gameState === STATE.CITY_INTRO) {
      updateCityIntro();
      return;
    }
    if (gameState === STATE.CLASS_SELECT) return;
    if (townPlayer && (
      gameState === STATE.CITY || gameState === STATE.HUB ||
      gameState === STATE.SLIMES || gameState === STATE.DUNGEON || gameState === STATE.GATHER ||
      gameState === STATE.GUILD_DUNGEON || gameState === STATE.GUILD_GATHER
    )) {
      updateLevelUpSparkle();
      updateSummonedAlly();
    }
    if (gameState === STATE.CITY) {
      updateCity();
      return;
    }
    if (gameState === STATE.HUB) { updateHub(); return; }
    if (gameState === STATE.SLIMES) { updateSlimesZone(); return; }
    if (gameState === STATE.DUNGEON) { updateDungeon(); return; }
    if (gameState === STATE.GATHER) { updateGather(); return; }
    if (gameState === STATE.GUILD_DUNGEON) { updateGuildDungeon(); return; }
    if (gameState === STATE.GUILD_GATHER) { updateGuildGather(); return; }

    if (gameState === STATE.MAIN) {
      if (!player.alive) {
        if (loseLife('Воскрешение... прогресс сохранён')) return;
        // Спавн на том же прогрессе (монеты/враги как были)
        player = spawnMarioPlayer();
        return;
      }

      player.update();
      for (let e of enemies) e.update();

      for (let e of enemies) {
        if (!e.alive) continue;
        if (rectCollide(player, e)) {
          if (player.vy > 0 && player.y + player.h < e.y + e.h / 2) {
            e.alive = false;
            player.vy = -6;
          } else {
            player.alive = false;
            return;
          }
        }
      }

      for (let coin of coinObjects) {
        if (coin.collected) continue;
        coin.update();
        const dx = player.x + player.w / 2 - coin.x;
        const dy = player.y + player.h / 2 - coin.y;
        if (Math.sqrt(dx * dx + dy * dy) < coin.r + 20) {
          if (coin.isGreen) {
            if (!greenCoinCollected) {
              greenCoinCollected = true;
              coin.collected = true;
              gameState = STATE.BOMBER;
              levelSpan.textContent = 'Бомбермен';
              messageDiv.textContent = 'Бомбермен: взрывай блоки, дойди до выхода!';
              document.getElementById('controlsHint').innerHTML =
                '<kbd>←↑→↓</kbd> – ход &nbsp;|&nbsp; <kbd>Пробел</kbd> – бомба ∞ &nbsp;|&nbsp; <kbd>Esc</kbd> – пауза';
              generateBomberLevel();
              return;
            }
          } else {
            coin.collected = true;
            coins++;
            updateUI();
          }
        }
      }

      const allCollected = coinObjects.every(c => c.collected || c.isGreen);
      if (allCollected && !dragon) {
        startBossFight();
      }

    } else if (gameState === STATE.BOMBER) {
      updateBomber();
    } else if (gameState === STATE.BOSS) {
      updateBoss();
    }
  }

  function respawnBomberPlayer() {
    bomberPlayer.x = BOMBER_CELL + 6;
    bomberPlayer.y = BOMBER_CELL + 6;
    bomberPlayer.alive = true;
    bomberPlayer.vx = 0;
    bomberPlayer.vy = 0;
  }

  function updateBomber() {
    if (!bomberPlayer.alive) {
      if (loseLife('Воскрешение в бомбермене...')) return;
      // Остаёмся в бомбермене с тем же прогрессом (блоки/монстры)
      respawnBomberPlayer();
      messageDiv.textContent = 'Снова в бомбермене — прогресс сохранён';
      setTimeout(() => {
        if (messageDiv.textContent.includes('Снова в бомбермене')) messageDiv.textContent = '';
      }, 1200);
      return;
    }

    const p = bomberPlayer;
    let dx = 0, dy = 0;
    if (keys.ArrowLeft) dx = -p.speed;
    if (keys.ArrowRight) dx = p.speed;
    if (keys.ArrowUp) dy = -p.speed;
    if (keys.ArrowDown) dy = p.speed;
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    p.moving = dx !== 0 || dy !== 0;
    p.vx = dx;
    p.vy = dy;

    // Бесконечные бомбы: Пробел
    if (keys.Space && !bomberBombKeyWasDown) placeBomberBomb();
    bomberBombKeyWasDown = keys.Space;

    p.x += dx;
    for (let wall of bomberWalls) {
      if (!wall.solid) continue;
      if (rectCollide(p, wall)) {
        if (dx > 0) p.x = wall.x - p.w;
        else if (dx < 0) p.x = wall.x + wall.w;
      }
    }
    p.y += dy;
    for (let wall of bomberWalls) {
      if (!wall.solid) continue;
      if (rectCollide(p, wall)) {
        if (dy > 0) p.y = wall.y - p.h;
        else if (dy < 0) p.y = wall.y + wall.h;
      }
    }

    p.x = clamp(p.x, 0, W - p.w);
    p.y = clamp(p.y, 0, H - p.h);

    // Подбор бонусов
    for (let i = bomberPickups.length - 1; i >= 0; i--) {
      const pick = bomberPickups[i];
      pick.anim += 0.12;
      if (rectCollide(p, pick)) {
        if (pick.type === 'life') {
          lives++;
          updateUI();
          messageDiv.textContent = '❤️ Бонус! +1 жизнь';
          setTimeout(() => {
            if (messageDiv.textContent.includes('Бонус')) messageDiv.textContent = '';
          }, 1500);
        }
        bomberPickups.splice(i, 1);
      }
    }

    // Бомбы
    for (let i = bomberBombs.length - 1; i >= 0; i--) {
      const bomb = bomberBombs[i];
      bomb.timer--;
      if (bomb.timer <= 0) {
        explodeBomberBomb(bomb);
        bomberBombs.splice(i, 1);
      }
    }

    // Взрывы
    for (let i = bomberExplosions.length - 1; i >= 0; i--) {
      bomberExplosions[i].timer--;
      if (bomberExplosions[i].timer <= 0) bomberExplosions.splice(i, 1);
    }

    // Монстры: патруль; заметили — преследуют в обход блоков
    const pgx = Math.floor((p.x + p.w / 2) / BOMBER_CELL);
    const pgy = Math.floor((p.y + p.h / 2) / BOMBER_CELL);

    for (let e of bomberEnemies) {
      if (!e.alive) continue;
      const egx = Math.floor((e.x + e.w / 2) / BOMBER_CELL);
      const egy = Math.floor((e.y + e.h / 2) / BOMBER_CELL);
      const sees = bomberEnemySeesPlayer(egx, egy, pgx, pgy);

      if (sees) {
        e.aggroTimer = 220; // продолжают идти даже если игрок спрятался за угол
      } else if (e.aggroTimer > 0) {
        e.aggroTimer--;
      }
      e.aggro = e.aggroTimer > 0;

      if (e.aggro) {
        chaseBomberPlayer(e);
      } else {
        e.turnTimer--;
        if (e.turnTimer <= 0) {
          pickBomberEnemyDir(e, false);
          e.turnTimer = randInt(50, 120);
        }
      }

      e.x += e.vx;
      let hit = false;
      for (let wall of bomberWalls) {
        if (!wall.solid) continue;
        if (rectCollide(e, wall)) { hit = true; break; }
      }
      if (hit || e.x < BOMBER_CELL || e.x + e.w > W - BOMBER_CELL) {
        e.x -= e.vx;
        if (e.aggro) chaseBomberPlayer(e);
        else {
          pickBomberEnemyDir(e, false);
          e.turnTimer = randInt(40, 90);
        }
      }

      e.y += e.vy;
      hit = false;
      for (let wall of bomberWalls) {
        if (!wall.solid) continue;
        if (rectCollide(e, wall)) { hit = true; break; }
      }
      if (hit || e.y < BOMBER_CELL || e.y + e.h > H - BOMBER_CELL) {
        e.y -= e.vy;
        if (e.aggro) chaseBomberPlayer(e);
        else {
          pickBomberEnemyDir(e, false);
          e.turnTimer = randInt(40, 90);
        }
      }

      if (rectCollide(p, e)) {
        p.alive = false;
        messageDiv.textContent = 'Погиб в бомбермене!';
        return;
      }
    }

    // Выход доступен, если над ним нет мягкого блока
    const exitCovered = bomberWalls.some(w =>
      w.breakable && w.x === bomberExit.x && w.y === bomberExit.y
    );
    if (bomberExit && !exitCovered && rectCollide(p, bomberExit)) {
      bomberComplete = true;
      gameState = STATE.MAIN;
      levelSpan.textContent = 'Марио';
      messageDiv.textContent = 'Бомбермен пройден! Возврат...';
      document.getElementById('controlsHint').innerHTML =
        '<kbd>A/D</kbd> или <kbd>←→</kbd> – ход &nbsp;|&nbsp; <kbd>W</kbd>/<kbd>↑</kbd>/<kbd>Пробел</kbd> – прыжок';
      const allCollected = coinObjects.every(c => c.collected || c.isGreen);
      if (allCollected && !dragon) {
        startBossFight();
      }
      setTimeout(() => {
        if (messageDiv.textContent === 'Бомбермен пройден! Возврат...') messageDiv.textContent = '';
      }, 1000);
    }
  }

  function respawnBossPlayer() {
    const keepGun = hasGun;
    player = spawnMarioPlayer({ hasGun: keepGun });
    if (!keepGun && (!gunPickup || gunPickup.collected)) {
      gunPickup = new GunPickup(120, H - 40 - 50);
    }
  }

  function updateBoss() {
    if (!dragon.alive) {
      startOutroCutscene();
      return;
    }

    player.update();
    dragon.update(player.x, player.y);

    // Подбор автомата
    if (gunPickup && !gunPickup.collected) {
      gunPickup.update();
      if (rectCollide(player, { x: gunPickup.x, y: gunPickup.y, w: gunPickup.w, h: gunPickup.h + 10 })) {
        gunPickup.collected = true;
        hasGun = true;
        player.hasGun = true;
        messageDiv.textContent = 'Автомат с автонаводкой! Стреляет сам!';
        setTimeout(() => {
          if (messageDiv.textContent.includes('Автомат')) messageDiv.textContent = '';
        }, 1800);
      }
    }

    // Автонаводка: стрельба по боссу
    if (hasGun && player.alive && dragon.alive) {
      gunFireCooldown--;
      if (gunFireCooldown <= 0) {
        gunFireCooldown = 7;
        const sx = player.x + player.w / 2 + player.facing * 18;
        const sy = player.y + player.h / 2;
        const tx = dragon.x + dragon.w / 2;
        const ty = dragon.y + dragon.h / 2;
        const ang = Math.atan2(ty - sy, tx - sx);
        const spd = 9;
        playerBullets.push(new PlayerBullet(sx, sy, Math.cos(ang) * spd, Math.sin(ang) * spd));
        player.facing = tx >= sx ? 1 : -1;
      }
    }

    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      b.update();
      if (!b.alive) { playerBullets.splice(i, 1); continue; }
      if (dragon.alive &&
          b.x > dragon.x && b.x < dragon.x + dragon.w &&
          b.y > dragon.y && b.y < dragon.y + dragon.h) {
        dragon.takeHit(1);
        playerBullets.splice(i, 1);
      }
    }

    for (let i = fireballs.length - 1; i >= 0; i--) {
      const fb = fireballs[i];
      fb.update();
      if (!fb.alive) { fireballs.splice(i, 1); continue; }
      if (player.alive) {
        const dx = player.x + player.w / 2 - fb.x;
        const dy = player.y + player.h / 2 - fb.y;
        if (Math.sqrt(dx * dx + dy * dy) < fb.r + 14) {
          player.alive = false;
          fireballs.splice(i, 1);
          if (loseLife('Воскрешение... Уворачивайся!')) return;
          respawnBossPlayer();
          continue;
        }
      }
    }

    if (player.alive && dragon.alive) {
      const overlapX = player.x + player.w > dragon.x && player.x < dragon.x + dragon.w;
      const playerBottom = player.y + player.h;
      const playerCenterY = player.y + player.h / 2;
      const stomping =
        player.vy > 0 &&
        overlapX &&
        playerBottom >= dragon.y &&
        playerBottom <= dragon.y + dragon.h * 0.55 &&
        playerCenterY < dragon.y + dragon.h * 0.4;

      if (stomping && dragon.hurtTimer <= 0) {
        dragon.takeHit(3);
        player.y = dragon.y - player.h;
        player.vy = -11;
        player.onGround = false;
        messageDiv.textContent = 'Попал прыжком! HP: ' + dragon.hp;
        setTimeout(() => {
          if (messageDiv.textContent.startsWith('Попал')) messageDiv.textContent = '';
        }, 500);
      } else if (overlapX && rectCollide(player, dragon) && !stomping && dragon.hurtTimer <= 0) {
        player.alive = false;
        if (loseLife('Воскрешение... Не стой рядом с боссом!')) return;
        respawnBossPlayer();
      }
    }

    if (player.y > H + 50) {
      player.alive = false;
      if (loseLife('Воскрешение...')) return;
      respawnBossPlayer();
    }
  }

  function draw() {
    ensureCrispDraw();
    ctx.clearRect(0, 0, W, H);

    if (gameState === STATE.MENU) {
      drawMenuBackground();
      return;
    }

    if (gameState === STATE.INTRO || gameState === STATE.OUTRO) {
      drawCutscene();
      return;
    }
    if (gameState === STATE.CITY_INTRO) {
      drawCityIntro();
      return;
    }
    if (gameState === STATE.CLASS_SELECT) {
      drawGuildInterior(null);
      drawTownGnome(400, 280, 1, null);
      return;
    }
    if (gameState === STATE.CITY) {
      drawCity();
      return;
    }
    if (gameState === STATE.HUB) { drawHub(); return; }
    if (gameState === STATE.SLIMES) { drawSlimesZone(); return; }
    if (gameState === STATE.DUNGEON) { drawDungeon(); return; }
    if (gameState === STATE.GATHER) { drawGather(); return; }
    if (gameState === STATE.GUILD_DUNGEON) { drawGuildDungeon(); return; }
    if (gameState === STATE.GUILD_GATHER) { drawGuildGather(); return; }

    if (gameState === STATE.MAIN || gameState === STATE.BOSS) {
      drawMain();
      if (gameState === STATE.BOSS) {
        if (gunPickup && !gunPickup.collected) gunPickup.draw(ctx);
        for (let b of playerBullets) b.draw(ctx);
        if (dragon) dragon.draw(ctx);
        for (let fb of fireballs) fb.draw(ctx);
      }
    } else if (gameState === STATE.BOMBER) {
      drawBomber();
    } else if (gameState === STATE.WIN) {
      drawMain();
    } else if (gameState === STATE.GAMEOVER) {
      drawMain();
    }
  }

  function drawMenuBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#5fa8d0');
    grad.addColorStop(0.55, '#a8d5e8');
    grad.addColorStop(0.55, '#6b8c42');
    grad.addColorStop(1, '#4a6b2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // облака
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 4; i++) {
      const cx = (i * 220 + frame * 0.15) % (W + 120) - 60;
      ctx.beginPath();
      ctx.arc(cx, 50 + i * 18, 36, 0, Math.PI * 2);
      ctx.arc(cx + 40, 42 + i * 18, 28, 0, Math.PI * 2);
      ctx.arc(cx - 28, 55 + i * 18, 24, 0, Math.PI * 2);
      ctx.fill();
    }

    // замок вдалеке
    ctx.fillStyle = 'rgba(144,164,174,0.7)';
    ctx.fillRect(620, 160, 100, 120);
    ctx.fillRect(600, 130, 40, 150);
    ctx.fillRect(700, 130, 40, 150);
    ctx.fillStyle = 'rgba(198,40,40,0.75)';
    ctx.beginPath();
    ctx.moveTo(595, 130);
    ctx.lineTo(620, 100);
    ctx.lineTo(645, 130);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(695, 130);
    ctx.lineTo(720, 100);
    ctx.lineTo(745, 130);
    ctx.fill();

    // монетки летают
    for (let i = 0; i < 6; i++) {
      const mx = 80 + i * 120;
      const my = 280 + Math.sin(frame * 0.04 + i) * 18;
      ctx.fillStyle = i % 2 ? '#2ecc71' : '#f1c40f';
      ctx.beginPath();
      ctx.arc(mx, my, 10, 0, Math.PI * 2);
      ctx.fill();
    }

    frame++;
  }

  function drawMainBackdrop() {
    const night = dayNight && dayNight.isNight;
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    if (night) {
      sky.addColorStop(0, '#0d1b2a');
      sky.addColorStop(0.45, '#1b2838');
      sky.addColorStop(1, '#243447');
    } else {
      sky.addColorStop(0, '#4fc3f7');
      sky.addColorStop(0.35, '#81d4fa');
      sky.addColorStop(0.7, '#b3e5fc');
      sky.addColorStop(1, '#e1f5fe');
    }
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // солнце / луна
    if (night) {
      ctx.fillStyle = '#fff9c4';
      ctx.beginPath();
      ctx.arc(700, 58, 26, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0d1b2a';
      ctx.beginPath();
      ctx.arc(712, 50, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 36; i++) {
        const sx = (i * 97 + 40) % W;
        const sy = (i * 53 + 18) % 140;
        if ((Math.sin(frame * 0.05 + i) + 1) * 0.5 > 0.35) ctx.fillRect(sx, sy, 2, 2);
      }
    } else {
      const sun = ctx.createRadialGradient(670, 70, 4, 670, 70, 48);
      sun.addColorStop(0, '#fffde7');
      sun.addColorStop(0.35, '#ffe082');
      sun.addColorStop(1, 'rgba(255, 224, 130, 0)');
      ctx.fillStyle = sun;
      ctx.beginPath();
      ctx.arc(670, 70, 48, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffecb3';
      ctx.beginPath();
      ctx.arc(670, 70, 22, 0, Math.PI * 2);
      ctx.fill();
    }

    // дальние холмы
    ctx.fillStyle = night ? '#1e3a2f' : '#66bb6a';
    ctx.beginPath();
    ctx.moveTo(0, 310);
    ctx.quadraticCurveTo(120, 250, 240, 300);
    ctx.quadraticCurveTo(360, 230, 480, 295);
    ctx.quadraticCurveTo(620, 240, 800, 290);
    ctx.lineTo(800, H);
    ctx.lineTo(0, H);
    ctx.fill();
    ctx.fillStyle = night ? '#2e4a3a' : '#81c784';
    ctx.beginPath();
    ctx.moveTo(0, 340);
    ctx.quadraticCurveTo(160, 290, 320, 335);
    ctx.quadraticCurveTo(480, 280, 640, 330);
    ctx.quadraticCurveTo(740, 300, 800, 325);
    ctx.lineTo(800, H);
    ctx.lineTo(0, H);
    ctx.fill();

    // облака (днём)
    if (!night) {
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      for (let i = 0; i < 5; i++) {
        const cx = (i * 190 + frame * 0.035) % (W + 140) - 70;
        const cy = 36 + i * 14;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 42, 18, 0, 0, Math.PI * 2);
        ctx.ellipse(cx + 34, cy - 6, 28, 16, 0, 0, Math.PI * 2);
        ctx.ellipse(cx - 28, cy + 4, 26, 14, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // кусты у горизонта земли
    const bushY = H - 48;
    for (let i = 0; i < 8; i++) {
      const bx = 40 + i * 100 + ((i * 17) % 20);
      drawMainBush(bx, bushY, night);
    }
  }

  function drawMainBush(x, y, night) {
    ctx.fillStyle = night ? '#1b5e20' : '#2e7d32';
    ctx.beginPath();
    ctx.ellipse(x, y, 18, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(x - 12, y + 2, 12, 9, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 12, y + 2, 12, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = night ? '#388e3c' : '#66bb6a';
    ctx.beginPath();
    ctx.ellipse(x - 2, y - 4, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawMain() {
    drawMainBackdrop();

    for (let p of platforms) p.draw(ctx);
    for (let coin of coinObjects) coin.draw(ctx);
    for (let e of enemies) e.draw(ctx);
    if (player) player.draw(ctx);

    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    ctx.fillRect(10, 10, gameState === STATE.BOSS ? 270 : 190, 30);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px Segoe UI, Arial';
    ctx.textAlign = 'left';
    if (gameState === STATE.BOSS) {
      ctx.fillText(hasGun ? 'Автомат: автонаводка' : 'Подбери автомат слева!', 20, 31);
    } else {
      ctx.fillText('Золото: ' + coins + ' / ' + totalCoins, 20, 31);
    }
    drawDayNightOverlay({ soft: true });
  }

  function drawBomber() {
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(0, 0, W, H);

    // Выход под блоками
    if (bomberExit) {
      const covered = bomberWalls.some(w =>
        w.breakable && w.x === bomberExit.x && w.y === bomberExit.y
      );
      if (!covered) {
        ctx.fillStyle = '#f1c40f';
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 20;
        ctx.fillRect(bomberExit.x, bomberExit.y, bomberExit.w, bomberExit.h);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚪', bomberExit.x + bomberExit.w / 2, bomberExit.y + bomberExit.h / 2);
      }
    }

    for (let wall of bomberWalls) {
      if (!wall.solid) continue;
      if (wall.breakable) {
        ctx.fillStyle = '#c4a574';
        ctx.fillRect(wall.x + 2, wall.y + 2, wall.w - 4, wall.h - 4);
        ctx.strokeStyle = '#8b6914';
        ctx.lineWidth = 2;
        ctx.strokeRect(wall.x + 2, wall.y + 2, wall.w - 4, wall.h - 4);
        ctx.beginPath();
        ctx.moveTo(wall.x + 8, wall.y + wall.h / 2);
        ctx.lineTo(wall.x + wall.w - 8, wall.y + wall.h / 2);
        ctx.moveTo(wall.x + wall.w / 2, wall.y + 8);
        ctx.lineTo(wall.x + wall.w / 2, wall.y + wall.h - 8);
        ctx.stroke();
      } else {
        ctx.fillStyle = '#4a5c6a';
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2;
        ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
      }
    }

    for (let bomb of bomberBombs) {
      const pulse = 1 + Math.sin(frame * 0.3) * 0.08;
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(bomb.x + bomb.w / 2, bomb.y + bomb.h / 2, 12 * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(bomb.x + bomb.w / 2 + 8, bomb.y + bomb.h / 2 - 10);
      ctx.lineTo(bomb.x + bomb.w / 2 + 14, bomb.y + bomb.h / 2 - 18);
      ctx.stroke();
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.arc(bomb.x + bomb.w / 2 + 14, bomb.y + bomb.h / 2 - 18, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    for (let ex of bomberExplosions) {
      ctx.fillStyle = 'rgba(255, 140, 0, 0.85)';
      ctx.fillRect(ex.x + 2, ex.y + 2, ex.w - 4, ex.h - 4);
      ctx.fillStyle = 'rgba(255, 220, 50, 0.9)';
      ctx.fillRect(ex.x + 10, ex.y + 10, ex.w - 20, ex.h - 20);
    }

    // Бонусы (жизнь)
    for (let pick of bomberPickups) {
      const bob = Math.sin(pick.anim) * 3;
      ctx.save();
      ctx.translate(pick.x + pick.w / 2, pick.y + pick.h / 2 + bob);
      ctx.fillStyle = '#e74c3c';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(0, 6);
      ctx.bezierCurveTo(-12, -2, -10, -12, 0, -6);
      ctx.bezierCurveTo(10, -12, 12, -2, 0, 6);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('+1', 0, 2);
      ctx.restore();
    }

    for (let e of bomberEnemies) {
      if (!e.alive) continue;
      ctx.fillStyle = e.aggro ? '#ff1744' : '#e74c3c';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + e.h / 2, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2 - 4, e.y + e.h / 2 - 2, 4, 0, Math.PI * 2);
      ctx.arc(e.x + e.w / 2 + 4, e.y + e.h / 2 - 2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2 - 5, e.y + e.h / 2 - 4, 2, 0, Math.PI * 2);
      ctx.arc(e.x + e.w / 2 + 3, e.y + e.h / 2 - 4, 2, 0, Math.PI * 2);
      ctx.fill();
      if (e.aggro) {
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('!', e.x + e.w / 2, e.y - 2);
      }
    }

    if (bomberPlayer && bomberPlayer.alive) {
      drawBomberHatPlayer(ctx, bomberPlayer);
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(10, 10, 460, 30);
    ctx.fillStyle = '#fff';
    ctx.font = '15px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('Пробел — бомба ∞  |  ❤️ в блоках  |  Esc — пауза', 20, 32);
  }

  function drawBomberHatPlayer(ctx, p) {
    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;
    const run = p.moving ? Math.sin(frame * 0.45) : 0;
    const legSwing = run * 6;
    ctx.save();
    ctx.translate(cx, cy);
    // ноги
    ctx.fillStyle = '#6b4f3c';
    ctx.fillRect(-8 + legSwing * 0.3, 6, 6, 12);
    ctx.fillRect(2 - legSwing * 0.3, 6, 6, 12);
    // стопы
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(-9 + legSwing * 0.3, 16, 8, 4);
    ctx.fillRect(1 - legSwing * 0.3, 16, 8, 4);
    // красная шапка гномика (тело = шапка)
    ctx.fillStyle = '#d44c4c';
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.quadraticCurveTo(18, -4, 14, 8);
    ctx.lineTo(-14, 8);
    ctx.quadraticCurveTo(-18, -4, 0, -16);
    ctx.fill();
    // ободок шапки
    ctx.fillStyle = '#fff';
    ctx.fillRect(-15, 4, 30, 6);
    // помпон
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -16, 5, 0, Math.PI * 2);
    ctx.fill();
    // глазки на шапке
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-5, -2, 2.5, 0, Math.PI * 2);
    ctx.arc(5, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4.2, -2.8, 1, 0, Math.PI * 2);
    ctx.arc(5.8, -2.8, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // День / ночь: по 4 минуты
  const DAY_NIGHT_MS = 4 * 60 * 1000;
  let dayNight = {
    isNight: false,
    phaseStart: Date.now()
  };

  function resetDayNight() {
    dayNight.isNight = false;
    dayNight.phaseStart = Date.now();
  }

  function updateDayNight() {
    const elapsed = Date.now() - dayNight.phaseStart;
    if (elapsed >= DAY_NIGHT_MS) {
      dayNight.isNight = !dayNight.isNight;
      dayNight.phaseStart = Date.now();
      const inDungeon = gameState === STATE.DUNGEON || gameState === STATE.GUILD_DUNGEON;
      const inWorld = gameState === STATE.MAIN || gameState === STATE.BOSS ||
        gameState === STATE.CITY || gameState === STATE.HUB ||
        gameState === STATE.SLIMES || gameState === STATE.GATHER ||
        gameState === STATE.GUILD_GATHER;
      // в данже время идёт, но сообщение о смене фазы не показываем
      if (inWorld && !inDungeon) {
        messageDiv.textContent = dayNight.isNight ? 'Наступила ночь...' : 'Наступил день!';
        setTimeout(() => {
          if (messageDiv.textContent === 'Наступила ночь...' || messageDiv.textContent === 'Наступил день!') {
            messageDiv.textContent = '';
          }
        }, 2000);
      }
    }
  }

  function dayNightRemainingMs() {
    return Math.max(0, DAY_NIGHT_MS - (Date.now() - dayNight.phaseStart));
  }

  function dayNightLabel() {
    const sec = Math.ceil(dayNightRemainingMs() / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    const t = m + ':' + (s < 10 ? '0' : '') + s;
    return (dayNight.isNight ? 'Ночь' : 'День') + ' ' + t;
  }

  function isDungeonArea() {
    return gameState === STATE.DUNGEON || gameState === STATE.GUILD_DUNGEON;
  }

  function hpBarBox() {
    if (!townPlayer) return { x: W - 158, left: W - 164, boxH: 56 };
    const usesMana = townPlayer.maxMana > 0;
    const boxH = usesMana ? 72 : 56;
    const w = 140;
    const x = W - 158;
    return { x: x, left: x - 6, w: w, boxH: boxH };
  }

  function drawDayNightOverlay(opts) {
    opts = opts || {};
    const soft = !!opts.soft;
    // в данже ночь/луна не рисуются — время всё равно идёт в updateDayNight
    if (isDungeonArea()) return;

    if (dayNight.isNight) {
      ctx.fillStyle = soft ? 'rgba(8, 12, 40, 0.18)' : 'rgba(8, 12, 40, 0.48)';
      ctx.fillRect(0, 0, W, H);
      if (!soft) {
        // звёзды (луна — слева от HP, рисуется в drawHpBar)
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        for (let i = 0; i < 28; i++) {
          const sx = (i * 97 + 40) % W;
          const sy = (i * 53 + 20) % 120;
          const tw = 0.6 + Math.sin(frame * 0.05 + i) * 0.4;
          ctx.globalAlpha = tw;
          ctx.fillRect(sx, sy, 2, 2);
        }
        ctx.globalAlpha = 1;
      }
    } else if (!soft) {
      ctx.fillStyle = 'rgba(255, 250, 200, 0.04)';
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(W / 2 - 55, 8, 110, 22);
    ctx.fillStyle = dayNight.isNight ? '#90caf9' : '#ffe082';

    ctx.textAlign = 'center';
    ctx.fillText(dayNightLabel(), W / 2, 23);
    // луна поверх затемнения, слева от полосок HP
    if (dayNight.isNight && !soft) drawMoonNearHp();
  }

  function drawMoonNearHp() {
    if (!dayNight.isNight || isDungeonArea() || !townPlayer) return;
    const box = hpBarBox();

    ctx.fillStyle = '#fff9c4';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(8, 12, 40, 0.55)';
    ctx.beginPath();
    ctx.arc(moonX + 8, moonY - 5, 14, 0, Math.PI * 2);
    ctx.fill();
  }

    else if (c.phase === 1) {
      c.gnomeY -= 1.1;

    } else if (c.phase === 2 && c.t > 100) advanceCityIntro();
    else if (c.phase === 3) {
      c.gnomeX += (530 - c.gnomeX) * 0.04;

  function buildingDoorGap(b) {
    // проём двери по центру низа — как на фото (разрыв в чёрной линии)
    const doorW = Math.max(18, Math.min(26, Math.floor(b.w * 0.28)));
    const doorDepth = 16;
    return {
      x: b.x + b.w / 2 - doorW / 2,
      y: b.y + b.h - doorDepth,
      w: doorW,
      h: doorDepth + 10
    };
  }

  function buildingDoorZone(b) {
    return buildingDoorGap(b);
  }

  function atBuildingDoor(cx, cy, b) {
    const d = buildingDoorGap(b);
    return cx >= d.x - 2 && cx <= d.x + d.w + 2 &&
      cy >= d.y - 4 && cy <= d.y + d.h + 6;
  }

  function rectCollideBuildingSolid(box, b, allowDoor) {
    // 1) весь корпус дома (крыша+стены) — твёрдый
    const bodyH = Math.max(8, b.h - 16);
    const body = { x: b.x, y: b.y, w: b.w, h: bodyH };
    if (rectCollide(box, body)) return true;

    // 2) низ дома: две «полки» слева и справа от двери (чёрные линии на фото)
    const gap = buildingDoorGap(b);
    const bottomY = b.y + b.h - 16;
    const bottomH = 16;
    const left = { x: b.x, y: bottomY, w: gap.x - b.x, h: bottomH };
    const right = { x: gap.x + gap.w, y: bottomY, w: (b.x + b.w) - (gap.x + gap.w), h: bottomH };
    if (left.w > 0 && rectCollide(box, left)) return true;
    if (right.w > 0 && rectCollide(box, right)) return true;

    // 3) мобам дверной проём тоже закрыт; игроку — можно встать в двери
    if (!allowDoor) {
      const doorBlock = { x: gap.x, y: bottomY, w: gap.w, h: bottomH };
      if (rectCollide(box, doorBlock)) return true;
    }
    return false;
  }

  function townSolidAt(nx, ny, nw, nh, allowDoor) {
    const box = { x: nx, y: ny, w: nw, h: nh };
    for (let b of TOWN_BUILDINGS) {
      if (rectCollideBuildingSolid(box, b, !!allowDoor)) return true;
    }
    const fx = TOWN_FOUNTAIN.x;
    const fy = TOWN_FOUNTAIN.y;
    const cx = nx + nw / 2;
    const cy = ny + nh / 2;
    if (Math.hypot(cx - fx, cy - fy) < TOWN_FOUNTAIN.r - 4) return true;
    const atGates = (nx + nw / 2 > TOWN_GATES.x - 5 && nx + nw / 2 < TOWN_GATES.x + TOWN_GATES.w + 5 && ny > TOWN_GATES.y - 30);
    if (nx < 18 || ny < 18 || nx + nw > W - 18 || (!atGates && ny + nh > H - 18)) return true;
    return false;
  }

  function npcTownSolid(nx, ny) {
    // хитбокс городских жителей (центр тела ≈ n.x,n.y)
    return townSolidAt(nx - 7, ny - 2, 14, 18, false);
  }

  function moveNpcAround(n, dx, dy, speed) {
    const len = Math.hypot(dx, dy) || 1;
    const stepX = (dx / len) * speed;
    const stepY = (dy / len) * speed;
    const tx = n.x + stepX;
    const ty = n.y + stepY;
    if (!npcTownSolid(tx, ty)) {
      n.x = tx;
      n.y = ty;
    } else if (!npcTownSolid(tx, n.y)) {
      n.x = tx;
    } else if (!npcTownSolid(n.x, ty)) {
      n.y = ty;
    } else {
      // обойти: попробуй вбок вдоль контура
      if (!npcTownSolid(n.x + stepY, n.y - stepX)) {
        n.x += stepY;
        n.y -= stepX;
      } else if (!npcTownSolid(n.x - stepY, n.y + stepX)) {
        n.x -= stepY;
        n.y += stepX;
      }
    }
    if (Math.abs(dx) > 0.1) n.facing = dx >= 0 ? 1 : -1;
  }

  function pointInBox(mx, my, b) {
    return b && mx >= b.x && my >= b.y && mx <= b.x + b.w && my <= b.y + b.h;

      return;

        ctx.fillStyle = 'rgba(255, 255, 200, 0.35)';

      ctx.fillRect(drawX, drawY, drawW, drawH);
      ctx.strokeStyle = hovered ? '#ffffff' : border;
      ctx.lineWidth = hovered ? 4 : 3;
      ctx.strokeRect(drawX + 0.5, drawY + 0.5, drawW - 1, drawH - 1);

      ctx.font = 'bold 15px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, x + w / 2, y + h / 2 + 1);
